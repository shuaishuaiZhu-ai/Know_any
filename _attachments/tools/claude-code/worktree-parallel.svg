<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="430" viewBox="0 0 1180 430" role="img" aria-labelledby="t d">
  <title id="t">worktree 并行多开</title>
  <desc id="d">同一仓库用 git worktree 检出多个目录，各跑一个 Claude 实例并行推进，最后合回主分支。</desc>
  <defs>
    <style>
      .qw{font:700 15px ui-sans-serif,system-ui,sans-serif;fill:#ffffff}
      .smw{font:600 12.5px ui-sans-serif,system-ui,sans-serif;fill:#b8c7d0}
      .title{font:800 28px ui-sans-serif,system-ui,sans-serif;fill:#102027}
      .q{font:700 15px ui-sans-serif,system-ui,sans-serif;fill:#102027}
      .small{font:600 12.5px ui-sans-serif,system-ui,sans-serif;fill:#526672}
      .mono{font:700 13.5px ui-monospace,Menlo,Consolas,monospace;fill:#1d6fc0}
      .repo{fill:#102027}
      .wt{fill:#fff8e6;stroke:#edc870;stroke-width:1.6}
      .cl{fill:#e8f7ec;stroke:#74c98a;stroke-width:1.6}
      .endbox{fill:#ffffff;stroke:#d0d7de;stroke-width:1.3}
      .line{stroke:#8da2ad;stroke-width:2.4;fill:none;stroke-linecap:round}
    </style>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#8da2ad"/></marker>
  </defs>
  <rect width="1180" height="430" rx="28" fill="#f6f8fa"/>
  <text x="50" y="56" class="title">git worktree：一仓库、多工作区、多 Claude 并行</text>
  <text x="50" y="88" class="small">每个 worktree 是独立目录 + 独立分支，共享同一份 git 历史，文件零冲突。</text>

  <!-- repo -->
  <rect x="50" y="200" width="190" height="90" rx="15" class="repo"/>
  <text x="145" y="234" text-anchor="middle" class="qw">主仓库 proj/</text>
  <text x="145" y="258" text-anchor="middle" class="smw">分支 main</text>
  <text x="145" y="276" text-anchor="middle" class="smw">这里也跑一个 Claude</text>

  <!-- fan out -->
  <path d="M244 222 C 300 180, 330 152, 376 142" class="line" marker-end="url(#ar)"/>
  <path d="M244 245 H376" class="line" marker-end="url(#ar)"/>
  <path d="M244 268 C 300 310, 330 338, 376 348" class="line" marker-end="url(#ar)"/>
  <text x="240" y="104" class="mono">git worktree add ../proj-a feature-a</text>

  <!-- worktree rows -->
  <rect x="384" y="110" width="250" height="62" rx="14" class="wt"/>
  <text x="509" y="136" text-anchor="middle" class="q">../proj-a（feature-a）</text>
  <text x="509" y="156" text-anchor="middle" class="small">独立目录，独立分支</text>
  <path d="M638 141 H686" class="line" marker-end="url(#ar)"/>
  <rect x="694" y="110" width="250" height="62" rx="14" class="cl"/>
  <text x="819" y="136" text-anchor="middle" class="mono">cd ../proj-a &amp;&amp; claude</text>
  <text x="819" y="156" text-anchor="middle" class="small">Claude ①：开发新功能 A</text>

  <rect x="384" y="214" width="250" height="62" rx="14" class="wt"/>
  <text x="509" y="240" text-anchor="middle" class="q">../proj-b（feature-b）</text>
  <text x="509" y="260" text-anchor="middle" class="small">独立目录，独立分支</text>
  <path d="M638 245 H686" class="line" marker-end="url(#ar)"/>
  <rect x="694" y="214" width="250" height="62" rx="14" class="cl"/>
  <text x="819" y="240" text-anchor="middle" class="mono">cd ../proj-b &amp;&amp; claude</text>
  <text x="819" y="260" text-anchor="middle" class="small">Claude ②：修 bug B</text>

  <rect x="384" y="318" width="250" height="62" rx="14" class="wt"/>
  <text x="509" y="344" text-anchor="middle" class="q">../proj-c（review）</text>
  <text x="509" y="364" text-anchor="middle" class="small">只读权限</text>
  <path d="M638 349 H686" class="line" marker-end="url(#ar)"/>
  <rect x="694" y="318" width="250" height="62" rx="14" class="cl"/>
  <text x="819" y="344" text-anchor="middle" class="q">Claude ③：审查者</text>
  <text x="819" y="364" text-anchor="middle" class="small">写/审分离，质量更高</text>

  <!-- merge back -->
  <path d="M948 141 C 1010 150, 1030 200, 1036 232" class="line" marker-end="url(#ar)"/>
  <path d="M948 349 C 1010 340, 1030 290, 1036 258" class="line" marker-end="url(#ar)"/>
  <rect x="990" y="214" width="148" height="62" rx="14" class="endbox"/>
  <text x="1064" y="240" text-anchor="middle" class="q">合回 main</text>
  <text x="1064" y="260" text-anchor="middle" class="small">用完 worktree remove</text>
</svg>
