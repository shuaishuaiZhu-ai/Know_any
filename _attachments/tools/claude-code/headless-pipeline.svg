<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="400" viewBox="0 0 1180 400" role="img" aria-labelledby="t d">
  <title id="t">无头模式管道</title>
  <desc id="d">stdin 管道输入流入 claude -p，受启动参数约束，输出 text/json/stream-json 给下游脚本或 CI。</desc>
  <defs>
    <style>
      .qw{font:700 15px ui-sans-serif,system-ui,sans-serif;fill:#ffffff}
      .smw{font:600 12.5px ui-sans-serif,system-ui,sans-serif;fill:#b8c7d0}
      .title{font:800 28px ui-sans-serif,system-ui,sans-serif;fill:#102027}
      .q{font:700 15px ui-sans-serif,system-ui,sans-serif;fill:#102027}
      .small{font:600 12.5px ui-sans-serif,system-ui,sans-serif;fill:#526672}
      .mono{font:700 14px ui-monospace,Menlo,Consolas,monospace;fill:#1d6fc0}
      .monosm{font:600 12.5px ui-monospace,Menlo,Consolas,monospace;fill:#1d6fc0}
      .box{fill:#ffffff;stroke:#d0d7de;stroke-width:1.3}
      .act{fill:#e8f7ec;stroke:#74c98a;stroke-width:1.6}
      .core{fill:#102027}
      .chip{fill:#fff8e6;stroke:#edc870;stroke-width:1.4}
      .line{stroke:#8da2ad;stroke-width:2.4;fill:none;stroke-linecap:round}
    </style>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#8da2ad"/></marker>
  </defs>
  <rect width="1180" height="400" rx="28" fill="#f6f8fa"/>
  <text x="50" y="56" class="title">无头模式：把 Claude Code 当 Unix 工具用</text>

  <!-- input -->
  <rect x="50" y="110" width="240" height="110" rx="15" class="box"/>
  <text x="170" y="140" text-anchor="middle" class="q">输入（stdin / 参数）</text>
  <text x="70" y="168" class="monosm">cat error.log |</text>
  <text x="70" y="188" class="monosm">git diff |</text>
  <text x="70" y="208" class="monosm">"@docs/api.md ..."</text>
  <path d="M294 165 H348" class="line" marker-end="url(#ar)"/>

  <!-- core -->
  <rect x="356" y="118" width="250" height="94" rx="15" class="core"/>
  <text x="481" y="158" text-anchor="middle" class="qw">claude -p "任务"</text>
  <text x="481" y="186" text-anchor="middle" class="smw">干完活直接退出，不进交互界面</text>
  <path d="M610 165 H664" class="line" marker-end="url(#ar)"/>

  <!-- output -->
  <rect x="672" y="110" width="230" height="110" rx="15" class="act"/>
  <text x="787" y="140" text-anchor="middle" class="q">输出（stdout）</text>
  <text x="692" y="168" class="monosm">text       默认纯文本</text>
  <text x="692" y="188" class="monosm">json       含 cost/session_id</text>
  <text x="692" y="208" class="monosm">stream-json 逐事件流式</text>
  <path d="M906 165 H960" class="line" marker-end="url(#ar)"/>

  <!-- downstream -->
  <rect x="968" y="118" width="162" height="94" rx="15" class="box"/>
  <text x="1049" y="152" text-anchor="middle" class="q">下游</text>
  <text x="1049" y="176" text-anchor="middle" class="small">jq / 脚本 / CI</text>
  <text x="1049" y="194" text-anchor="middle" class="small">日志 / 看板</text>

  <!-- constraint chips -->
  <path d="M481 216 V252" class="line" marker-end="url(#ar)"/>
  <text x="481" y="282" text-anchor="middle" class="q">没人点确认 → 必须预先授权</text>
  <rect x="146" y="300" width="280" height="44" rx="12" class="chip"/>
  <text x="286" y="327" text-anchor="middle" class="monosm">--allowedTools "Bash(npm test:*)"</text>
  <rect x="446" y="300" width="250" height="44" rx="12" class="chip"/>
  <text x="571" y="327" text-anchor="middle" class="monosm">--permission-mode acceptEdits</text>
  <rect x="716" y="300" width="160" height="44" rx="12" class="chip"/>
  <text x="796" y="327" text-anchor="middle" class="monosm">--max-turns 10</text>
  <text x="896" y="327" class="small">…失控前先限轮数</text>
</svg>
