<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="380" viewBox="0 0 1180 380" role="img" aria-labelledby="t d">
  <title id="t">skills 与 plugins 的关系</title>
  <desc id="d">plugin 是分发包，打包 skills、slash 命令、subagents、hooks、MCP；你装 plugin 获得这些能力。</desc>
  <defs>
    <style>
      .title{font:800 28px ui-sans-serif,system-ui,sans-serif;fill:#102027}
      .sub{font:500 15px ui-sans-serif,system-ui,sans-serif;fill:#526672}
      .ph{font:800 22px ui-sans-serif,system-ui,sans-serif;fill:#ffffff}
      .psub{font:600 13px ui-sans-serif,system-ui,sans-serif;fill:#c9d6dd}
      .head{font:800 16px ui-sans-serif,system-ui,sans-serif;fill:#102027}
      .small{font:600 12px ui-sans-serif,system-ui,sans-serif;fill:#526672}
      .dark{fill:#102027}
      .green{fill:#e8f7ec;stroke:#74c98a;stroke-width:1.5}
      .blue{fill:#e8f1fd;stroke:#6fa8e6;stroke-width:1.5}
      .teal{fill:#e6fffa;stroke:#68d8c2;stroke-width:1.5}
      .amber{fill:#fff8e6;stroke:#edc870;stroke-width:1.5}
      .violet{fill:#f0ecfb;stroke:#a98fe0;stroke-width:1.5}
      .line{stroke:#8da2ad;stroke-width:2.4;fill:none;stroke-linecap:round}
    </style>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#8da2ad"/></marker>
  </defs>
  <rect width="1180" height="380" rx="28" fill="#f6f8fa"/>
  <text x="50" y="56" class="title">skill 是“能力”，plugin 是“把一组能力打包分发”</text>
  <text x="50" y="84" class="sub">你安装 plugin，从而获得它带的一批 skills / 命令 / 子代理 / hooks / MCP</text>

  <rect x="420" y="116" width="340" height="84" rx="18" class="dark"/>
  <text x="590" y="156" text-anchor="middle" class="ph">Plugin</text>
  <text x="590" y="182" text-anchor="middle" class="psub">分发包（从 marketplace 安装）</text>

  <path d="M520 200 V236 H160 V268" class="line" marker-end="url(#ar)"/>
  <path d="M555 200 V252 H390 V268" class="line" marker-end="url(#ar)"/>
  <path d="M590 200 V268" class="line" marker-end="url(#ar)"/>
  <path d="M625 200 V252 H790 V268" class="line" marker-end="url(#ar)"/>
  <path d="M660 200 V236 H1020 V268" class="line" marker-end="url(#ar)"/>

  <rect x="44" y="270" width="232" height="84" rx="15" class="green"/>
  <text x="160" y="304" text-anchor="middle" class="head">Skills</text>
  <text x="160" y="328" text-anchor="middle" class="small">按场景触发的操作手册</text>

  <rect x="296" y="270" width="188" height="84" rx="15" class="blue"/>
  <text x="390" y="304" text-anchor="middle" class="head">Slash 命令</text>
  <text x="390" y="328" text-anchor="middle" class="small">你主动敲 /xxx</text>

  <rect x="504" y="270" width="172" height="84" rx="15" class="teal"/>
  <text x="590" y="304" text-anchor="middle" class="head">Subagents</text>
  <text x="590" y="328" text-anchor="middle" class="small">独立上下文小助手</text>

  <rect x="696" y="270" width="188" height="84" rx="15" class="amber"/>
  <text x="790" y="304" text-anchor="middle" class="head">Hooks</text>
  <text x="790" y="328" text-anchor="middle" class="small">生命周期自动脚本</text>

  <rect x="904" y="270" width="232" height="84" rx="15" class="violet"/>
  <text x="1020" y="304" text-anchor="middle" class="head">MCP server</text>
  <text x="1020" y="328" text-anchor="middle" class="small">接外部工具 / 数据</text>
</svg>
