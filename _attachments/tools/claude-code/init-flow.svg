<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="300" viewBox="0 0 1180 300" role="img" aria-labelledby="t d">
  <title id="t">初始化工作目录 /init</title>
  <desc id="d">cd 进项目，启动，/init 扫描，生成 CLAUDE.md 草稿，你审阅补充，提交入库。</desc>
  <defs>
    <style>
      .title{font:800 27px ui-sans-serif,system-ui,sans-serif;fill:#102027}
      .head{font:800 15px ui-sans-serif,system-ui,sans-serif;fill:#102027}
      .small{font:600 12px ui-sans-serif,system-ui,sans-serif;fill:#526672}
      .mono{font:700 13px ui-monospace,Menlo,Consolas,monospace;fill:#1d6fc0}
      .box{fill:#ffffff;stroke:#d0d7de;stroke-width:1.3}
      .dark{fill:#102027}
      .green{fill:#e8f7ec;stroke:#74c98a;stroke-width:1.5}
      .line{stroke:#8da2ad;stroke-width:2.6;fill:none;stroke-linecap:round}
    </style>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#8da2ad"/></marker>
  </defs>
  <rect width="1180" height="300" rx="28" fill="#f6f8fa"/>
  <text x="50" y="58" class="title">如何初始化一个工作目录</text>

  <rect x="40" y="108" width="150" height="96" rx="15" class="box"/>
  <text x="115" y="150" text-anchor="middle" class="head">cd 进项目</text>
  <text x="115" y="174" text-anchor="middle" class="small">+ 启动 claude</text>
  <path d="M194 156 H226" class="line" marker-end="url(#ar)"/>

  <rect x="234" y="108" width="150" height="96" rx="15" class="dark"/>
  <text x="309" y="162" text-anchor="middle" class="mono" fill="#7fd4c1">/init</text>
  <path d="M388 156 H420" class="line" marker-end="url(#ar)"/>

  <rect x="428" y="108" width="168" height="96" rx="15" class="box"/>
  <text x="512" y="150" text-anchor="middle" class="head">扫描代码库</text>
  <text x="512" y="174" text-anchor="middle" class="small">语言/脚本/结构</text>
  <path d="M600 156 H632" class="line" marker-end="url(#ar)"/>

  <rect x="640" y="108" width="178" height="96" rx="15" class="box"/>
  <text x="729" y="150" text-anchor="middle" class="head">生成 CLAUDE.md</text>
  <text x="729" y="174" text-anchor="middle" class="small">项目级草稿</text>
  <path d="M822 156 H854" class="line" marker-end="url(#ar)"/>

  <rect x="862" y="108" width="168" height="96" rx="15" class="green"/>
  <text x="946" y="144" text-anchor="middle" class="head">你审阅补充</text>
  <text x="946" y="166" text-anchor="middle" class="small">补构建命令</text>
  <text x="946" y="186" text-anchor="middle" class="small">/禁区/约定</text>
  <path d="M1034 156 H1062" class="line" marker-end="url(#ar)"/>

  <rect x="1042" y="108" width="100" height="96" rx="15" class="box"/>
  <text x="1092" y="150" text-anchor="middle" class="head">提交</text>
  <text x="1092" y="174" text-anchor="middle" class="small">入库共享</text>

  <text x="50" y="258" class="small">维护：/memory 查看 · 会话里 # 开头一句话追加记忆 · CLAUDE.md 里用 @路径 导入其它文件</text>
</svg>
