<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="340" viewBox="0 0 1180 340" role="img" aria-labelledby="t d">
  <title id="t">核心工作循环</title>
  <desc id="d">提需求 → 读文件理解 →（可选 plan 看方案）→ 编辑 → 验证 → 达标则完成，否则回到提需求。</desc>
  <defs>
    <style>
      .title{font:800 28px ui-sans-serif,system-ui,sans-serif;fill:#102027}
      .head{font:800 16px ui-sans-serif,system-ui,sans-serif;fill:#102027}
      .small{font:600 12.5px ui-sans-serif,system-ui,sans-serif;fill:#526672}
      .box{fill:#ffffff;stroke:#d0d7de;stroke-width:1.3}
      .blue{fill:#e8f1fd;stroke:#6fa8e6;stroke-width:1.4}
      .teal{fill:#e6fffa;stroke:#68d8c2;stroke-width:1.4}
      .green{fill:#e8f7ec;stroke:#74c98a;stroke-width:1.4}
      .line{stroke:#8da2ad;stroke-width:2.6;fill:none;stroke-linecap:round}
      .back{stroke:#e0a3a3;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-dasharray:7 7}
      .lbl{font:700 12px ui-sans-serif,system-ui,sans-serif;fill:#526672}
    </style>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#8da2ad"/></marker>
    <marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#e0a3a3"/></marker>
  </defs>
  <rect width="1180" height="340" rx="28" fill="#f6f8fa"/>
  <text x="50" y="58" class="title">核心工作循环</text>

  <rect x="44" y="120" width="178" height="92" rx="15" class="blue"/>
  <text x="133" y="160" text-anchor="middle" class="head">① 提需求</text>
  <text x="133" y="184" text-anchor="middle" class="small">越具体越好</text>
  <path d="M226 166 H268" class="line" marker-end="url(#ar)"/>

  <rect x="272" y="120" width="178" height="92" rx="15" class="box"/>
  <text x="361" y="160" text-anchor="middle" class="head">② 读文件</text>
  <text x="361" y="184" text-anchor="middle" class="small">建立理解</text>
  <path d="M454 166 H496" class="line" marker-end="url(#ar)"/>

  <rect x="500" y="120" width="190" height="92" rx="15" class="teal"/>
  <text x="595" y="155" text-anchor="middle" class="head">③ 编辑</text>
  <text x="595" y="179" text-anchor="middle" class="small">复杂改动先 plan 看方案</text>
  <path d="M694 166 H736" class="line" marker-end="url(#ar)"/>

  <rect x="740" y="120" width="178" height="92" rx="15" class="box"/>
  <text x="829" y="160" text-anchor="middle" class="head">④ 验证</text>
  <text x="829" y="184" text-anchor="middle" class="small">测试 / 构建 / diff</text>
  <path d="M922 166 H964" class="line" marker-end="url(#ar)"/>

  <rect x="968" y="120" width="170" height="92" rx="15" class="green"/>
  <text x="1053" y="160" text-anchor="middle" class="head">⑤ 达标 → 完成</text>
  <text x="1053" y="184" text-anchor="middle" class="small">否则回到 ①</text>

  <path d="M1053 214 V268 H133 V214" class="back" marker-end="url(#arr)"/>
  <text x="560" y="290" text-anchor="middle" class="lbl">不达标：带着验证结果回到 ①（这就是“循环”）</text>
</svg>
