<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1460 700" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>逻辑环到物理连接的三个阶段:graph.intra[] 数字排列 → ncclConnect 点对点交换 → 物理通道建立</title>
  <desc>从左到右三个阶段列:①逻辑环(蓝色)——graph.intra[]的rank排列经ncclBuildRings翻译成每个rank的prev/next数字,此时没有任何显存映射或socket;②setup+点对点交换(紫色)——每个(channel,方向)调transport的setup()产出不透明的ncclConnect结构,经bootstrapSend/Recv只与prev/next点对点交换(非all-gather);③connect()建立物理通道(绿色)——用对端的ncclConnect完成握手,P2P映射对端显存或NET建连接,填好ncclConnInfo的buffs/head/tail。底部横条给出调用链ncclTransportRingConnect→ncclTransportP2pConnect→ncclTransportP2pSetup。列间用向右箭头连接。</desc>

  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="3.6" refY="3.4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3.4 L0,6.8 Z" fill="#455a64"/>
    </marker>
    <marker id="ahp" markerWidth="8" markerHeight="8" refX="3.6" refY="3.4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3.4 L0,6.8 Z" fill="#7c5cbf"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1460" height="700" rx="26" fill="#f6f8fa"/>
  <text x="30" y="34" font-size="20" font-weight="700" fill="#102027">逻辑环 → 物理连接:三个独立的阶段</text>
  <text x="30" y="58" font-size="12.5" fill="#607d8b">图搜索算出的环只是"数字";要经过 setup 产出 ncclConnect、bootstrap 点对点交换、connect 握手,才变成能读写的物理通道</text>

  <!-- arrows between columns -->
  <line x1="464" y1="360" x2="504" y2="360" stroke="#455a64" stroke-width="2.4" marker-end="url(#ah)"/>
  <line x1="948" y1="360" x2="988" y2="360" stroke="#455a64" stroke-width="2.4" marker-end="url(#ah)"/>

  <!-- ============ Column 1: logical ring ============ -->
  <rect x="30" y="84" width="430" height="540" rx="14" fill="#eaf2fc" stroke="#3f78c9" stroke-width="1.6"/>
  <text x="46" y="110" font-size="15.5" font-weight="700" fill="#1d4e8f">① 逻辑环:纯数字</text>
  <text x="46" y="128" font-size="10.5" fill="#5c7ba8">ncclBuildRings · graph/rings.cc:29</text>

  <rect x="46" y="146" width="398" height="44" rx="7" fill="#3f78c9"/>
  <text x="245" y="173" font-size="12.5" font-weight="700" text-anchor="middle" fill="#ffffff">图搜索输出 graph.intra[] = { 0, 2, 1, 3 }</text>

  <line x1="120" y1="196" x2="120" y2="226" stroke="#3f78c9" stroke-width="2.2" marker-end="url(#ah)"/>
  <text x="150" y="216" font-size="10.5" fill="#5c7ba8">翻译成每个 rank 自己的 prev / next</text>

  <rect x="46" y="232" width="398" height="152" rx="8" fill="#ffffff" stroke="#9fb8dd" stroke-width="1.2"/>
  <text x="66" y="258" font-size="12" fill="#37474f">rank 0:ring.prev = 3　ring.next = 2</text>
  <text x="66" y="292" font-size="12" font-weight="700" fill="#1d4e8f">rank 1:ring.prev = 2　ring.next = 3(本例视角)</text>
  <text x="66" y="326" font-size="12" fill="#37474f">rank 2:ring.prev = 0　ring.next = 1</text>
  <text x="66" y="360" font-size="12" fill="#37474f">rank 3:ring.prev = 1　ring.next = 0</text>

  <rect x="46" y="404" width="398" height="92" rx="8" fill="#dbe8f7" stroke="#9fb8dd" stroke-width="1.2"/>
  <text x="66" y="430" font-size="11.5" font-weight="700" fill="#1d4e8f">此刻还什么都没建:</text>
  <text x="66" y="452" font-size="11" fill="#37474f">没有显存映射、没有 socket、没有 IPC handle,</text>
  <text x="66" y="472" font-size="11" fill="#37474f">只有"我该连谁"的 rank 号 —— 纯逻辑关系</text>

  <text x="46" y="530" font-size="11" fill="#37474f">环的排列由 04 章拓扑搜索决定;ncclBuildRings 只做</text>
  <text x="46" y="550" font-size="11" fill="#37474f">"排列 → 每人 prev/next"的翻译,并校验环闭合</text>

  <!-- ============ Column 2: setup + exchange ============ -->
  <rect x="514" y="84" width="430" height="540" rx="14" fill="#f2eefb" stroke="#7c5cbf" stroke-width="1.6"/>
  <text x="530" y="110" font-size="15.5" font-weight="700" fill="#5a3ea8">② setup() + bootstrap 点对点交换</text>
  <text x="530" y="128" font-size="10.5" fill="#8672b8">selectTransport → setup · transport.cc:21,173,182</text>

  <rect x="530" y="146" width="398" height="96" rx="8" fill="#ffffff" stroke="#c9bfe3" stroke-width="1.2"/>
  <text x="550" y="172" font-size="11.5" font-weight="700" fill="#5a3ea8">每个 (channel, 方向) 调 transport 的 setup():</text>
  <text x="550" y="194" font-size="11" fill="#37474f">本地产出一个不透明的 ncclConnect 结构 ——</text>
  <text x="550" y="214" font-size="11" fill="#37474f">可能是 CUDA IPC handle、shm 名字或 socket 地址,</text>
  <text x="550" y="232" font-size="11" fill="#37474f">取决于最终选中的 transport(07 章)</text>

  <!-- exchange visual: rank1 <-> its prev/next -->
  <rect x="530" y="268" width="150" height="118" rx="9" fill="#7c5cbf"/>
  <text x="605" y="294" font-size="12.5" font-weight="700" text-anchor="middle" fill="#ffffff">rank 1</text>
  <text x="605" y="316" font-size="10.5" text-anchor="middle" fill="#e8e0f7">send 侧 ncclConnect</text>
  <text x="605" y="334" font-size="10.5" text-anchor="middle" fill="#e8e0f7">recv 侧 ncclConnect</text>
  <text x="605" y="366" font-size="10" text-anchor="middle" fill="#cfc2ea">(每 channel 各一份)</text>

  <rect x="778" y="268" width="150" height="118" rx="9" fill="#ffffff" stroke="#7c5cbf" stroke-width="1.6"/>
  <text x="853" y="294" font-size="12.5" font-weight="700" text-anchor="middle" fill="#5a3ea8">rank 3 = next</text>
  <text x="853" y="316" font-size="10.5" text-anchor="middle" fill="#7c5cbf">(prev=rank 2 同理,</text>
  <text x="853" y="334" font-size="10.5" text-anchor="middle" fill="#7c5cbf">另一对点对点交换)</text>

  <line x1="688" y1="306" x2="770" y2="306" stroke="#7c5cbf" stroke-width="2.2" marker-end="url(#ahp)"/>
  <text x="729" y="286" font-size="9.5" text-anchor="middle" fill="#5a3ea8">bootstrapSend :207</text>
  <line x1="770" y1="348" x2="688" y2="348" stroke="#7c5cbf" stroke-width="2.2" marker-end="url(#ahp)"/>
  <text x="729" y="374" font-size="9.5" text-anchor="middle" fill="#5a3ea8">bootstrapRecv :212</text>

  <rect x="530" y="410" width="398" height="86" rx="8" fill="#e6ddf6" stroke="#c9bfe3" stroke-width="1.2"/>
  <text x="550" y="436" font-size="11.5" font-weight="700" fill="#5a3ea8">注意:是点对点,不是 all-gather</text>
  <text x="550" y="458" font-size="11" fill="#37474f">ncclConnect 只需要让对端一个人知道,</text>
  <text x="550" y="478" font-size="11" fill="#37474f">经 bootstrap 带外通道定向发给 prev / next 即可</text>

  <text x="530" y="530" font-size="11" fill="#37474f">交换走的是 03 章 §4 建好的 bootstrap 环(TCP),</text>
  <text x="530" y="550" font-size="11" fill="#37474f">和将来跑数据的通道完全是两套东西</text>

  <!-- ============ Column 3: connect ============ -->
  <rect x="998" y="84" width="430" height="540" rx="14" fill="#eaf7ee" stroke="#2e9e5b" stroke-width="1.6"/>
  <text x="1014" y="110" font-size="15.5" font-weight="700" fill="#1e7a3d">③ connect():物理通道建立</text>
  <text x="1014" y="128" font-size="10.5" fill="#5fa77a">transportComm-&gt;connect · transport.cc:245,268</text>

  <rect x="1014" y="146" width="398" height="118" rx="8" fill="#ffffff" stroke="#8fcda6" stroke-width="1.2"/>
  <text x="1034" y="172" font-size="11.5" font-weight="700" fill="#1e7a3d">拿对端的 ncclConnect 完成握手:</text>
  <text x="1034" y="196" font-size="11" fill="#37474f">P2P → cuMemImportFromShareableHandle 把对端</text>
  <text x="1034" y="214" font-size="11" fill="#37474f">　　　显存映射进本进程(p2p.cc:296)</text>
  <text x="1034" y="234" font-size="11" fill="#37474f">SHM → 映射对端共享内存段;NET → 建 QP/socket</text>

  <line x1="1213" y1="272" x2="1213" y2="302" stroke="#2e9e5b" stroke-width="2.2" marker-end="url(#ah)"/>

  <rect x="1014" y="308" width="398" height="128" rx="8" fill="#2e9e5b"/>
  <text x="1213" y="336" font-size="12.5" font-weight="700" text-anchor="middle" fill="#ffffff">填好 ncclConnInfo(device.h:133)</text>
  <text x="1213" y="362" font-size="11" text-anchor="middle" fill="#dff3e6">buffs[] — 真正收发数据的 buffer 指针</text>
  <text x="1213" y="384" font-size="11" text-anchor="middle" fill="#dff3e6">head / tail — 09 章 FIFO 同步用的水位指针</text>
  <text x="1213" y="406" font-size="11" text-anchor="middle" fill="#dff3e6">从此 kernel 可以直接读写这条通道</text>

  <rect x="1014" y="456" width="398" height="66" rx="8" fill="#dbf0e2" stroke="#8fcda6" stroke-width="1.2"/>
  <text x="1034" y="482" font-size="11.5" font-weight="700" fill="#1e7a3d">至此 channels[c].peers[r].send/recv 全部就位</text>
  <text x="1034" y="504" font-size="11" fill="#37474f">—— 正是 02 章图 17 第④层 conninfo 的来源</text>

  <text x="1014" y="550" font-size="11" fill="#37474f">通信器建成,可以跑 AllReduce 了</text>

  <!-- bottom banner -->
  <rect x="30" y="640" width="1398" height="36" rx="9" fill="#eef2f5" stroke="#cfd8dc" stroke-width="1"/>
  <text x="46" y="663" font-size="11" fill="#455a64">调用链:ncclTransportRingConnect(transport/generic.cc:14) → ncclTransportP2pConnect → ncclTransportP2pSetup(transport.cc:123) —— setup、交换、connect 三步都在这个函数里完成</text>
</svg>
