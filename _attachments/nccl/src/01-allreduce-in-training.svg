<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>数据并行训练中 AllReduce 的位置</title>
  <desc>布局:三行。第一行 4 个 GPU 局部梯度框;中间一条横跨的 AllReduce 带;第三行 4 个 GPU 全局梯度框。
  箭头:每个顶部 GPU 框 → 向下进入 AllReduce 带(head 落在带的上边);AllReduce 带 → 向下进入每个底部 GPU 框(head 落在底部框上边)。左侧三个步骤标注。</desc>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#8da2ad"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1180" height="560" rx="28" fill="#f6f8fa"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#102027">数据并行训练:一次 AllReduce 同步梯度</text>

  <!-- step labels -->
  <text x="40" y="120" font-size="17" font-weight="700" fill="#b08b2e">① 各算各的</text>
  <text x="40" y="146" font-size="14" fill="#37474f">每块 GPU 用不同的</text>
  <text x="40" y="166" font-size="14" fill="#37474f">数据切片,算出</text>
  <text x="40" y="186" font-size="14" fill="#37474f">各自的局部梯度 gᵢ</text>

  <text x="40" y="296" font-size="17" font-weight="700" fill="#b08b2e">② 一次 AllReduce</text>
  <text x="40" y="322" font-size="14" fill="#37474f">把 g₀..g₃ 求和(或</text>
  <text x="40" y="342" font-size="14" fill="#37474f">求平均),结果发回</text>
  <text x="40" y="362" font-size="14" fill="#37474f">给每一块 GPU</text>

  <text x="40" y="470" font-size="17" font-weight="700" fill="#b08b2e">③ 结果一致</text>
  <text x="40" y="496" font-size="14" fill="#37474f">每块拿到相同的</text>
  <text x="40" y="516" font-size="14" fill="#37474f">全局梯度 ḡ → 参数</text>
  <text x="40" y="536" font-size="14" fill="#37474f">更新后完全同步</text>

  <!-- top GPU boxes -->
  <g font-size="15" text-anchor="middle">
    <g>
      <rect x="250" y="86" width="170" height="74" rx="12" fill="#e8f7ec" stroke="#74c98a" stroke-width="2"/>
      <text x="335" y="116" font-weight="700" fill="#102027">GPU 0</text>
      <text x="335" y="140" fill="#37474f">局部梯度 g₀</text>
    </g>
    <g>
      <rect x="460" y="86" width="170" height="74" rx="12" fill="#e8f7ec" stroke="#74c98a" stroke-width="2"/>
      <text x="545" y="116" font-weight="700" fill="#102027">GPU 1</text>
      <text x="545" y="140" fill="#37474f">局部梯度 g₁</text>
    </g>
    <g>
      <rect x="670" y="86" width="170" height="74" rx="12" fill="#e8f7ec" stroke="#74c98a" stroke-width="2"/>
      <text x="755" y="116" font-weight="700" fill="#102027">GPU 2</text>
      <text x="755" y="140" fill="#37474f">局部梯度 g₂</text>
    </g>
    <g>
      <rect x="880" y="86" width="170" height="74" rx="12" fill="#e8f7ec" stroke="#74c98a" stroke-width="2"/>
      <text x="965" y="116" font-weight="700" fill="#102027">GPU 3</text>
      <text x="965" y="140" fill="#37474f">局部梯度 g₃</text>
    </g>
  </g>

  <!-- AllReduce band -->
  <rect x="250" y="252" width="800" height="72" rx="14" fill="#e8f1fd" stroke="#6fa8e6" stroke-width="2.4"/>
  <text x="650" y="284" font-size="20" font-weight="700" text-anchor="middle" fill="#102027">AllReduce ( ncclSum / ncclAvg )</text>
  <text x="650" y="310" font-size="14" text-anchor="middle" fill="#37474f">ḡ = (g₀ + g₁ + g₂ + g₃) / N　——　每块 GPU 都得到同一个 ḡ</text>

  <!-- bottom GPU boxes -->
  <g font-size="15" text-anchor="middle">
    <g>
      <rect x="250" y="420" width="170" height="78" rx="12" fill="#fff8e6" stroke="#edc870" stroke-width="2"/>
      <text x="335" y="450" font-weight="700" fill="#102027">GPU 0</text>
      <text x="335" y="474" fill="#37474f">全局梯度 ḡ</text>
    </g>
    <g>
      <rect x="460" y="420" width="170" height="78" rx="12" fill="#fff8e6" stroke="#edc870" stroke-width="2"/>
      <text x="545" y="450" font-weight="700" fill="#102027">GPU 1</text>
      <text x="545" y="474" fill="#37474f">全局梯度 ḡ</text>
    </g>
    <g>
      <rect x="670" y="420" width="170" height="78" rx="12" fill="#fff8e6" stroke="#edc870" stroke-width="2"/>
      <text x="755" y="450" font-weight="700" fill="#102027">GPU 2</text>
      <text x="755" y="474" fill="#37474f">全局梯度 ḡ</text>
    </g>
    <g>
      <rect x="880" y="420" width="170" height="78" rx="12" fill="#fff8e6" stroke="#edc870" stroke-width="2"/>
      <text x="965" y="450" font-weight="700" fill="#102027">GPU 3</text>
      <text x="965" y="474" fill="#37474f">全局梯度 ḡ</text>
    </g>
  </g>

  <!-- arrows down: top -> band -->
  <g stroke="#8da2ad" stroke-width="2.4" fill="none" stroke-linecap="round" marker-end="url(#ar)">
    <line x1="335" y1="160" x2="335" y2="248"/>
    <line x1="545" y1="160" x2="545" y2="248"/>
    <line x1="755" y1="160" x2="755" y2="248"/>
    <line x1="965" y1="160" x2="965" y2="248"/>
  </g>
  <!-- arrows down: band -> bottom -->
  <g stroke="#8da2ad" stroke-width="2.4" fill="none" stroke-linecap="round" marker-end="url(#ar)">
    <line x1="335" y1="324" x2="335" y2="416"/>
    <line x1="545" y1="324" x2="545" y2="416"/>
    <line x1="755" y1="324" x2="755" y2="416"/>
    <line x1="965" y1="324" x2="965" y2="416"/>
  </g>
</svg>
