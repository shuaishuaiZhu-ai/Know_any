<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 580" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>单节点 GPU 拓扑(NCCL 探测出的带权图)</title>
  <desc>无向带权图(连线无箭头)。顶部 NVSwitch 经 NVLink(绿粗)连 4 个 GPU;GPU 经 PCIe(灰)挂到 PCIe switch,switch 接 NIC 和 CPU;两颗 CPU 间是 SYS 链路(橙)。右下角图例标注链路类型。验证点:连线不被框遮挡、各链路颜色与图例一致、文字不溢出。</desc>
  <rect x="0" y="0" width="1180" height="580" rx="28" fill="#f6f8fa"/>
  <text x="40" y="44" font-size="23" font-weight="700" fill="#102027">单节点拓扑:NCCL 把硬件探测成一张带权图</text>

  <!-- links first (under boxes) -->
  <!-- NVLink: NVSwitch <-> GPUs (green thick) -->
  <g stroke="#4a9e63" stroke-width="4" stroke-linecap="round">
    <line x1="540" y1="138" x2="200" y2="196"/>
    <line x1="565" y1="140" x2="400" y2="196"/>
    <line x1="615" y1="140" x2="780" y2="196"/>
    <line x1="640" y1="138" x2="980" y2="196"/>
  </g>
  <!-- PCI links (gray) -->
  <g stroke="#90a4ae" stroke-width="2.6" stroke-linecap="round">
    <line x1="200" y1="258" x2="250" y2="322"/>
    <line x1="400" y1="258" x2="300" y2="322"/>
    <line x1="780" y1="258" x2="880" y2="322"/>
    <line x1="980" y1="258" x2="930" y2="322"/>
    <line x1="275" y1="368" x2="275" y2="430"/>
    <line x1="905" y1="368" x2="905" y2="430"/>
    <line x1="360" y1="345" x2="392" y2="345"/>
    <line x1="788" y1="345" x2="820" y2="345"/>
  </g>
  <!-- SYS link CPU0-CPU1 (orange thick) -->
  <line x1="430" y1="457" x2="750" y2="457" stroke="#e0883a" stroke-width="4" stroke-linecap="round"/>
  <text x="590" y="448" font-size="13" text-anchor="middle" fill="#b06a1e">SYS(UPI)</text>

  <!-- NVSwitch -->
  <rect x="490" y="92" width="200" height="46" rx="12" fill="#102027"/>
  <text x="590" y="121" font-size="16" font-weight="700" text-anchor="middle" fill="#fff">NVSwitch</text>

  <!-- GPUs -->
  <g font-size="14" text-anchor="middle">
    <g><rect x="130" y="196" width="140" height="62" rx="11" fill="#e8f7ec" stroke="#74c98a" stroke-width="2"/><text x="200" y="222" font-weight="700" fill="#102027">GPU 0</text><text x="200" y="244" font-size="12" fill="#37474f">rank 0</text></g>
    <g><rect x="330" y="196" width="140" height="62" rx="11" fill="#e8f7ec" stroke="#74c98a" stroke-width="2"/><text x="400" y="222" font-weight="700" fill="#102027">GPU 1</text><text x="400" y="244" font-size="12" fill="#37474f">rank 1</text></g>
    <g><rect x="710" y="196" width="140" height="62" rx="11" fill="#e8f7ec" stroke="#74c98a" stroke-width="2"/><text x="780" y="222" font-weight="700" fill="#102027">GPU 2</text><text x="780" y="244" font-size="12" fill="#37474f">rank 2</text></g>
    <g><rect x="910" y="196" width="140" height="62" rx="11" fill="#e8f7ec" stroke="#74c98a" stroke-width="2"/><text x="980" y="222" font-weight="700" fill="#102027">GPU 3</text><text x="980" y="244" font-size="12" fill="#37474f">rank 3</text></g>
  </g>

  <!-- PCIe switches -->
  <g font-size="13" text-anchor="middle">
    <rect x="190" y="322" width="170" height="46" rx="10" fill="#e8f1fd" stroke="#6fa8e6"/><text x="275" y="350" font-weight="700" fill="#102027">PCIe switch</text>
    <rect x="820" y="322" width="170" height="46" rx="10" fill="#e8f1fd" stroke="#6fa8e6"/><text x="905" y="350" font-weight="700" fill="#102027">PCIe switch</text>
  </g>
  <!-- NICs -->
  <g font-size="12.5" text-anchor="middle">
    <rect x="392" y="322" width="92" height="46" rx="10" fill="#fff8e6" stroke="#edc870"/><text x="438" y="343" font-weight="700" fill="#102027">NIC0</text><text x="438" y="360" font-size="11" fill="#37474f">→ 网络</text>
    <rect x="696" y="322" width="92" height="46" rx="10" fill="#fff8e6" stroke="#edc870"/><text x="742" y="343" font-weight="700" fill="#102027">NIC1</text><text x="742" y="360" font-size="11" fill="#37474f">→ 网络</text>
  </g>
  <!-- CPUs -->
  <g font-size="14" text-anchor="middle">
    <rect x="190" y="430" width="240" height="54" rx="11" fill="#eceff1" stroke="#90a4ae" stroke-width="2"/><text x="310" y="453" font-weight="700" fill="#102027">CPU0 (NUMA0)</text><text x="310" y="473" font-size="12" fill="#607d8b">本地内存域</text>
    <rect x="750" y="430" width="240" height="54" rx="11" fill="#eceff1" stroke="#90a4ae" stroke-width="2"/><text x="870" y="453" font-weight="700" fill="#102027">CPU1 (NUMA1)</text><text x="870" y="473" font-size="12" fill="#607d8b">本地内存域</text>
  </g>

  <!-- legend -->
  <g font-size="13">
    <text x="40" y="525" font-weight="700" fill="#102027">链路类型(粗细≈带宽):</text>
    <line x1="270" y1="520" x2="320" y2="520" stroke="#4a9e63" stroke-width="4"/><text x="330" y="525" fill="#37474f">NVLink(很快)</text>
    <line x1="480" y1="520" x2="530" y2="520" stroke="#90a4ae" stroke-width="2.6"/><text x="540" y="525" fill="#37474f">PCIe(中)</text>
    <line x1="650" y1="520" x2="700" y2="520" stroke="#e0883a" stroke-width="4"/><text x="710" y="525" fill="#37474f">SYS 跨 NUMA(慢)</text>
    <text x="900" y="525" fill="#607d8b">NIC→跨机 = NET(最慢)</text>
  </g>
</svg>
