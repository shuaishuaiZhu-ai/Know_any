<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 600" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>NCCL 整体分层:Host 控制面 + Proxy 线程 + GPU 数据面 + 硬件</title>
  <desc>四层。顶部:Host 控制面横条(init/enqueue/graph 三块)。中部左:GPU 数据面 kernel;中部右:Proxy 线程。底部左:卡内硬件 NVLink/PCIe;底部右:跨机硬件 IB/以太网。
  箭头:控制面→GPU kernel(向下,启动);GPU kernel↔NVLink(上下双向,卡内直连);GPU kernel↔Proxy(左右双向,work FIFO);Proxy↔IB(上下双向)。</desc>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#8da2ad"/></marker>
    <marker id="arev" viewBox="0 0 10 10" refX="1.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M10 0 L0 5 L10 10 z" fill="#8da2ad"/></marker>
  </defs>
  <rect x="0" y="0" width="1180" height="600" rx="28" fill="#f6f8fa"/>
  <text x="40" y="46" font-size="24" font-weight="700" fill="#102027">NCCL 运行时分层:控制面 / Proxy / 数据面</text>

  <!-- Control plane band -->
  <rect x="40" y="70" width="1100" height="110" rx="16" fill="#e8f1fd" stroke="#6fa8e6" stroke-width="2.4"/>
  <text x="60" y="96" font-size="16" font-weight="700" fill="#3d7fc4">① 控制面 ( Host / CPU )　·　主要在 init 一次性 + 每次调用的 enqueue</text>
  <g font-size="13.5" text-anchor="middle">
    <rect x="70" y="108" width="320" height="58" rx="10" fill="#fff" stroke="#6fa8e6"/>
    <text x="230" y="132" font-weight="700" fill="#102027">init.cc · graph/</text>
    <text x="230" y="153" fill="#37474f">拓扑探测 · 求环/树 · 建连接</text>
    <rect x="430" y="108" width="320" height="58" rx="10" fill="#fff" stroke="#6fa8e6"/>
    <text x="590" y="132" font-weight="700" fill="#102027">enqueue.cc · group.cc</text>
    <text x="590" y="153" fill="#37474f">选 algo/proto → plan → launch</text>
    <rect x="790" y="108" width="320" height="58" rx="10" fill="#fff" stroke="#6fa8e6"/>
    <text x="950" y="132" font-weight="700" fill="#102027">collectives.cc</text>
    <text x="950" y="153" fill="#37474f">7 类原语 API 入口</text>
  </g>

  <!-- GPU data plane (center-left) -->
  <rect x="120" y="250" width="500" height="115" rx="16" fill="#e8f7ec" stroke="#74c98a" stroke-width="2.4"/>
  <text x="370" y="282" font-size="17" font-weight="700" text-anchor="middle" fill="#2e7d4f">② 数据面 ( GPU / Device )</text>
  <text x="370" y="308" font-size="14" text-anchor="middle" fill="#37474f">ncclDevKernel(src/device/)</text>
  <text x="370" y="330" font-size="13.5" text-anchor="middle" fill="#37474f">按 ring/tree 用 primitives</text>
  <text x="370" y="350" font-size="13.5" text-anchor="middle" fill="#37474f">边搬运边归约(Simple/LL/LL128)</text>

  <!-- Proxy thread (center-right) -->
  <rect x="720" y="250" width="360" height="115" rx="16" fill="#fff8e6" stroke="#edc870" stroke-width="2.4"/>
  <text x="900" y="282" font-size="17" font-weight="700" text-anchor="middle" fill="#9a7d1e">③ Proxy 线程 ( CPU )</text>
  <text x="900" y="308" font-size="14" text-anchor="middle" fill="#37474f">proxy.cc</text>
  <text x="900" y="330" font-size="13.5" text-anchor="middle" fill="#37474f">仅跨机时:替 kernel</text>
  <text x="900" y="350" font-size="13.5" text-anchor="middle" fill="#37474f">收发网络包</text>

  <!-- Hardware: intra (under GPU) -->
  <rect x="120" y="455" width="500" height="90" rx="16" fill="#102027"/>
  <text x="370" y="492" font-size="16" font-weight="700" text-anchor="middle" fill="#fff">卡内互联</text>
  <text x="370" y="518" font-size="13.5" text-anchor="middle" fill="#b0bec5">NVLink · NVSwitch · PCIe(GPU 直连,不经 CPU)</text>

  <!-- Hardware: inter (under proxy) -->
  <rect x="720" y="455" width="360" height="90" rx="16" fill="#102027"/>
  <text x="900" y="492" font-size="16" font-weight="700" text-anchor="middle" fill="#fff">跨机网络</text>
  <text x="900" y="518" font-size="13.5" text-anchor="middle" fill="#b0bec5">InfiniBand · RoCE · 以太网</text>

  <!-- arrows -->
  <!-- control -> GPU kernel (down) -->
  <line x1="370" y1="180" x2="370" y2="246" stroke="#8da2ad" stroke-width="2.6" marker-end="url(#ar)"/>
  <text x="384" y="218" font-size="12.5" fill="#607d8b">launch + work FIFO</text>
  <!-- GPU <-> NVLink (bidir vertical) -->
  <line x1="370" y1="369" x2="370" y2="451" stroke="#8da2ad" stroke-width="2.6" marker-start="url(#arev)" marker-end="url(#ar)"/>
  <text x="384" y="415" font-size="12.5" fill="#2e7d4f">直连读写显存</text>
  <!-- GPU <-> Proxy (bidir horizontal) -->
  <line x1="624" y1="307" x2="716" y2="307" stroke="#8da2ad" stroke-width="2.6" marker-start="url(#arev)" marker-end="url(#ar)"/>
  <text x="670" y="297" font-size="12" text-anchor="middle" fill="#9a7d1e">FIFO</text>
  <!-- Proxy <-> IB (bidir vertical) -->
  <line x1="900" y1="369" x2="900" y2="451" stroke="#8da2ad" stroke-width="2.6" marker-start="url(#arev)" marker-end="url(#ar)"/>
  <text x="914" y="415" font-size="12.5" fill="#9a7d1e">verbs / socket</text>
</svg>
