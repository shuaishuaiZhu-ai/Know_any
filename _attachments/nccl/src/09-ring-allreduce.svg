<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>Ring AllReduce 三态:初始 → Reduce-Scatter 后 → All-Gather 后</title>
  <desc>顶部一个 4 GPU 有向环 0→1→2→3→0。下方三张 4×4 状态表(行=GPU0..3,列=chunk c0..c3):
  ①初始,每格按列着色表示"GPU i 持有 chunk j 的本地份";②Reduce-Scatter 后,对角线格变深色 Σi(GPU i 攒满 chunk i),其余变灰;③All-Gather 后,所有格深色 Σ(人人齐全)。
  两个向右的阶段箭头:A→B 标 Reduce-Scatter(3步),B→C 标 All-Gather(3步)。</desc>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#4a9e63"/></marker>
    <marker id="arg" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#8da2ad"/></marker>
    <marker id="ard" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#b0808a"/></marker>
  </defs>
  <rect x="0" y="0" width="1180" height="560" rx="28" fill="#f6f8fa"/>
  <text x="40" y="42" font-size="23" font-weight="700" fill="#102027">Ring AllReduce:2(N−1) 步,以 4 个 GPU 为例</text>

  <!-- top ring -->
  <g font-size="13" text-anchor="middle" font-weight="700">
    <rect x="395" y="62" width="86" height="38" rx="9" fill="#e8f7ec" stroke="#74c98a"/><text x="438" y="86" fill="#102027">GPU0</text>
    <rect x="545" y="62" width="86" height="38" rx="9" fill="#e8f7ec" stroke="#74c98a"/><text x="588" y="86" fill="#102027">GPU1</text>
    <rect x="695" y="62" width="86" height="38" rx="9" fill="#e8f7ec" stroke="#74c98a"/><text x="738" y="86" fill="#102027">GPU2</text>
    <rect x="845" y="62" width="86" height="38" rx="9" fill="#e8f7ec" stroke="#74c98a"/><text x="888" y="86" fill="#102027">GPU3</text>
  </g>
  <g stroke="#4a9e63" stroke-width="2.8" fill="none" marker-end="url(#ar)">
    <line x1="481" y1="81" x2="541" y2="81"/>
    <line x1="631" y1="81" x2="691" y2="81"/>
    <line x1="781" y1="81" x2="841" y2="81"/>
  </g>
  <!-- wraparound 3->0 -->
  <path d="M888 100 L888 122 L438 122 L438 104" stroke="#4a9e63" stroke-width="2.4" fill="none" stroke-dasharray="6 5" marker-end="url(#ar)"/>
  <text x="663" y="138" font-size="12" text-anchor="middle" fill="#2e7d4f">环:每个 GPU 只发给后继、只收自前驱</text>

  <!-- ===== Grid A: initial ===== -->
  <text x="70" y="190" font-size="14" font-weight="700" fill="#3d7fc4">① 初始:各持全部分块</text>
  <g font-size="11" text-anchor="middle" fill="#607d8b">
    <text x="121" y="210">c0</text><text x="163" y="210">c1</text><text x="205" y="210">c2</text><text x="247" y="210">c3</text>
  </g>
  <g font-size="11" text-anchor="end" fill="#607d8b">
    <text x="92" y="240">G0</text><text x="92" y="274">G1</text><text x="92" y="308">G2</text><text x="92" y="342">G3</text>
  </g>
  <!-- cells: column color, row letter -->
  <g font-size="12" text-anchor="middle" font-weight="700">
    <!-- col0 green, col1 blue, col2 amber, col3 violet; rows 0..3 -->
    <!-- row 0 -->
    <rect x="100" y="220" width="42" height="34" fill="#74c98a"/><text x="121" y="242" fill="#fff">0</text>
    <rect x="142" y="220" width="42" height="34" fill="#6fa8e6"/><text x="163" y="242" fill="#fff">0</text>
    <rect x="184" y="220" width="42" height="34" fill="#edc870"/><text x="205" y="242" fill="#5a4500">0</text>
    <rect x="226" y="220" width="42" height="34" fill="#a98fe0"/><text x="247" y="242" fill="#fff">0</text>
    <!-- row 1 -->
    <rect x="100" y="254" width="42" height="34" fill="#74c98a"/><text x="121" y="276" fill="#fff">1</text>
    <rect x="142" y="254" width="42" height="34" fill="#6fa8e6"/><text x="163" y="276" fill="#fff">1</text>
    <rect x="184" y="254" width="42" height="34" fill="#edc870"/><text x="205" y="276" fill="#5a4500">1</text>
    <rect x="226" y="254" width="42" height="34" fill="#a98fe0"/><text x="247" y="276" fill="#fff">1</text>
    <!-- row 2 -->
    <rect x="100" y="288" width="42" height="34" fill="#74c98a"/><text x="121" y="310" fill="#fff">2</text>
    <rect x="142" y="288" width="42" height="34" fill="#6fa8e6"/><text x="163" y="310" fill="#fff">2</text>
    <rect x="184" y="288" width="42" height="34" fill="#edc870"/><text x="205" y="310" fill="#5a4500">2</text>
    <rect x="226" y="288" width="42" height="34" fill="#a98fe0"/><text x="247" y="310" fill="#fff">2</text>
    <!-- row 3 -->
    <rect x="100" y="322" width="42" height="34" fill="#74c98a"/><text x="121" y="344" fill="#fff">3</text>
    <rect x="142" y="322" width="42" height="34" fill="#6fa8e6"/><text x="163" y="344" fill="#fff">3</text>
    <rect x="184" y="322" width="42" height="34" fill="#edc870"/><text x="205" y="344" fill="#5a4500">3</text>
    <rect x="226" y="322" width="42" height="34" fill="#a98fe0"/><text x="247" y="344" fill="#fff">3</text>
  </g>
  <rect x="100" y="220" width="168" height="136" fill="none" stroke="#90a4ae"/>
  <text x="184" y="378" font-size="11" text-anchor="middle" fill="#607d8b">格内数字 = GPU 号;同列同 chunk</text>

  <!-- arrow A->B -->
  <line x1="300" y1="288" x2="468" y2="288" stroke="#8da2ad" stroke-width="3" marker-end="url(#arg)"/>
  <text x="384" y="278" font-size="13" font-weight="700" text-anchor="middle" fill="#102027">Reduce-Scatter</text>
  <text x="384" y="304" font-size="11.5" text-anchor="middle" fill="#607d8b">3 步:收+加+发</text>

  <!-- ===== Grid B: after reduce-scatter ===== -->
  <text x="470" y="190" font-size="14" font-weight="700" fill="#9a7d1e">② RS 后:各攒满 1 块</text>
  <g font-size="11" text-anchor="middle" fill="#607d8b">
    <text x="521" y="210">c0</text><text x="563" y="210">c1</text><text x="605" y="210">c2</text><text x="647" y="210">c3</text>
  </g>
  <g font-size="11" text-anchor="end" fill="#607d8b">
    <text x="492" y="240">G0</text><text x="492" y="274">G1</text><text x="492" y="308">G2</text><text x="492" y="342">G3</text>
  </g>
  <!-- diagonal dark Σi, others gray -->
  <g font-size="11.5" text-anchor="middle" font-weight="700">
    <rect x="500" y="220" width="42" height="34" fill="#102027"/><text x="521" y="242" fill="#fff">Σ0</text>
    <rect x="542" y="220" width="42" height="34" fill="#eef1f3" stroke="#d6dde2"/>
    <rect x="584" y="220" width="42" height="34" fill="#eef1f3" stroke="#d6dde2"/>
    <rect x="626" y="220" width="42" height="34" fill="#eef1f3" stroke="#d6dde2"/>

    <rect x="500" y="254" width="42" height="34" fill="#eef1f3" stroke="#d6dde2"/>
    <rect x="542" y="254" width="42" height="34" fill="#102027"/><text x="563" y="276" fill="#fff">Σ1</text>
    <rect x="584" y="254" width="42" height="34" fill="#eef1f3" stroke="#d6dde2"/>
    <rect x="626" y="254" width="42" height="34" fill="#eef1f3" stroke="#d6dde2"/>

    <rect x="500" y="288" width="42" height="34" fill="#eef1f3" stroke="#d6dde2"/>
    <rect x="542" y="288" width="42" height="34" fill="#eef1f3" stroke="#d6dde2"/>
    <rect x="584" y="288" width="42" height="34" fill="#102027"/><text x="605" y="310" fill="#fff">Σ2</text>
    <rect x="626" y="288" width="42" height="34" fill="#eef1f3" stroke="#d6dde2"/>

    <rect x="500" y="322" width="42" height="34" fill="#eef1f3" stroke="#d6dde2"/>
    <rect x="542" y="322" width="42" height="34" fill="#eef1f3" stroke="#d6dde2"/>
    <rect x="584" y="322" width="42" height="34" fill="#eef1f3" stroke="#d6dde2"/>
    <rect x="626" y="322" width="42" height="34" fill="#102027"/><text x="647" y="344" fill="#fff">Σ3</text>
  </g>
  <rect x="500" y="220" width="168" height="136" fill="none" stroke="#90a4ae"/>
  <text x="584" y="378" font-size="11" text-anchor="middle" fill="#607d8b">对角线 = GPU i 持完整 Σi</text>

  <!-- arrow B->C -->
  <line x1="700" y1="288" x2="868" y2="288" stroke="#8da2ad" stroke-width="3" marker-end="url(#arg)"/>
  <text x="784" y="278" font-size="13" font-weight="700" text-anchor="middle" fill="#102027">All-Gather</text>
  <text x="784" y="304" font-size="11.5" text-anchor="middle" fill="#607d8b">3 步:收+存+发</text>

  <!-- ===== Grid C: after all-gather ===== -->
  <text x="870" y="190" font-size="14" font-weight="700" fill="#2e7d4f">③ AG 后:人人齐全</text>
  <g font-size="11" text-anchor="middle" fill="#607d8b">
    <text x="921" y="210">c0</text><text x="963" y="210">c1</text><text x="1005" y="210">c2</text><text x="1047" y="210">c3</text>
  </g>
  <g font-size="11" text-anchor="end" fill="#607d8b">
    <text x="892" y="240">G0</text><text x="892" y="274">G1</text><text x="892" y="308">G2</text><text x="892" y="342">G3</text>
  </g>
  <g font-size="11.5" text-anchor="middle" font-weight="700" fill="#fff">
    <rect x="900" y="220" width="42" height="34" fill="#102027"/><text x="921" y="242">Σ0</text>
    <rect x="942" y="220" width="42" height="34" fill="#102027"/><text x="963" y="242">Σ1</text>
    <rect x="984" y="220" width="42" height="34" fill="#102027"/><text x="1005" y="242">Σ2</text>
    <rect x="1026" y="220" width="42" height="34" fill="#102027"/><text x="1047" y="242">Σ3</text>
    <rect x="900" y="254" width="42" height="34" fill="#102027"/><text x="921" y="276">Σ0</text>
    <rect x="942" y="254" width="42" height="34" fill="#102027"/><text x="963" y="276">Σ1</text>
    <rect x="984" y="254" width="42" height="34" fill="#102027"/><text x="1005" y="276">Σ2</text>
    <rect x="1026" y="254" width="42" height="34" fill="#102027"/><text x="1047" y="276">Σ3</text>
    <rect x="900" y="288" width="42" height="34" fill="#102027"/><text x="921" y="310">Σ0</text>
    <rect x="942" y="288" width="42" height="34" fill="#102027"/><text x="963" y="310">Σ1</text>
    <rect x="984" y="288" width="42" height="34" fill="#102027"/><text x="1005" y="310">Σ2</text>
    <rect x="1026" y="288" width="42" height="34" fill="#102027"/><text x="1047" y="310">Σ3</text>
    <rect x="900" y="322" width="42" height="34" fill="#102027"/><text x="921" y="344">Σ0</text>
    <rect x="942" y="322" width="42" height="34" fill="#102027"/><text x="963" y="344">Σ1</text>
    <rect x="984" y="322" width="42" height="34" fill="#102027"/><text x="1005" y="344">Σ2</text>
    <rect x="1026" y="322" width="42" height="34" fill="#102027"/><text x="1047" y="344">Σ3</text>
  </g>
  <rect x="900" y="220" width="168" height="136" fill="none" stroke="#90a4ae"/>
  <text x="984" y="378" font-size="11" text-anchor="middle" fill="#607d8b">每个 GPU 拥有全部 Σ</text>

  <!-- bottom takeaway -->
  <rect x="60" y="420" width="1060" height="96" rx="14" fill="#fff" stroke="#d6dde2"/>
  <text x="80" y="450" font-size="14" font-weight="700" fill="#102027">要点</text>
  <text x="80" y="476" font-size="13.5" fill="#37474f">• 共 2(N−1) 步:Reduce-Scatter(N−1)让每块在环上转一圈累加,再 All-Gather(N−1)把完整块传遍。</text>
  <text x="80" y="500" font-size="13.5" fill="#37474f">• 每个 GPU 收发各 ≈ 2(N−1)/N × S ≈ 2S,与 N 几乎无关 → 大消息带宽最优;代价是延迟随 N 线性增长。</text>
</svg>
