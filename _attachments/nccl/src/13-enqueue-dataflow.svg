<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>enqueue → kernel launch 数据流</title>
  <desc>上排 CPU 控制面 5 个阶段框,左到右用箭头串联:API → enqueueCheck/taskAppend → launchPrepare/plan → uploadWork/FIFO → cuLaunchKernel。最后一个框向下箭头进入 GPU 数据面框。所有箭头方向沿流程,head 落在下一个框。</desc>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#8da2ad"/></marker>
  </defs>
  <rect x="0" y="0" width="1180" height="520" rx="28" fill="#f6f8fa"/>
  <text x="40" y="42" font-size="22" font-weight="700" fill="#102027">enqueue → kernel launch:一次调用怎么变成 GPU kernel</text>

  <text x="40" y="86" font-size="14" font-weight="700" fill="#3d7fc4">CPU 控制面(host)</text>

  <!-- 5 stage boxes -->
  <g font-size="12.5">
    <g><rect x="40" y="100" width="150" height="92" rx="11" fill="#102027"/><text x="115" y="140" font-size="14" font-weight="700" text-anchor="middle" fill="#fff">ncclAllReduce</text><text x="115" y="162" text-anchor="middle" fill="#b0bec5">API(第01章)</text></g>

    <g><rect x="210" y="100" width="220" height="92" rx="11" fill="#e8f1fd" stroke="#6fa8e6"/><text x="320" y="128" font-weight="700" text-anchor="middle" fill="#102027">① ncclEnqueueCheck</text><text x="320" y="150" text-anchor="middle" fill="#37474f">→ taskAppend</text><text x="320" y="170" text-anchor="middle" fill="#37474f">ncclTaskColl 入 planner</text></g>

    <g><rect x="450" y="100" width="220" height="92" rx="11" fill="#e8f1fd" stroke="#6fa8e6"/><text x="560" y="128" font-weight="700" text-anchor="middle" fill="#102027">② ncclLaunchPrepare</text><text x="560" y="150" text-anchor="middle" fill="#37474f">scheduleColl…ToPlan</text><text x="560" y="170" text-anchor="middle" fill="#37474f">→ ncclKernelPlan</text></g>

    <g><rect x="690" y="100" width="200" height="92" rx="11" fill="#e8f1fd" stroke="#6fa8e6"/><text x="790" y="128" font-weight="700" text-anchor="middle" fill="#102027">③ uploadWork</text><text x="790" y="150" text-anchor="middle" fill="#37474f">序列化进 work FIFO</text><text x="790" y="170" text-anchor="middle" fill="#607d8b">workFifoProduced→</text></g>

    <g><rect x="910" y="100" width="230" height="92" rx="11" fill="#fff8e6" stroke="#edc870"/><text x="1025" y="128" font-weight="700" text-anchor="middle" fill="#102027">④ ncclLaunchKernel</text><text x="1025" y="150" text-anchor="middle" fill="#37474f">cuLaunchKernel</text><text x="1025" y="170" text-anchor="middle" fill="#37474f">grid = nChannels</text></g>
  </g>

  <!-- horizontal arrows -->
  <g stroke="#8da2ad" stroke-width="2.4" fill="none" marker-end="url(#ar)">
    <line x1="190" y1="146" x2="206" y2="146"/>
    <line x1="430" y1="146" x2="446" y2="146"/>
    <line x1="670" y1="146" x2="686" y2="146"/>
    <line x1="890" y1="146" x2="906" y2="146"/>
  </g>
  <!-- group boundary note -->
  <text x="440" y="216" font-size="11.5" text-anchor="middle" fill="#9a7d1e">↑ group 累积 ┊ ncclGroupEnd 触发 ↓ schedule+launch</text>

  <!-- arrow down to GPU -->
  <line x1="1025" y1="192" x2="1025" y2="300" stroke="#8da2ad" stroke-width="2.6" marker-end="url(#ar)"/>
  <text x="1040" y="250" font-size="12" fill="#607d8b">launch</text>

  <!-- GPU box -->
  <text x="450" y="290" font-size="14" font-weight="700" fill="#2e7d4f">GPU 数据面(device)</text>
  <rect x="450" y="300" width="690" height="110" rx="14" fill="#e8f7ec" stroke="#74c98a" stroke-width="2.4"/>
  <text x="795" y="334" font-size="15" font-weight="700" text-anchor="middle" fill="#102027">ncclDevKernel(grid = nChannels 个 block)</text>
  <text x="795" y="360" font-size="13" text-anchor="middle" fill="#37474f">每个 block 按 blockIdx 取自己 channel 的 work(从 work FIFO)</text>
  <text x="795" y="382" font-size="13" text-anchor="middle" fill="#37474f">→ 查 funcId → runRing / runTree(第09章用 prims 边搬边算)</text>

  <!-- work FIFO bridge note -->
  <rect x="40" y="300" width="360" height="110" rx="14" fill="#fff" stroke="#d6dde2"/>
  <text x="60" y="328" font-size="13.5" font-weight="700" fill="#102027">work FIFO = host→GPU 的桥</text>
  <text x="60" y="354" font-size="12.5" fill="#37474f">CPU 生产 work(Produced),GPU 消费(Consumed)</text>
  <text x="60" y="378" font-size="12.5" fill="#37474f">CUDA Graph 捕获时改用持久缓冲,</text>
  <text x="60" y="398" font-size="12.5" fill="#37474f">录一次重放多次 → 摊薄 enqueue CPU 开销</text>

  <text x="40" y="448" font-size="12.5" fill="#607d8b">关键:多次调用可合并进一个 plan(一次 launch);grid 维度 = 活跃 channel 数,一个 block 跑一条 channel。</text>
</svg>
