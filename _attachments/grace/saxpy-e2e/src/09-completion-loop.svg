<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="700" viewBox="0 0 1180 700" role="img" aria-labelledby="t d">
  <title id="t">完成回路：fence + MSI-X 中断</title>
  <desc id="d">CP 写递增 fence 让用户比大小判完成，并抬 MSI-X 向量40，KMD 中断下半部唤醒等待线程。</desc>
  <defs>
    <style>
      .title{font:800 24px ui-sans-serif,system-ui,"Segoe UI",sans-serif;fill:#102027}
      .sub{font:500 13.5px ui-sans-serif,system-ui,"Segoe UI",sans-serif;fill:#526672}
      .h{font:800 15px ui-sans-serif,system-ui,"Segoe UI",sans-serif;fill:#102027}
      .b{font:500 12.5px ui-sans-serif,system-ui,"Segoe UI",sans-serif;fill:#2f3e46}
      .s{font:600 11.5px ui-sans-serif,system-ui,"Segoe UI",sans-serif;fill:#526672}
      .mono{font:600 11.5px ui-monospace,Consolas,monospace;fill:#1b3a4b}
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L10 5 L0 10 z" fill="#8da2ad"/></marker>
  </defs>
  <rect width="1180" height="700" rx="20" fill="#f6f8fa"/>
  <text x="40" y="44" class="title">第 5 关：怎么知道“算完了”——取餐号 + 叫号广播</text>
  <text x="40" y="70" class="sub">不傻等、不轮询硬件：fence（比大小即知完成）+ MSI-X 中断（主动叫号唤醒）两件套。</text>

  <!-- LEFT: fence -->
  <rect x="40" y="90" width="555" height="430" rx="16" fill="#fff7e3" stroke="#e6bd5c" stroke-width="1.3"/>
  <text x="62" y="122" class="h">取餐号 · fence 时间戳（比大小）</text>
  <rect x="62" y="140" width="510" height="74" rx="10" fill="#ffffff" stroke="#e0bd6a"/>
  <text x="78" y="164" class="b">① 派发时埋号：dispatch packet 里 fence_addr + 预期 fence_value</text>
  <text x="78" y="184" class="s">（HWS 主路径：UMD 填；KMD 路径则由 aigc_ts_copy 盖进 SIGNAL_FENCE 包）</text>
  <text x="78" y="204" class="s">fence 缓冲被映射进该 context 的 GPU 地址空间</text>
  <rect x="62" y="226" width="510" height="58" rx="10" fill="#ffffff" stroke="#e0bd6a"/>
  <text x="78" y="250" class="b">② CP 把 kernel 跑完后，把递增的完成号写进 fence 缓冲</text>
  <text x="78" y="270" class="mono">fence_buf = expected_value（单调递增）</text>
  <rect x="62" y="296" width="510" height="58" rx="10" fill="#e6f6ef" stroke="#56bf93"/>
  <text x="78" y="320" class="b">③ 用户侧只需比大小：</text>
  <text x="78" y="340" class="mono">fence_buf ≥ 我记下的 expected ? → 完成</text>
  <path d="M317 214 V226" stroke="#8da2ad" stroke-width="2" marker-end="url(#a)"/>
  <path d="M317 284 V296" stroke="#8da2ad" stroke-width="2" marker-end="url(#a)"/>
  <rect x="62" y="372" width="510" height="130" rx="10" fill="#f7f9fa" stroke="#e0e6ea"/>
  <text x="78" y="396" class="h">为什么这样设计</text>
  <text x="78" y="420" class="b">· 比大小 = 一次内存读，不用读硬件状态寄存器（省总线/省 CPU）</text>
  <text x="78" y="444" class="b">· 单调递增天然支持乱序完成、批量完成</text>
  <text x="78" y="468" class="b">· 配合下面的中断：平时不轮询，被“叫号”才去比一次</text>
  <text x="78" y="492" class="s">对应页：kmd/interrupt/aigc_kmd_fence</text>

  <!-- RIGHT: interrupt -->
  <rect x="615" y="90" width="525" height="430" rx="16" fill="#eaf2fd" stroke="#6fa8e6" stroke-width="1.3"/>
  <text x="637" y="122" class="h">叫号广播 · MSI-X 中断</text>
  <rect x="637" y="140" width="480" height="86" rx="10" fill="#ffffff" stroke="#9cc3ee"/>
  <text x="653" y="164" class="b">CP 完成时抬一个 MSI-X 中断。kernel 计算完成用——</text>
  <rect x="653" y="176" width="200" height="34" rx="8" fill="#fdeeee" stroke="#d9534f" stroke-width="1.3"/>
  <text x="753" y="198" text-anchor="middle" class="b" fill="#a83b38">向量 40（CP event-signal）</text>
  <text x="868" y="190" class="s">别认错：</text>
  <text x="868" y="207" class="s">39=CP TCU · 41=err</text>
  <text x="637" y="252" class="s">其它向量：111=CP 固件命令 ack（建/销队列）、109=IMC ack —— 都不是 kernel 计算完成。</text>
  <rect x="637" y="268" width="480" height="68" rx="10" fill="#ffffff" stroke="#9cc3ee"/>
  <text x="653" y="292" class="b">上半部（硬中断，必须极快）</text>
  <text x="653" y="313" class="mono">aigc_lib_irq_*（每向量）：读 + 清中断状态</text>
  <text x="653" y="330" class="s">标记 need_bh，立刻返回（不在硬中断里干重活）</text>
  <rect x="637" y="350" width="480" height="86" rx="10" fill="#ffffff" stroke="#9cc3ee"/>
  <text x="653" y="374" class="b">下半部（workqueue / 线程，可以慢慢干）</text>
  <text x="653" y="395" class="mono">EngineMapEvent → record_irq_event()</text>
  <text x="653" y="414" class="mono">→ tracker_record_irq_event()</text>
  <text x="653" y="431" class="s">把“哪个引擎完成”翻成事件、推给注册的客户端、唤醒线程</text>
  <path d="M877 226 V268" stroke="#8da2ad" stroke-width="2" marker-end="url(#a)"/>
  <path d="M877 336 V350" stroke="#8da2ad" stroke-width="2" marker-end="url(#a)"/>
  <rect x="637" y="450" width="480" height="52" rx="10" fill="#e6f6ef" stroke="#56bf93"/>
  <text x="653" y="473" class="b">main() 被唤醒 → aicaMemcpy 把显存里的 10 拷回 hostA</text>
  <text x="653" y="492" class="mono">assert(*hostA == 10) 通过 → 层层释放</text>

  <text x="40" y="548" class="s">源码确认：kmd/interrupt aigc_interrupt / aigc_kmd_fence；fence 缓冲映射见 mem/context 流程。fence 地址来源按路径不同（HWS=UMD 设；KMD 路径=aigc_ts_copy）。</text>
</svg>
