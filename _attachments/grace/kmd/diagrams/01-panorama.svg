<svg xmlns="http://www.w3.org/2000/svg" width="760" height="680" viewBox="0 0 760 680" font-family="Noto Sans CJK SC, sans-serif">
  <defs>
    <marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#52606d"/>
    </marker>
    <marker id="arrowD" markerUnits="userSpaceOnUse" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#a86fa0"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#9aa5b1" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="760" height="680" fill="#fffdf6"/>
  <text x="380" y="40" font-size="20" font-weight="bold" text-anchor="middle" fill="#1f2933">kmd 在软件栈中的位置</text>

  <!-- UMD -->
  <g filter="url(#sh)">
    <rect x="250" y="64" width="260" height="66" rx="16" fill="#eef3fb" stroke="#7b93ad" stroke-width="2"/>
  </g>
  <text x="380" y="93" font-size="16" font-weight="bold" text-anchor="middle" fill="#243b53">UMD</text>
  <text x="380" y="116" font-size="13" text-anchor="middle" fill="#486581">应用 / 运行时</text>

  <!-- thunk -->
  <g filter="url(#sh)">
    <rect x="250" y="178" width="260" height="66" rx="16" fill="#eef3fb" stroke="#7b93ad" stroke-width="2"/>
  </g>
  <text x="380" y="207" font-size="16" font-weight="bold" text-anchor="middle" fill="#243b53">ajthunk 用户态库</text>
  <text x="380" y="230" font-size="13" text-anchor="middle" fill="#486581">Thunk_* C API</text>

  <!-- /dev/aigc -->
  <g filter="url(#sh)">
    <rect x="250" y="292" width="260" height="66" rx="16" fill="#fff4e0" stroke="#d9a441" stroke-width="2"/>
  </g>
  <text x="380" y="321" font-size="16" font-weight="bold" text-anchor="middle" fill="#8a5a00">/dev/aigcN  字符设备</text>
  <text x="380" y="344" font-size="13" text-anchor="middle" fill="#8a5a00">ioctl(fd, AIP_*, args)</text>

  <!-- kmd (highlight) -->
  <g filter="url(#sh)">
    <rect x="232" y="406" width="296" height="74" rx="16" fill="#e3f0e3" stroke="#5a9367" stroke-width="3"/>
  </g>
  <text x="380" y="436" font-size="17" font-weight="bold" text-anchor="middle" fill="#2f6b3a">kmd  内核态驱动 (aigc.ko)</text>
  <text x="380" y="461" font-size="13" text-anchor="middle" fill="#3a7a47">本知识库讲的就是这一层</text>

  <!-- Grace HW -->
  <g filter="url(#sh)">
    <rect x="406" y="560" width="240" height="74" rx="16" fill="#f6e8f3" stroke="#a86fa0" stroke-width="2"/>
  </g>
  <text x="526" y="592" font-size="16" font-weight="bold" text-anchor="middle" fill="#7a3f72">Grace GPU 硬件</text>
  <text x="526" y="615" font-size="12.5" text-anchor="middle" fill="#8a5082">计算单元 + 命令处理器 CP</text>

  <!-- fw -->
  <g filter="url(#sh)">
    <rect x="92" y="560" width="246" height="74" rx="16" fill="#f6e8f3" stroke="#a86fa0" stroke-width="2"/>
  </g>
  <text x="215" y="592" font-size="16" font-weight="bold" text-anchor="middle" fill="#7a3f72">fw  片上固件</text>
  <text x="215" y="615" font-size="12.5" text-anchor="middle" fill="#8a5082">IMC / CP master（姊妹项目）</text>

  <!-- arrows main spine -->
  <line x1="380" y1="130" x2="380" y2="176" stroke="#52606d" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="392" y="158" font-size="12" fill="#52606d">调用 C API</text>
  <line x1="380" y1="244" x2="380" y2="290" stroke="#52606d" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="392" y="272" font-size="12" fill="#52606d">系统调用</text>
  <line x1="380" y1="358" x2="380" y2="404" stroke="#52606d" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="392" y="386" font-size="12" fill="#52606d">进入内核</text>

  <!-- kmd -> HW -->
  <line x1="430" y1="480" x2="500" y2="558" stroke="#52606d" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="470" y="524" font-size="12" fill="#52606d">寄存器 + DMA</text>

  <!-- kmd <-> fw dashed -->
  <line x1="300" y1="480" x2="232" y2="558" stroke="#a86fa0" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowD)"/>
  <text x="150" y="520" font-size="12" fill="#9a5a90">CP / IMC IPC 环</text>

  <!-- fw -> HW dashed -->
  <line x1="338" y1="597" x2="404" y2="597" stroke="#a86fa0" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowD)"/>
  <text x="372" y="588" font-size="11.5" text-anchor="middle" fill="#9a5a90">驱动片内</text>
</svg>
