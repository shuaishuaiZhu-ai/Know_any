<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" font-family="Noto Sans CJK SC, sans-serif">
  <defs>
    <marker id="a" markerUnits="userSpaceOnUse" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#52606d"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.8" flood-color="#9aa5b1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1000" height="500" fill="#fffdf6"/>
  <text x="500" y="34" font-size="19" font-weight="bold" text-anchor="middle" fill="#1f2933">显存来自哪：堆 + NUMA / UMA</text>

  <!-- top: heap selects backing -->
  <g filter="url(#sh)"><rect x="320" y="52" width="360" height="58" rx="13" fill="#eef3fb" stroke="#7b93ad" stroke-width="2"/></g>
  <text x="500" y="78" font-size="13.5" font-weight="bold" text-anchor="middle" fill="#243b53">mem_handle：heap + numa_mode 决定后端</text>
  <text x="500" y="98" font-size="11.5" text-anchor="middle" fill="#486581">enum MemHeap / enum MemNuma</text>

  <!-- three heaps -->
  <g filter="url(#sh)"><rect x="40" y="166" width="270" height="84" rx="12" fill="#e3f0e3" stroke="#5a9367" stroke-width="2"/></g>
  <text x="175" y="194" font-size="13.5" font-weight="bold" text-anchor="middle" fill="#2f6b3a">MH_HOST</text>
  <text x="175" y="216" font-size="11.5" text-anchor="middle" fill="#3a7a47">系统（主机）内存</text>
  <text x="175" y="236" font-size="11" text-anchor="middle" fill="#6a9a76">pin 用户页并 DMA 映射</text>

  <g filter="url(#sh)"><rect x="365" y="166" width="270" height="84" rx="12" fill="#fff4e0" stroke="#d9a441" stroke-width="2.2"/></g>
  <text x="500" y="194" font-size="13.5" font-weight="bold" text-anchor="middle" fill="#8a5a00">MH_DEVICE（显存 VRAM）</text>
  <text x="500" y="216" font-size="11.5" text-anchor="middle" fill="#9a6a1a">从每-cluster 设备 gen_pool 取</text>
  <text x="500" y="236" font-size="11" text-anchor="middle" fill="#9a6a1a">dev_mem_alloc()</text>

  <g filter="url(#sh)"><rect x="690" y="166" width="270" height="84" rx="12" fill="#f6e8f3" stroke="#a86fa0" stroke-width="2"/></g>
  <text x="825" y="194" font-size="13.5" font-weight="bold" text-anchor="middle" fill="#7a3f72">MH_OTHER_DEVICE</text>
  <text x="825" y="216" font-size="11.5" text-anchor="middle" fill="#8a5082">另一块 PCI 设备（peer）</text>
  <text x="825" y="236" font-size="11" text-anchor="middle" fill="#8a5082">DSMEM / 远端 DPA</text>

  <line x1="430" y1="110" x2="200" y2="164" stroke="#52606d" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="500" y1="110" x2="500" y2="164" stroke="#52606d" stroke-width="2" marker-end="url(#a)"/>
  <line x1="570" y1="110" x2="800" y2="164" stroke="#52606d" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- device placement modes -->
  <g filter="url(#sh)"><rect x="300" y="312" width="190" height="84" rx="12" fill="#fff7e8" stroke="#d9a441" stroke-width="1.8"/></g>
  <text x="395" y="340" font-size="13" font-weight="bold" text-anchor="middle" fill="#8a5a00">DEV_NUMA</text>
  <text x="395" y="362" font-size="11" text-anchor="middle" fill="#9a6a1a">绑定单个 NUMA 节点</text>
  <text x="395" y="381" font-size="11" text-anchor="middle" fill="#9a6a1a">PTE 置 AIP_MP_NUMA</text>

  <g filter="url(#sh)"><rect x="520" y="312" width="240" height="84" rx="12" fill="#fff7e8" stroke="#d9a441" stroke-width="1.8"/></g>
  <text x="640" y="340" font-size="13" font-weight="bold" text-anchor="middle" fill="#8a5a00">DEV_UMA</text>
  <text x="640" y="362" font-size="11" text-anchor="middle" fill="#9a6a1a">跨所有节点条带交织（0xff）</text>
  <text x="640" y="381" font-size="11" text-anchor="middle" fill="#9a6a1a">PTE 置 AIP_MP_UMA</text>

  <line x1="470" y1="250" x2="410" y2="310" stroke="#52606d" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="540" y1="250" x2="610" y2="310" stroke="#52606d" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- note -->
  <g filter="url(#sh)"><rect x="300" y="430" width="460" height="46" rx="11" fill="#fffbe6" stroke="#c9a227" stroke-width="1.4"/></g>
  <text x="530" y="458" font-size="11.5" text-anchor="middle" fill="#7a611a">UMA 条带粒度由模块参数 interleave_gran 决定（512B / 1KB / 2KB / 4KB）</text>
</svg>
