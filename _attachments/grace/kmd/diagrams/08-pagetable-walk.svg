<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="600" viewBox="0 0 1040 600" font-family="Noto Sans CJK SC, sans-serif">
  <defs>
    <marker id="a" markerUnits="userSpaceOnUse" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#52606d"/>
    </marker>
    <marker id="ab" markerUnits="userSpaceOnUse" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#d9a441"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.8" flood-color="#9aa5b1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1040" height="600" fill="#fffdf6"/>
  <text x="520" y="34" font-size="19" font-weight="bold" text-anchor="middle" fill="#1f2933">GPU 虚拟地址的 4 级页表遍历（48 位 VA）</text>

  <!-- VA bit bar -->
  <g font-size="11.5">
    <rect x="40"  y="60" width="180" height="46" fill="#eef3fb" stroke="#7b93ad" stroke-width="1.6"/>
    <rect x="220" y="60" width="180" height="46" fill="#e0f0ef" stroke="#5a9b97" stroke-width="1.6"/>
    <rect x="400" y="60" width="180" height="46" fill="#fff4e0" stroke="#d9a441" stroke-width="1.6"/>
    <rect x="580" y="60" width="180" height="46" fill="#f6e8f3" stroke="#a86fa0" stroke-width="1.6"/>
    <rect x="760" y="60" width="240" height="46" fill="#eceff3" stroke="#7b8794" stroke-width="1.6"/>
    <text x="130" y="80" text-anchor="middle" font-weight="bold" fill="#243b53">PL0 索引</text>
    <text x="130" y="98" text-anchor="middle" fill="#5d6b79">bits 47:39</text>
    <text x="310" y="80" text-anchor="middle" font-weight="bold" fill="#2f6b67">PL1 索引</text>
    <text x="310" y="98" text-anchor="middle" fill="#5d6b79">bits 38:30</text>
    <text x="490" y="80" text-anchor="middle" font-weight="bold" fill="#8a5a00">PL2 索引</text>
    <text x="490" y="98" text-anchor="middle" fill="#5d6b79">bits 29:21</text>
    <text x="670" y="80" text-anchor="middle" font-weight="bold" fill="#7a3f72">PL3 索引</text>
    <text x="670" y="98" text-anchor="middle" fill="#5d6b79">bits 20:12</text>
    <text x="880" y="80" text-anchor="middle" font-weight="bold" fill="#32404d">页内偏移</text>
    <text x="880" y="98" text-anchor="middle" fill="#5d6b79">bits 11:0（4K 页）</text>
  </g>
  <text x="40" y="128" font-size="11" fill="#7a8a99">每级取 9 位（mask 0x1ff）索引一张表页；VMID 选定根表 TTBA。</text>

  <!-- level boxes -->
  <g filter="url(#sh)"><rect x="40" y="180" width="155" height="92" rx="13" fill="#eef3fb" stroke="#7b93ad" stroke-width="2"/></g>
  <text x="117" y="212" font-size="14" font-weight="bold" text-anchor="middle" fill="#243b53">PL0 根</text>
  <text x="117" y="234" font-size="11" text-anchor="middle" fill="#486581">PD3 / TTBA</text>
  <text x="117" y="254" font-size="11" text-anchor="middle" fill="#7a8a99">shift 39</text>

  <g filter="url(#sh)"><rect x="255" y="180" width="155" height="92" rx="13" fill="#e0f0ef" stroke="#5a9b97" stroke-width="2"/></g>
  <text x="332" y="212" font-size="14" font-weight="bold" text-anchor="middle" fill="#2f6b67">PL1</text>
  <text x="332" y="234" font-size="11" text-anchor="middle" fill="#3a7a76">PDE 表页</text>
  <text x="332" y="254" font-size="11" text-anchor="middle" fill="#6a8a86">shift 30</text>

  <g filter="url(#sh)"><rect x="470" y="180" width="155" height="92" rx="13" fill="#fff4e0" stroke="#d9a441" stroke-width="2"/></g>
  <text x="547" y="212" font-size="14" font-weight="bold" text-anchor="middle" fill="#8a5a00">PL2</text>
  <text x="547" y="234" font-size="11" text-anchor="middle" fill="#9a6a1a">PDE 表页</text>
  <text x="547" y="254" font-size="11" text-anchor="middle" fill="#9a6a1a">shift 21</text>

  <g filter="url(#sh)"><rect x="685" y="180" width="155" height="92" rx="13" fill="#f6e8f3" stroke="#a86fa0" stroke-width="2"/></g>
  <text x="762" y="212" font-size="14" font-weight="bold" text-anchor="middle" fill="#7a3f72">PL3 叶</text>
  <text x="762" y="234" font-size="11" text-anchor="middle" fill="#8a5082">PTE 表页</text>
  <text x="762" y="254" font-size="11" text-anchor="middle" fill="#8a5082">shift = 页大小</text>

  <g filter="url(#sh)"><rect x="895" y="180" width="120" height="92" rx="13" fill="#e3f0e3" stroke="#5a9367" stroke-width="2.2"/></g>
  <text x="955" y="216" font-size="14" font-weight="bold" text-anchor="middle" fill="#2f6b3a">4K</text>
  <text x="955" y="238" font-size="11.5" text-anchor="middle" fill="#3a7a47">物理页</text>

  <!-- arrows between levels -->
  <line x1="195" y1="226" x2="253" y2="226" stroke="#52606d" stroke-width="2.2" marker-end="url(#a)"/>
  <line x1="410" y1="226" x2="468" y2="226" stroke="#52606d" stroke-width="2.2" marker-end="url(#a)"/>
  <line x1="625" y1="226" x2="683" y2="226" stroke="#52606d" stroke-width="2.2" marker-end="url(#a)"/>
  <line x1="840" y1="226" x2="893" y2="226" stroke="#52606d" stroke-width="2.2" marker-end="url(#a)"/>

  <!-- VA segment -> level (dashed) -->
  <line x1="130" y1="106" x2="117" y2="178" stroke="#9fb0c0" stroke-width="1.3" stroke-dasharray="4 4"/>
  <line x1="310" y1="106" x2="332" y2="178" stroke="#9fb0c0" stroke-width="1.3" stroke-dasharray="4 4"/>
  <line x1="490" y1="106" x2="547" y2="178" stroke="#9fb0c0" stroke-width="1.3" stroke-dasharray="4 4"/>
  <line x1="670" y1="106" x2="762" y2="178" stroke="#9fb0c0" stroke-width="1.3" stroke-dasharray="4 4"/>
  <line x1="880" y1="106" x2="955" y2="178" stroke="#9fb0c0" stroke-width="1.3" stroke-dasharray="4 4"/>

  <!-- block mapping branch from PL2 -->
  <g filter="url(#sh)"><rect x="445" y="372" width="280" height="86" rx="13" fill="#fff7e8" stroke="#c98a1f" stroke-width="2"/></g>
  <text x="585" y="400" font-size="13.5" font-weight="bold" text-anchor="middle" fill="#8a5a00">大页（block mapping）</text>
  <text x="585" y="422" font-size="11.5" text-anchor="middle" fill="#9a6a1a">2M 模式：blk_mapping 置位时</text>
  <text x="585" y="442" font-size="11.5" text-anchor="middle" fill="#9a6a1a">止于 PL2，直接写 2M 大页叶子（mk_pl2_pte）</text>
  <line x1="547" y1="272" x2="560" y2="370" stroke="#d9a441" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ab)"/>

  <!-- note -->
  <g filter="url(#sh)"><rect x="60" y="500" width="920" height="62" rx="12" fill="#ffffff" stroke="#7b93ad" stroke-width="1.4"/></g>
  <text x="520" y="524" font-size="12" font-weight="bold" text-anchor="middle" fill="#243b53">支持页大小 4K / 16K / 64K / 2M（AIGC_PG_SZ_*），由编译期 AIGC_PG_MODE 选默认设备页模式</text>
  <text x="520" y="546" font-size="11.5" text-anchor="middle" fill="#5d6b79">改 PTE 后用 aigc_mmu_invalid_tlb() 对 CP 和每个活跃 cluster TCU 做范围 TLB 失效（按 VMID）</text>
</svg>
