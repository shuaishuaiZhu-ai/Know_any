<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" viewBox="0 0 900 640" font-family="Noto Sans CJK SC, sans-serif">
  <defs>
    <marker id="a" markerUnits="userSpaceOnUse" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#52606d"/>
    </marker>
    <marker id="ao" markerUnits="userSpaceOnUse" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#d9a441"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="135%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.8" flood-color="#9aa5b1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="900" height="640" fill="#fffdf6"/>
  <text x="450" y="38" font-size="20" font-weight="bold" text-anchor="middle" fill="#1f2933">kmd 三层架构</text>

  <!-- Layer 1: entry -->
  <rect x="36" y="62" width="828" height="150" rx="18" fill="#fff7e8" stroke="#d9a441" stroke-width="2.5"/>
  <text x="58" y="90" font-size="15" font-weight="bold" fill="#8a5a00">① 驱动入口层  kmd/aigc/*.c</text>
  <text x="350" y="90" font-size="12.5" fill="#a9762a">（唯一允许直接调用 Linux 内核 API）</text>
  <g filter="url(#sh)"><rect x="58" y="106" width="250" height="86" rx="12" fill="#ffffff" stroke="#d9a441" stroke-width="1.6"/></g>
  <text x="183" y="138" font-size="14" font-weight="bold" text-anchor="middle" fill="#6b4500">aigc_drv.c</text>
  <text x="183" y="160" font-size="12" text-anchor="middle" fill="#7a5a2a">PCI probe / BAR</text>
  <text x="183" y="179" font-size="12" text-anchor="middle" fill="#7a5a2a">MSI-X / 模块参数</text>
  <g filter="url(#sh)"><rect x="325" y="106" width="248" height="86" rx="12" fill="#ffffff" stroke="#d9a441" stroke-width="1.6"/></g>
  <text x="449" y="138" font-size="14" font-weight="bold" text-anchor="middle" fill="#6b4500">aigc_ioctl.c</text>
  <text x="449" y="160" font-size="12" text-anchor="middle" fill="#7a5a2a">fops（open/ioctl/mmap）</text>
  <text x="449" y="179" font-size="12" text-anchor="middle" fill="#7a5a2a">第一级 ioctl 校验</text>
  <g filter="url(#sh)"><rect x="590" y="106" width="250" height="86" rx="12" fill="#fff0d6" stroke="#c98a1f" stroke-width="1.8"/></g>
  <text x="715" y="138" font-size="14" font-weight="bold" text-anchor="middle" fill="#6b4500">os_interface.c</text>
  <text x="715" y="160" font-size="12" text-anchor="middle" fill="#7a5a2a">唯一 #include</text>
  <text x="715" y="179" font-size="12" text-anchor="middle" fill="#7a5a2a">&lt;linux/*&gt; 的文件</text>

  <!-- Layer 2: core -->
  <rect x="36" y="270" width="828" height="150" rx="18" fill="#eaf6ea" stroke="#5a9367" stroke-width="2.5"/>
  <text x="58" y="298" font-size="15" font-weight="bold" fill="#2f6b3a">② 可移植核心 kmdlib  kmd/aigc/kmdlib/*</text>
  <text x="430" y="298" font-size="12.5" fill="#4a8a59">（OS 无关，只走 os_* 包装）</text>
  <g filter="url(#sh)"><rect x="58" y="314" width="360" height="86" rx="12" fill="#ffffff" stroke="#5a9367" stroke-width="1.6"/></g>
  <text x="238" y="346" font-size="14" font-weight="bold" text-anchor="middle" fill="#2f6b3a">aigc_fops.c</text>
  <text x="238" y="368" font-size="12" text-anchor="middle" fill="#3a7a47">第二级派发 +</text>
  <text x="238" y="387" font-size="12" text-anchor="middle" fill="#3a7a47">各 aigc_ioctl_* 处理函数</text>
  <g filter="url(#sh)"><rect x="436" y="314" width="404" height="86" rx="12" fill="#ffffff" stroke="#5a9367" stroke-width="1.6"/></g>
  <text x="638" y="346" font-size="13.5" font-weight="bold" text-anchor="middle" fill="#2f6b3a">ctx · devm · page_table · mem_handle</text>
  <text x="638" y="378" font-size="13.5" font-weight="bold" text-anchor="middle" fill="#2f6b3a">cp_ring · sched · interrupt · fence · fw_update</text>

  <!-- Layer 3: HAL -->
  <rect x="36" y="478" width="828" height="134" rx="18" fill="#f8ecf6" stroke="#a86fa0" stroke-width="2.5"/>
  <text x="58" y="506" font-size="15" font-weight="bold" fill="#7a3f72">③ Grace HAL  kmdlib/hal/grace/* + regs/*</text>
  <text x="470" y="506" font-size="12.5" fill="#9a5a90">（芯片专属后端）</text>
  <g filter="url(#sh)"><rect x="58" y="522" width="782" height="74" rx="12" fill="#ffffff" stroke="#a86fa0" stroke-width="1.6"/></g>
  <text x="449" y="552" font-size="14" font-weight="bold" text-anchor="middle" fill="#7a3f72">CP · arch · IMC · L2C · TCU · C2C · D2D · link</text>
  <text x="449" y="578" font-size="12.5" text-anchor="middle" fill="#8a5082">经 hal.h 函数指针表访问  +  regs/* 原始寄存器布局</text>

  <!-- arrows -->
  <line x1="300" y1="212" x2="300" y2="268" stroke="#52606d" stroke-width="2.4" marker-end="url(#a)"/>
  <text x="312" y="245" font-size="12.5" fill="#3a4754">aigc_lib_ioctl()</text>
  <line x1="450" y1="420" x2="450" y2="476" stroke="#52606d" stroke-width="2.4" marker-end="url(#a)"/>
  <text x="462" y="453" font-size="12.5" fill="#3a4754">aigc_hal_* 函数指针</text>

  <!-- os_interface seam (dashed, side route) -->
  <path d="M715,192 C715,235 690,300 660,313" fill="none" stroke="#d9a441" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ao)"/>
  <text x="724" y="250" font-size="12" fill="#b07a1f">os_* 包装</text>
  <text x="724" y="268" font-size="12" fill="#b07a1f">可移植性缝隙</text>
</svg>
