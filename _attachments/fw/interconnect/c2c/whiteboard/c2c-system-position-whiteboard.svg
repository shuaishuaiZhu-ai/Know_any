  <g font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">
    <text x="56" y="62" font-size="30" font-weight="700" fill="#0F172A" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">C2C 系统视角：从软件访问到远端显存</text>
    <text x="56" y="96" font-size="16" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">C2C 不只是一根线，而是软件映射、拓扑配置、协议适配和链路传输共同组成的访问路径。</text>
    
