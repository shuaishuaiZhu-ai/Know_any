    <rect x="162" y="612" width="956" height="52" rx="26" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1"/>
    <text x="640" y="645" font-size="17" font-weight="400" fill="#334155" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">如果不改成本地 gpu_id/die_id，回来的包仍像远端访问，可能无法正确进入本地 memory。</text>
  
