<polygon points="418,366 415.8832905972,374.74754487293995 409.36604921788967,368.5406483212158" fill="#D97706"/>
    <line x1="638" y1="343" x2="756" y2="343" stroke="#DB2777" stroke-width="3" stroke-linecap="round"/>
<polygon points="756,343 748.2057713659401,347.5 748.2057713659401,338.5" fill="#DB2777"/>
<text x="697" y="333" font-size="13" font-weight="700" fill="#DB2777" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">下发</text>
    <line x1="966" y1="343" x2="1062" y2="343" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round"/>
<polygon points="1062,343 1054.20577136594,347.5 1054.20577136594,338.5" fill="#8B5CF6"/>
    <rect x="730" y="502" width="456" height="76" rx="16" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
    <text x="758" y="535" font-size="18" font-weight="700" fill="#9A3412" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">推断边界</text>
    <text x="758" y="562" font-size="14" font-weight="400" fill="#7C2D12" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">MIG/vGPU/UUID 需要映射到 C2C route ID，但当前 C2C 文档未直接确认。</text>
    <rect x="166" y="626" width="948" height="50" rx="25" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1"/>
    <text x="640" y="658" font-size="17" font-weight="400" fill="#334155" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">回答时先讲确认事实，再讲工程上可能需要补的映射层，避免把推断说成设计事实。</text>
  
  </g>
