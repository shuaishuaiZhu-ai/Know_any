<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <rect x="0" y="0" width="1280" height="760" fill="#F8FAFC"/>
  <g font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">
    <text x="56" y="62" font-size="30" font-weight="700" fill="#0F172A" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">GPU ID / 集群 ID 基础设施：事实和推断要分开</text>
    <text x="56" y="96" font-size="16" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">C2C 文档确认 KMD 下发 GPU/chip ID 给 FW；MIG/vGPU/UUID 到 AMT 的映射是工程推断。</text>
    
    <rect x="88" y="156" width="210" height="96" rx="16" fill="#EFF6FF" stroke="#60A5FA" stroke-width="2"/>
<text x="110" y="190" font-size="18" font-weight="700" fill="#1E40AF" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">PCI Bus ID / BDF</text>
