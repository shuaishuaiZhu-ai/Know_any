<text x="110" y="506" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">虚拟/切分实例</text>
    <rect x="418" y="276" width="220" height="134" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<text x="440" y="310" font-size="18" font-weight="700" fill="#0F172A" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">KMD device model</text>
<text x="440" y="338" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">统一设备模型</text>
<text x="440" y="358" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">选择 stable GPU ID / chip ID</text>
    <rect x="756" y="276" width="210" height="134" rx="16" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
