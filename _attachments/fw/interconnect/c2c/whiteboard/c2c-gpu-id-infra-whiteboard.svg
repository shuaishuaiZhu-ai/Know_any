<polygon points="418,320 409.2684407760281,317.81828656366804 415.5236396476554,311.347391179226" fill="#2563EB"/>
    <line x1="298" y1="348" x2="418" y2="342" stroke="#16A34A" stroke-width="3" stroke-linecap="round"/>
