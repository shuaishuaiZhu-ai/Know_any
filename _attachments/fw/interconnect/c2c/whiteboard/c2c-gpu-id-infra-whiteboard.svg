    <rect x="88" y="300" width="210" height="96" rx="16" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
<text x="110" y="334" font-size="18" font-weight="700" fill="#166534" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">GPU UUID / vGPU UUID</text>
<text x="110" y="362" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">用户态稳定标识</text>
    <rect x="88" y="444" width="210" height="96" rx="16" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
