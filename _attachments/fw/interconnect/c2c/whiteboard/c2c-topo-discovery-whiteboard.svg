<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <rect x="0" y="0" width="1280" height="760" fill="#F8FAFC"/>
  <g font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">
    <text x="56" y="62" font-size="30" font-weight="700" fill="#0F172A" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">Topo discovery / port mapping：从链路发现到路由表</text>
    <text x="56" y="96" font-size="16" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">Topo 的重点不是“有一张表”，而是表项如何被发现、写入、再被 FW/driver/RAS 使用。</text>
    
    <rect x="72" y="156" width="152" height="94" rx="16" fill="#EFF6FF" stroke="#60A5FA" stroke-width="2"/>
<text x="94" y="190" font-size="18" font-weight="700" fill="#1E40AF" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">Boot / init</text>
<text x="94" y="218" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">启动入口</text>
    <rect x="276" y="156" width="152" height="94" rx="16" fill="#EFF6FF" stroke="#60A5FA" stroke-width="2"/>
<text x="298" y="190" font-size="18" font-weight="700" fill="#1E40AF" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">枚举本地 port</text>
<text x="298" y="218" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">local port</text>
    <rect x="480" y="156" width="152" height="94" rx="16" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="502" y="190" font-size="18" font-weight="700" fill="#92400E" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">链路训练</text>
<text x="502" y="218" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">link status</text>
    <rect x="684" y="156" width="152" height="94" rx="16" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
<text x="706" y="190" font-size="18" font-weight="700" fill="#166534" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">发现 peer id</text>
<text x="706" y="218" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">remote die/chip</text>
    <rect x="888" y="156" width="152" height="94" rx="16" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
<text x="910" y="190" font-size="18" font-weight="700" fill="#5B21B6" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">生成 port map</text>
<text x="910" y="218" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">port relation</text>
    <rect x="1092" y="156" width="152" height="94" rx="16" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
<text x="1114" y="190" font-size="18" font-weight="700" fill="#9D174D" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">Program table</text>
<text x="1114" y="218" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">FW / HW</text>
    <line x1="224" y1="203" x2="276" y2="203" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
<polygon points="276,203 268.20577136594005,207.5 268.20577136594005,198.5" fill="#2563EB"/>
    <line x1="428" y1="203" x2="480" y2="203" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
<polygon points="480,203 472.20577136594005,207.5 472.20577136594005,198.5" fill="#2563EB"/>
    <line x1="632" y1="203" x2="684" y2="203" stroke="#D97706" stroke-width="3" stroke-linecap="round"/>
<polygon points="684,203 676.2057713659401,207.5 676.2057713659401,198.5" fill="#D97706"/>
    <line x1="836" y1="203" x2="888" y2="203" stroke="#16A34A" stroke-width="3" stroke-linecap="round"/>
<polygon points="888,203 880.2057713659401,207.5 880.2057713659401,198.5" fill="#16A34A"/>
    <line x1="1040" y1="203" x2="1092" y2="203" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round"/>
<polygon points="1092,203 1084.20577136594,207.5 1084.20577136594,198.5" fill="#8B5CF6"/>
    <rect x="100" y="356" width="300" height="142" rx="16" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
<text x="122" y="390" font-size="18" font-weight="700" fill="#0F172A" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">表项来源</text>
<text x="122" y="418" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">枚举、strap、fuse</text>
<text x="122" y="438" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">FW 探测、driver 配置</text>
    <rect x="490" y="356" width="300" height="142" rx="16" fill="#FFFFFF" stroke="#FBBF24" stroke-width="2"/>
<text x="512" y="390" font-size="18" font-weight="700" fill="#0F172A" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">表项内容</text>
<text x="512" y="418" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">local port / remote die</text>
<text x="512" y="438" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">link width / state / route id</text>
    <rect x="880" y="356" width="300" height="142" rx="16" fill="#FFFFFF" stroke="#86EFAC" stroke-width="2"/>
<text x="902" y="390" font-size="18" font-weight="700" fill="#0F172A" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">表项使用者</text>
<text x="902" y="418" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">FW routing / peer access</text>
<text x="902" y="438" font-size="13" font-weight="400" fill="#475569" text-anchor="start" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">RAS 定位 / 性能统计</text>
    <rect x="208" y="592" width="864" height="54" rx="27" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1"/>
    <text x="640" y="626" font-size="17" font-weight="400" fill="#334155" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">面试回答：发现谁连谁、状态怎样、如何编号，然后把结果写成可路由的表。</text>
  
  </g>
</svg>