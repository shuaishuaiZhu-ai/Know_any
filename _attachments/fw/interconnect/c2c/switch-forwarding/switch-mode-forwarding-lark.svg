<svg xmlns="http://www.w3.org/2000/svg" width="1660" height="1280" viewBox="0 0 1660 1280">
<rect width="1660" height="1280" fill="#F8FAFC"/>
<g font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">
  <text x="56" y="68" font-size="36" font-weight="800" fill="#0F172A">Switch 模式转发规则：先判访问类型，再选转发平面</text>
  <text x="56" y="104" font-size="17" fill="#475569">Source boundary：10.5 提供 topo/port 背景；portmap switch 页明确写“跨 GPU 硬件轮询选 serdes，GPU 内跨 die 查 D2D 表”。</text>

  
  <rect x="56" y="138" width="740" height="134" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="56" y="138" width="8" height="134" rx="4" fill="#64748B"/>
  <text x="80" y="174" font-size="22" font-weight="700" fill="#0F172A">先拆开两个容易混的 switch</text>
  <text x="80" y="208" font-size="16" fill="#334155">PCIe switch：10.5 里用于 host 枚举 bus/device/function，属于系统拓扑背景。</text>
<text x="80" y="232" font-size="16" fill="#334155">C2C switch 模式：这里讨论的是 C2C 数据包如何选出口、过 switch、落到目标 GPU/die。</text>
<text x="80" y="256" font-size="16" fill="#334155">不要把 PCIe 枚举路径当成 C2C 数据转发路径。</text>
  

  
  <rect x="836" y="138" width="768" height="134" rx="16" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <rect x="836" y="138" width="8" height="134" rx="4" fill="#EA580C"/>
  <text x="860" y="174" font-size="22" font-weight="700" fill="#0F172A">这张图的核心结论</text>
  <text x="860" y="208" font-size="16" fill="#334155">直连模式：每个目标 GPU 行要配置 C2C portmap，表项回答“第一跳走哪个 C2C 出口”。</text>
<text x="860" y="232" font-size="16" fill="#334155">switch 模式：跨 GPU 不再逐目标静态指定复杂 C2C 表，源端硬件轮询可用 serdes 出口。</text>
<text x="860" y="256" font-size="16" fill="#334155">D2D 没消失：只要是 GPU 内跨 die，仍然查 d2d port map。</text>
  

  
  <rect x="70" y="340" width="230" height="80" rx="14" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="185" y="371" text-anchor="middle" font-size="19" font-weight="700" fill="#0F172A">源 DIE 发起访问</text>
  <text x="185" y="396" text-anchor="middle" font-size="14" fill="#475569">AXI / NoC request</text>
  
  
  <rect x="360" y="340" width="250" height="80" rx="14" fill="#E0F2FE" stroke="#38BDF8" stroke-width="2"/>
  <text x="485" y="371" text-anchor="middle" font-size="19" font-weight="700" fill="#0F172A">AMT / route decode</text>
  <text x="485" y="396" text-anchor="middle" font-size="14" fill="#475569">解析目标 GPU / DIE</text>
  
  
  <polygon points="760,320 880,380 760,440 640,380" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="760" y="372" text-anchor="middle" font-size="17" font-weight="700" fill="#0F172A">目标 GPU 相同？</text>
  <text x="760" y="396" text-anchor="middle" font-size="13" fill="#475569">same GPU?</text>
  
  
  <polygon points="760,530 880,590 760,650 640,590" fill="#FCE7F3" stroke="#F472B6" stroke-width="2"/>
  <text x="760" y="582" text-anchor="middle" font-size="17" font-weight="700" fill="#0F172A">目标 DIE 相同？</text>
  <text x="760" y="606" text-anchor="middle" font-size="13" fill="#475569">same die?</text>
  
  
  <rect x="1060" y="330" width="270" height="84" rx="14" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
  <text x="1195" y="361" text-anchor="middle" font-size="19" font-weight="700" fill="#0F172A">本地 DIE 命中</text>
  <text x="1195" y="386" text-anchor="middle" font-size="14" fill="#475569">不走 C2C/D2D</text>
  
  
  <rect x="1060" y="545" width="270" height="84" rx="14" fill="#F5F3FF" stroke="#A78BFA" stroke-width="2"/>
  <text x="1195" y="576" text-anchor="middle" font-size="19" font-weight="700" fill="#0F172A">查 D2D port map</text>
  <text x="1195" y="601" text-anchor="middle" font-size="14" fill="#475569">选择 ucie0 / ucie1</text>
  
  
  <rect x="1390" y="545" width="190" height="84" rx="14" fill="#EEF2FF" stroke="#818CF8" stroke-width="2"/>
  <text x="1485" y="576" text-anchor="middle" font-size="19" font-weight="700" fill="#0F172A">目标 DIE</text>
  <text x="1485" y="601" text-anchor="middle" font-size="14" fill="#475569">GPU 内到达</text>
  

  
  <rect x="70" y="760" width="270" height="90" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="205" y="791" text-anchor="middle" font-size="19" font-weight="700" fill="#0F172A">C2C adapter</text>
  <text x="205" y="816" text-anchor="middle" font-size="14" fill="#475569">进入跨 GPU 平面</text>
  
  
  <rect x="405" y="760" width="310" height="90" rx="14" fill="#FFF7ED" stroke="#FB923C" stroke-width="2"/>
  <text x="560" y="791" text-anchor="middle" font-size="19" font-weight="700" fill="#0F172A">硬件轮询 serdes port</text>
  <text x="560" y="816" text-anchor="middle" font-size="14" fill="#475569">从可用 p0/p2/p4 或 x2 port 组中选</text>
  
  
  <rect x="800" y="740" width="260" height="130" rx="14" fill="#E2E8F0" stroke="#64748B" stroke-width="2"/>
  <text x="930" y="771" text-anchor="middle" font-size="19" font-weight="700" fill="#0F172A">C2C switch fabric</text>
  <text x="930" y="796" text-anchor="middle" font-size="14" fill="#475569">转给目标 GPU 端口</text>
  
  
  <rect x="1140" y="760" width="270" height="90" rx="14" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="1275" y="791" text-anchor="middle" font-size="19" font-weight="700" fill="#0F172A">目标 GPU C2C endpoint</text>
  <text x="1275" y="816" text-anchor="middle" font-size="14" fill="#475569">收到跨 GPU 包</text>
  
  
  <rect x="1140" y="880" width="270" height="90" rx="14" fill="#F5F3FF" stroke="#A78BFA" stroke-width="2"/>
  <text x="1275" y="911" text-anchor="middle" font-size="19" font-weight="700" fill="#0F172A">必要时再查 D2D</text>
  <text x="1275" y="936" text-anchor="middle" font-size="14" fill="#475569">落点 die ≠ 目标 die</text>
  
  
  <rect x="1450" y="880" width="150" height="90" rx="14" fill="#EEF2FF" stroke="#818CF8" stroke-width="2"/>
  <text x="1525" y="911" text-anchor="middle" font-size="19" font-weight="700" fill="#0F172A">目标 DIE</text>
  <text x="1525" y="936" text-anchor="middle" font-size="14" fill="#475569">最终到达</text>
  

  
  <line x1="300" y1="380" x2="360" y2="380" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <polygon points="360,380 350,374 350,386" fill="#2563EB"/>
  
  
  
  <line x1="610" y1="380" x2="640" y2="380" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <polygon points="640,380 630,374 630,386" fill="#2563EB"/>
  
  
  
  <line x1="880" y1="370" x2="1060" y2="370" stroke="#16A34A" stroke-width="3" stroke-linecap="round"/>
  <polygon points="1060,370 1050,364 1050,376" fill="#16A34A"/>
  <text x="970" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#16A34A">是，且同 DIE</text>
  
  
  <line x1="760" y1="440" x2="760" y2="530" stroke="#DB2777" stroke-width="3" stroke-linecap="round"/>
  <polygon points="760,530 750,524 750,536" fill="#DB2777"/>
  <text x="760" y="477" text-anchor="middle" font-size="14" font-weight="700" fill="#DB2777">是，但跨 DIE</text>
  
  
  <line x1="880" y1="590" x2="1060" y2="590" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <polygon points="1060,590 1050,584 1050,596" fill="#7C3AED"/>
  <text x="970" y="582" text-anchor="middle" font-size="14" font-weight="700" fill="#7C3AED">否</text>
  
  
  <line x1="1330" y1="587" x2="1390" y2="587" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <polygon points="1390,587 1380,581 1380,593" fill="#7C3AED"/>
  
  
  
  <line x1="640" y1="410" x2="340" y2="760" stroke="#EA580C" stroke-width="3" stroke-linecap="round"/>
  <polygon points="340,760 330,754 330,766" fill="#EA580C"/>
  <text x="490" y="577" text-anchor="middle" font-size="14" font-weight="700" fill="#EA580C">否，跨 GPU</text>
  
  
  <line x1="340" y1="805" x2="405" y2="805" stroke="#EA580C" stroke-width="3" stroke-linecap="round"/>
  <polygon points="405,805 395,799 395,811" fill="#EA580C"/>
  
  
  
  <line x1="715" y1="805" x2="800" y2="805" stroke="#EA580C" stroke-width="3" stroke-linecap="round"/>
  <polygon points="800,805 790,799 790,811" fill="#EA580C"/>
  
  
  
  <line x1="1060" y1="805" x2="1140" y2="805" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <polygon points="1140,805 1130,799 1130,811" fill="#2563EB"/>
  
  
  
  <line x1="1275" y1="850" x2="1275" y2="880" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <polygon points="1275,880 1265,874 1265,886" fill="#7C3AED"/>
  <text x="1275" y="857" text-anchor="middle" font-size="14" font-weight="700" fill="#7C3AED">若需跨 die</text>
  
  
  <line x1="1410" y1="925" x2="1450" y2="925" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <polygon points="1450,925 1440,919 1440,931" fill="#7C3AED"/>
  
  

  
  <rect x="56" y="1060" width="500" height="170" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="56" y="1060" width="8" height="170" rx="4" fill="#F59E0B"/>
  <text x="80" y="1096" font-size="22" font-weight="700" fill="#0F172A">例子 1：G5DIE1 -&gt; G10DIE0</text>
  <text x="80" y="1130" font-size="16" fill="#334155">1. AMT 发现目标 GPU 不是 G5。</text>
<text x="80" y="1154" font-size="16" fill="#334155">2. 进入 C2C adapter，硬件轮询选择一个可用 serdes 出口。</text>
<text x="80" y="1178" font-size="16" fill="#334155">3. switch fabric 转到 G10。</text>
<text x="80" y="1202" font-size="16" fill="#334155">4. 若入口 die 不是 DIE0，再在 G10 内查 D2D 表。</text>
  

  
  <rect x="590" y="1060" width="430" height="170" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="590" y="1060" width="8" height="170" rx="4" fill="#7C3AED"/>
  <text x="614" y="1096" font-size="22" font-weight="700" fill="#0F172A">例子 2：G5DIE1 -&gt; G5DIE0</text>
  <text x="614" y="1130" font-size="16" fill="#334155">1. 目标 GPU 仍是 G5，不走跨 GPU C2C switch。</text>
<text x="614" y="1154" font-size="16" fill="#334155">2. 目标 die 不同，直接查 G5 内部 d2d port map。</text>
<text x="614" y="1178" font-size="16" fill="#334155">3. 选 ucie 方向到 DIE0。</text>
  

  
  <rect x="1055" y="1060" width="550" height="170" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="1055" y="1060" width="8" height="170" rx="4" fill="#EF4444"/>
  <text x="1079" y="1096" font-size="22" font-weight="700" fill="#0F172A">不要过度推断</text>
  <text x="1079" y="1130" font-size="16" fill="#334155">“轮询”来自 portmap switch 页；具体是 round-robin、</text>
<text x="1079" y="1154" font-size="16" fill="#334155">负载均衡还是固定优先级，当前来源未给寄存器级定义。</text>
<text x="1079" y="1178" font-size="16" fill="#334155">switch 具体按 MAC/VLAN、route id 还是厂商 fabric 转发，</text>
<text x="1079" y="1202" font-size="16" fill="#334155">要结合 10.8 L2 wrapper 或 switch 规格确认。</text>
  
</g>
</svg>