<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1370" height="900" viewBox="0 0 1370 900" role="img" aria-label="C2C 子系统结构拆解：Adapter / LLRMAC / HSS112G">
<defs>
  <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 Z" fill="#334155" />
  </marker>
  <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb" />
  </marker>
</defs>
<rect width="1370" height="900" fill="#f8fafc" />
<text x="685" y="38" text-anchor="middle" font-size="24" font-weight="800" fill="#111827">C2C 子系统结构拆解：Adapter / LLRMAC / HSS112G</text>

<text x="50" y="80" text-anchor="start" font-size="16" font-weight="800" fill="#dc2626">图中可确认的两类 wrapper</text>
<rect x="45" y="98" width="1280" height="275" rx="8" fill="#fffdf7" stroke="#dc2626" stroke-width="2" />
<text x="66" y="128" text-anchor="start" font-size="16" font-weight="800" fill="#dc2626">MACPHY_WRAPPER：图中包含 Adapter0 / Adapter1、LLRMAC、两个 Hss112GX4Wrapper</text>
<g>
<rect x="80" y="160" width="250" height="160" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5" />
<text x="98" y="190" text-anchor="start" font-size="18" font-weight="800" fill="#111827">Adapter0 / Adapter1</text>
<text x="98" y="218" text-anchor="start" font-size="14" font-weight="400" fill="#475569">Tx：InputCtl -&gt; PktComb</text>
<text x="98" y="241" text-anchor="start" font-size="14" font-weight="400" fill="#475569">Tx：PktEdit 后到 User Tx</text>
<text x="98" y="264" text-anchor="start" font-size="14" font-weight="400" fill="#475569">Rx：PktEdit -&gt; PktSplit</text>
<text x="98" y="287" text-anchor="start" font-size="14" font-weight="400" fill="#475569">Rx：OutputCtl 后回上游</text>
</g>
<line x1="330" y1="240" x2="390" y2="240" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
<g>
<rect x="390" y="160" width="260" height="160" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5" />
<text x="408" y="190" text-anchor="start" font-size="18" font-weight="800" fill="#111827">LLRMAC</text>
<text x="408" y="218" text-anchor="start" font-size="14" font-weight="400" fill="#475569">RlmMac / Mac</text>
<text x="408" y="241" text-anchor="start" font-size="14" font-weight="400" fill="#475569">PCS + FEC</text>
<text x="408" y="264" text-anchor="start" font-size="14" font-weight="400" fill="#475569">RlmHSX8</text>
<text x="408" y="287" text-anchor="start" font-size="14" font-weight="400" fill="#475569">LLRMacCtlKit</text>
</g>
<line x1="650" y1="240" x2="720" y2="240" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
<g>
<rect x="720" y="160" width="250" height="160" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5" />
<text x="738" y="190" text-anchor="start" font-size="18" font-weight="800" fill="#111827">Hss112GX4Wrapper x2</text>
<text x="738" y="218" text-anchor="start" font-size="14" font-weight="400" fill="#475569">112G x4 SerDes wrapper</text>
<text x="738" y="241" text-anchor="start" font-size="14" font-weight="400" fill="#475569">CSR / SRAM</text>
<text x="738" y="264" text-anchor="start" font-size="14" font-weight="400" fill="#475569">把 PCS/HSX 侧数据送到 lane</text>
</g>
<line x1="970" y1="240" x2="1030" y2="240" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
<g>
<rect x="1030" y="160" width="230" height="160" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2.5" />
<text x="1048" y="190" text-anchor="start" font-size="18" font-weight="800" fill="#111827">外部 C2C lanes</text>
<text x="1048" y="218" text-anchor="start" font-size="14" font-weight="400" fill="#475569">直连：到对端 GPU</text>
<text x="1048" y="241" text-anchor="start" font-size="14" font-weight="400" fill="#475569">switch：到 fabric</text>
<text x="1048" y="264" text-anchor="start" font-size="14" font-weight="400" fill="#475569">链路错误/训练在 PHY 层定位</text>
</g>

<rect x="45" y="420" width="1280" height="260" rx="8" fill="#fffafd" stroke="#db2777" stroke-width="2" />
<text x="66" y="450" text-anchor="start" font-size="16" font-weight="800" fill="#db2777">MACPHY_WRAPPER_X4：图中包含 Adapter2、macphy_wrapper_regbank、一个 LLRMAC、一个 Hss112GX4Wrapper</text>
<g>
<rect x="80" y="482" width="240" height="130" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5" />
<text x="98" y="512" text-anchor="start" font-size="18" font-weight="800" fill="#111827">Adapter2</text>
<text x="98" y="540" text-anchor="start" font-size="14" font-weight="400" fill="#475569">同样有 DpTx / DpRx</text>
<text x="98" y="563" text-anchor="start" font-size="14" font-weight="400" fill="#475569">负责 packet combine / split / edit</text>
<text x="98" y="586" text-anchor="start" font-size="14" font-weight="400" fill="#475569">对接 User Tx/Rx 和 flow control</text>
</g>
<line x1="320" y1="547" x2="390" y2="547" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
<g>
<rect x="390" y="482" width="250" height="130" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5" />
<text x="408" y="512" text-anchor="start" font-size="18" font-weight="800" fill="#111827">regbank + LLRMAC</text>
<text x="408" y="540" text-anchor="start" font-size="14" font-weight="400" fill="#475569">regbank 提供控制配置入口</text>
<text x="408" y="563" text-anchor="start" font-size="14" font-weight="400" fill="#475569">LLRMacCtlKit / RlmMac</text>
<text x="408" y="586" text-anchor="start" font-size="14" font-weight="400" fill="#475569">PCS / FEC / RlmHSX8</text>
</g>
<line x1="640" y1="547" x2="720" y2="547" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
<g>
<rect x="720" y="482" width="250" height="130" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5" />
<text x="738" y="512" text-anchor="start" font-size="18" font-weight="800" fill="#111827">HSS 112G x4</text>
<text x="738" y="540" text-anchor="start" font-size="14" font-weight="400" fill="#475569">CSR / APB / SRAM</text>
<text x="738" y="563" text-anchor="start" font-size="14" font-weight="400" fill="#475569">SerDes macro wrapper</text>
<text x="738" y="586" text-anchor="start" font-size="14" font-weight="400" fill="#475569">x4 port 物理承载</text>
</g>
<line x1="970" y1="547" x2="1030" y2="547" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
<g>
<rect x="1030" y="482" width="230" height="130" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2.5" />
<text x="1048" y="512" text-anchor="start" font-size="18" font-weight="800" fill="#111827">一组 x4 出口</text>
<text x="1048" y="540" text-anchor="start" font-size="14" font-weight="400" fill="#475569">和 Adapter2 绑定观察</text>
<text x="1048" y="563" text-anchor="start" font-size="14" font-weight="400" fill="#475569">结合 portmap 定位 port</text>
<text x="1048" y="586" text-anchor="start" font-size="14" font-weight="400" fill="#475569">链路侧用 loopback/BIST 分层</text>
</g>

<g>
<rect x="80" y="720" width="1180" height="112" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5" />
<text x="98" y="750" text-anchor="start" font-size="18" font-weight="800" fill="#111827">和上一页“出口硬件”的关系</text>
<text x="98" y="778" text-anchor="start" font-size="14" font-weight="400" fill="#475569">之前说的 C2C egress datapath 不再只是黑盒：图中可以拆成 Adapter packet datapath、LLRMAC 的 MAC/PCS/FEC/HSX、Hss112GX4Wrapper 的 SerDes/CSR/SRAM。</text>
<text x="98" y="801" text-anchor="start" font-size="14" font-weight="400" fill="#475569">图中没有直接标 OISA，也没有给 RTL 字段定义；因此 OISA MAC 与 LLRMAC/RlmMac 的对应关系需要后续 RTL/寄存器文档确认，不能过度断言。</text>
</g>
<text x="1320" y="868" text-anchor="end" font-size="12" font-weight="400" fill="#475569">source: C:/Users/18355/Pictures/c2c.jpg + local C2C wiki/raw</text>

</svg>