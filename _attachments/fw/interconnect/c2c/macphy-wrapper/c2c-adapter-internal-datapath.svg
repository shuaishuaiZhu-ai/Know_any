<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="810" viewBox="0 0 1220 810" role="img" aria-label="Adapter 内部 datapath：PktComb / PktSplit / PktEdit">
<defs>
  <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 Z" fill="#334155" />
  </marker>
  <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb" />
  </marker>
</defs>
<rect width="1220" height="810" fill="#f8fafc" />
<text x="610" y="38" text-anchor="middle" font-size="24" font-weight="800" fill="#111827">Adapter 内部 datapath：PktComb / PktSplit / PktEdit</text>

<text x="70" y="82" text-anchor="start" font-size="16" font-weight="800" fill="#2563eb">Adapter 内部从图中能读出的两条 datapath</text>
<g>
<rect x="70" y="115" width="250" height="160" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5" />
<text x="88" y="145" text-anchor="start" font-size="18" font-weight="800" fill="#111827">DpTx 发送方向</text>
<text x="88" y="173" text-anchor="start" font-size="14" font-weight="400" fill="#475569">InputCtl 接收上游输入</text>
<text x="88" y="196" text-anchor="start" font-size="14" font-weight="400" fill="#475569">PktComb 组合 packet / flit</text>
<text x="88" y="219" text-anchor="start" font-size="14" font-weight="400" fill="#475569">PktEdit 修改或补字段</text>
<text x="88" y="242" text-anchor="start" font-size="14" font-weight="400" fill="#475569">输出到 LLRMAC User Tx</text>
</g>
<g><rect x="365" y="132" width="95" height="42" rx="4" fill="#dffbff" stroke="#0891b2" stroke-width="1.5" /><text x="412.5" y="158" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">InputCtl</text></g>
<line x1="320" y1="153" x2="365" y2="153" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
<line x1="460" y1="153" x2="505" y2="153" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
<g><rect x="505" y="122" width="145" height="62" rx="4" fill="#dffbff" stroke="#0891b2" stroke-width="1.5" /><text x="577.5" y="158" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">PktComb</text></g>
<line x1="650" y1="153" x2="695" y2="153" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
<g><rect x="695" y="132" width="95" height="42" rx="4" fill="#dffbff" stroke="#0891b2" stroke-width="1.5" /><text x="742.5" y="158" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">PktEdit</text></g>
<line x1="790" y1="153" x2="855" y2="153" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
<g>
<rect x="855" y="115" width="250" height="160" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5" />
<text x="873" y="145" text-anchor="start" font-size="18" font-weight="800" fill="#111827">LLRMAC Tx side</text>
<text x="873" y="173" text-anchor="start" font-size="14" font-weight="400" fill="#475569">Flow control(Tx)</text>
<text x="873" y="196" text-anchor="start" font-size="14" font-weight="400" fill="#475569">User interface(Tx)</text>
<text x="873" y="219" text-anchor="start" font-size="14" font-weight="400" fill="#475569">Pause I/F</text>
<text x="873" y="242" text-anchor="start" font-size="14" font-weight="400" fill="#475569">进入 MAC / PCS / FEC</text>
</g>

<g>
<rect x="70" y="360" width="250" height="160" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5" />
<text x="88" y="390" text-anchor="start" font-size="18" font-weight="800" fill="#111827">DpRx 接收方向</text>
<text x="88" y="418" text-anchor="start" font-size="14" font-weight="400" fill="#475569">从 LLRMAC User Rx 进入</text>
<text x="88" y="441" text-anchor="start" font-size="14" font-weight="400" fill="#475569">PktEdit 修正/剥离字段</text>
<text x="88" y="464" text-anchor="start" font-size="14" font-weight="400" fill="#475569">PktSplit 拆分 packet</text>
<text x="88" y="487" text-anchor="start" font-size="14" font-weight="400" fill="#475569">OutputCtl 送回上游</text>
</g>
<g>
<rect x="855" y="360" width="250" height="160" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5" />
<text x="873" y="390" text-anchor="start" font-size="18" font-weight="800" fill="#111827">LLRMAC Rx side</text>
<text x="873" y="418" text-anchor="start" font-size="14" font-weight="400" fill="#475569">User interface(RX)</text>
<text x="873" y="441" text-anchor="start" font-size="14" font-weight="400" fill="#475569">MAC / PCS / FEC 解码后进入</text>
<text x="873" y="464" text-anchor="start" font-size="14" font-weight="400" fill="#475569">错误/流控状态回传</text>
<text x="873" y="487" text-anchor="start" font-size="14" font-weight="400" fill="#475569">再交给 Adapter DpRx</text>
</g>
<line x1="855" y1="438" x2="790" y2="438" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
<g><rect x="695" y="417" width="95" height="42" rx="4" fill="#dffbff" stroke="#0891b2" stroke-width="1.5" /><text x="742.5" y="443" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">PktEdit</text></g>
<line x1="695" y1="438" x2="650" y2="438" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
<g><rect x="505" y="407" width="145" height="62" rx="4" fill="#dffbff" stroke="#0891b2" stroke-width="1.5" /><text x="577.5" y="443" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">PktSplit</text></g>
<line x1="505" y1="438" x2="460" y2="438" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
<g><rect x="365" y="417" width="95" height="42" rx="4" fill="#dffbff" stroke="#0891b2" stroke-width="1.5" /><text x="412.5" y="443" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">OutputCtl</text></g>
<line x1="365" y1="438" x2="320" y2="438" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />

<g>
<rect x="145" y="610" width="950" height="122" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5" />
<text x="163" y="640" text-anchor="start" font-size="18" font-weight="800" fill="#111827">读图边界</text>
<text x="163" y="668" text-anchor="start" font-size="14" font-weight="400" fill="#475569">图能确认 Adapter 里存在 InputCtl / OutputCtl / PktComb / PktSplit / PktEdit 这些块，也能确认它对外暴露 Pause、Flow control、User Tx/Rx 接口。</text>
<text x="163" y="691" text-anchor="start" font-size="14" font-weight="400" fill="#475569">但图不能单独证明 C2C L2 header、OISA header 或 route ID 一定在哪个 PktEdit 子模块生成；这些仍要靠 RTL、寄存器或波形确认。</text>
</g>
<text x="1180" y="778" text-anchor="end" font-size="12" font-weight="400" fill="#475569">source: C:/Users/18355/Pictures/c2c.jpg</text>

</svg>