<text x="46" y="247" font-size="18" font-weight="700" fill="#334155" text-anchor="start">xVALID</text>
<path d="M 220 256 L 340 256 L 340 224 L 460 224 L 580 224 L 700 224 L 820 224 L 940 224 L 940 256 L 1060 256 L 1180 256 L 1300 256 L 1420 256" fill="none" stroke="#2563eb" stroke-width="4" stroke-linejoin="round"/>
<text x="46" y="327" font-size="18" font-weight="700" fill="#334155" text-anchor="start">xREADY</text>
<path d="M 220 336 L 340 336 L 460 336 L 460 304 L 580 304 L 580 336 L 700 336 L 820 336 L 820 304 L 940 304 L 1060 304 L 1060 336 L 1180 336 L 1300 336 L 1420 336" fill="none" stroke="#16a34a" stroke-width="4" stroke-linejoin="round"/>
<text x="46" y="422" font-size="18" font-weight="700" fill="#334155" text-anchor="start">payload</text>
<rect x="348" y="391" width="224" height="48" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="460" y="422" font-size="17" font-weight="700" fill="#7c3aed" text-anchor="middle">D0 保持稳定</text>
<rect x="588" y="391" width="344" height="48" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="760" y="422" font-size="17" font-weight="700" fill="#7c3aed" text-anchor="middle">D1 保持稳定直到 READY</text>
<text x="220" y="650" font-size="24" font-weight="800" fill="#0f172a" text-anchor="start">看图要点</text>
<text x="220" y="690" font-size="20" font-weight="600" fill="#334155" text-anchor="start">1. 只有 VALID 和 READY 同周期为 1，当前 beat 才完成。</text>
<text x="220" y="728" font-size="20" font-weight="600" fill="#334155" text-anchor="start">2. VALID=1 但 READY=0 时，payload 不能随便变化，必须等握手完成。</text>
<text x="220" y="766" font-size="20" font-weight="600" fill="#334155" text-anchor="start">3. READY 可以提前拉高，也可以晚到；这是下游反压的核心表现。</text>
</svg>
