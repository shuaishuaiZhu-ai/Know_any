<path d="M 220 381 L 340 381 L 460 381 L 580 381 L 580 349 L 700 349 L 820 349 L 940 349 L 1060 349 L 1180 349 L 1180 381 L 1300 381 L 1420 381" fill="none" stroke="#15803d" stroke-width="4" stroke-linejoin="round"/>
