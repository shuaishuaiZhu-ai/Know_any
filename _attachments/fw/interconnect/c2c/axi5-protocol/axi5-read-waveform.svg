<text x="46" y="562" font-size="18" font-weight="700" fill="#334155" text-anchor="start">RRESP sig</text>
<rect x="588" y="531" width="224" height="48" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
<text x="700" y="562" font-size="17" font-weight="700" fill="#f97316" text-anchor="middle">OKAY</text>
<rect x="828" y="531" width="224" height="48" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
<text x="940" y="562" font-size="17" font-weight="700" fill="#f97316" text-anchor="middle">OKAY</text>
<rect x="1068" y="531" width="104" height="48" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
<text x="1120" y="562" font-size="17" font-weight="700" fill="#f97316" text-anchor="middle">OKAY</text>
<text x="46" y="642" font-size="18" font-weight="700" fill="#334155" text-anchor="start">RLAST</text>
<path d="M 220 651 L 340 651 L 460 651 L 580 651 L 700 651 L 820 651 L 940 651 L 1060 651 L 1060 619 L 1180 619 L 1180 651 L 1300 651 L 1420 651" fill="none" stroke="#f97316" stroke-width="4" stroke-linejoin="round"/>
<text x="180" y="815" font-size="20" font-weight="700" fill="#334155" text-anchor="start">要点：AR 和 R 是独立 channel；RRESP 只是 R channel 内的 signal，不是单独 channel。</text>
</svg>
