</defs>
<rect width="1500" height="880" fill="#f8fafc"/>
<text x="750" y="50" font-size="30" font-weight="800" fill="#0f172a" text-anchor="middle">AXI 读事务波形：AR / R 两条 channel 解耦</text>
<text x="750" y="84" font-size="18" font-weight="500" fill="#475569" text-anchor="middle">示例为 3-beat read burst；RRESP 是 R channel 内的响应信号，跟随每个 RDATA beat 返回</text>
<line x1="220" y1="130" x2="220" y2="146" stroke="#94a3b8" stroke-width="2" />
