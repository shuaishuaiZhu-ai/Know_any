</defs>
<rect width="1500" height="880" fill="#f8fafc"/>
<text x="750" y="50" font-size="30" font-weight="800" fill="#0f172a" text-anchor="middle">AXI 写事务波形：AW / W / B 三条 channel 解耦</text>
<text x="750" y="84" font-size="18" font-weight="500" fill="#475569" text-anchor="middle">示例为 3-beat write burst，W2 因 WREADY=0 被保持一拍，B response 在最后一拍数据被接受后返回</text>
<line x1="220" y1="130" x2="220" y2="146" stroke="#94a3b8" stroke-width="2" />
<line x1="220" y1="689" x2="220" y2="705" stroke="#94a3b8" stroke-width="2" />
<text x="280" y="112" font-size="16" font-weight="600" fill="#64748b" text-anchor="middle">C0</text>
<line x1="340" y1="130" x2="340" y2="146" stroke="#e2e8f0" stroke-width="1" />
<line x1="340" y1="689" x2="340" y2="705" stroke="#e2e8f0" stroke-width="1" />
<text x="400" y="112" font-size="16" font-weight="600" fill="#64748b" text-anchor="middle">C1</text>
<line x1="460" y1="130" x2="460" y2="146" stroke="#e2e8f0" stroke-width="1" />
<line x1="460" y1="689" x2="460" y2="705" stroke="#e2e8f0" stroke-width="1" />
<text x="520" y="112" font-size="16" font-weight="600" fill="#64748b" text-anchor="middle">C2</text>
<line x1="580" y1="130" x2="580" y2="146" stroke="#e2e8f0" stroke-width="1" />
<line x1="580" y1="689" x2="580" y2="705" stroke="#e2e8f0" stroke-width="1" />
<text x="640" y="112" font-size="16" font-weight="600" fill="#64748b" text-anchor="middle">C3</text>
<line x1="700" y1="130" x2="700" y2="146" stroke="#e2e8f0" stroke-width="1" />
<line x1="700" y1="689" x2="700" y2="705" stroke="#e2e8f0" stroke-width="1" />
<text x="760" y="112" font-size="16" font-weight="600" fill="#64748b" text-anchor="middle">C4</text>
<line x1="820" y1="130" x2="820" y2="146" stroke="#e2e8f0" stroke-width="1" />
<line x1="820" y1="689" x2="820" y2="705" stroke="#e2e8f0" stroke-width="1" />
<text x="880" y="112" font-size="16" font-weight="600" fill="#64748b" text-anchor="middle">C5</text>
<line x1="940" y1="130" x2="940" y2="146" stroke="#e2e8f0" stroke-width="1" />
<line x1="940" y1="689" x2="940" y2="705" stroke="#e2e8f0" stroke-width="1" />
<text x="1000" y="112" font-size="16" font-weight="600" fill="#64748b" text-anchor="middle">C6</text>
<line x1="1060" y1="130" x2="1060" y2="146" stroke="#e2e8f0" stroke-width="1" />
<line x1="1060" y1="689" x2="1060" y2="705" stroke="#e2e8f0" stroke-width="1" />
<text x="1120" y="112" font-size="16" font-weight="600" fill="#64748b" text-anchor="middle">C7</text>
<line x1="1180" y1="130" x2="1180" y2="146" stroke="#e2e8f0" stroke-width="1" />
<line x1="1180" y1="689" x2="1180" y2="705" stroke="#e2e8f0" stroke-width="1" />
<text x="1240" y="112" font-size="16" font-weight="600" fill="#64748b" text-anchor="middle">C8</text>
<line x1="1300" y1="130" x2="1300" y2="146" stroke="#e2e8f0" stroke-width="1" />
<line x1="1300" y1="689" x2="1300" y2="705" stroke="#e2e8f0" stroke-width="1" />
<text x="1360" y="112" font-size="16" font-weight="600" fill="#64748b" text-anchor="middle">C9</text>
<line x1="1420" y1="130" x2="1420" y2="146" stroke="#e2e8f0" stroke-width="1" />
<line x1="1420" y1="689" x2="1420" y2="705" stroke="#e2e8f0" stroke-width="1" />
<line x1="220" y1="705" x2="1420" y2="705" stroke="#e2e8f0" stroke-width="1" />
<rect x="468" y="130" width="104" height="575" fill="#dcfce7" opacity="0.75"/>
<rect x="588" y="130" width="104" height="575" fill="#dcfce7" opacity="0.75"/>
<rect x="708" y="130" width="104" height="575" fill="#dcfce7" opacity="0.75"/>
<rect x="948" y="130" width="104" height="575" fill="#dcfce7" opacity="0.75"/>
<rect x="1188" y="130" width="104" height="575" fill="#dcfce7" opacity="0.75"/>
<text x="46" y="172" font-size="18" font-weight="700" fill="#334155" text-anchor="start">AWVALID</text>
<path d="M 220 181 L 340 181 L 340 149 L 460 149 L 580 149 L 580 181 L 700 181 L 820 181 L 940 181 L 1060 181 L 1180 181 L 1300 181 L 1420 181" fill="none" stroke="#2563eb" stroke-width="4" stroke-linejoin="round"/>
<text x="46" y="227" font-size="18" font-weight="700" fill="#334155" text-anchor="start">AWREADY</text>
<path d="M 220 236 L 340 236 L 460 236 L 460 204 L 580 204 L 700 204 L 700 236 L 820 236 L 940 236 L 1060 236 L 1180 236 L 1300 236 L 1420 236" fill="none" stroke="#16a34a" stroke-width="4" stroke-linejoin="round"/>
<text x="46" y="287" font-size="18" font-weight="700" fill="#334155" text-anchor="start">AWADDR</text>
<rect x="348" y="256" width="224" height="48" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="460" y="287" font-size="17" font-weight="700" fill="#2563eb" text-anchor="middle">addr + attr + ID</text>
<text x="46" y="362" font-size="18" font-weight="700" fill="#334155" text-anchor="start">WVALID</text>
<path d="M 220 371 L 340 371 L 460 371 L 460 339 L 580 339 L 700 339 L 820 339 L 940 339 L 1060 339 L 1060 371 L 1180 371 L 1300 371 L 1420 371" fill="none" stroke="#0891b2" stroke-width="4" stroke-linejoin="round"/>
<text x="46" y="417" font-size="18" font-weight="700" fill="#334155" text-anchor="start">WREADY</text>
<path d="M 220 426 L 340 426 L 460 426 L 580 426 L 580 394 L 700 394 L 820 394 L 820 426 L 940 426 L 940 394 L 1060 394 L 1180 394 L 1180 426 L 1300 426 L 1420 426" fill="none" stroke="#16a34a" stroke-width="4" stroke-linejoin="round"/>
<text x="46" y="477" font-size="18" font-weight="700" fill="#334155" text-anchor="start">WDATA</text>
<rect x="468" y="446" width="224" height="48" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<text x="580" y="477" font-size="17" font-weight="700" fill="#0891b2" text-anchor="middle">W0</text>
<rect x="708" y="446" width="104" height="48" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<text x="760" y="477" font-size="17" font-weight="700" fill="#0891b2" text-anchor="middle">W1</text>
<rect x="828" y="446" width="224" height="48" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<text x="940" y="477" font-size="17" font-weight="700" fill="#0891b2" text-anchor="middle">W2 held</text>
<text x="46" y="552" font-size="18" font-weight="700" fill="#334155" text-anchor="start">WLAST</text>
<path d="M 220 561 L 340 561 L 460 561 L 580 561 L 700 561 L 820 561 L 820 529 L 940 529 L 1060 529 L 1060 561 L 1180 561 L 1300 561 L 1420 561" fill="none" stroke="#f97316" stroke-width="4" stroke-linejoin="round"/>
<text x="46" y="627" font-size="18" font-weight="700" fill="#334155" text-anchor="start">BVALID</text>
<path d="M 220 636 L 340 636 L 460 636 L 580 636 L 700 636 L 820 636 L 940 636 L 1060 636 L 1060 604 L 1180 604 L 1300 604 L 1300 636 L 1420 636" fill="none" stroke="#f97316" stroke-width="4" stroke-linejoin="round"/>
<text x="46" y="682" font-size="18" font-weight="700" fill="#334155" text-anchor="start">BREADY</text>
<path d="M 220 691 L 340 691 L 460 691 L 580 691 L 700 691 L 820 691 L 940 691 L 1060 691 L 1180 691 L 1180 659 L 1300 659 L 1420 659" fill="none" stroke="#16a34a" stroke-width="4" stroke-linejoin="round"/>
<text x="46" y="742" font-size="18" font-weight="700" fill="#334155" text-anchor="start">BRESP</text>
<rect x="1068" y="711" width="224" height="48" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
<text x="1180" y="742" font-size="17" font-weight="700" fill="#f97316" text-anchor="middle">OKAY</text>
<text x="180" y="815" font-size="20" font-weight="700" fill="#334155" text-anchor="start">要点：AW 和 W 是独立 channel；AW 可先握手，W 中途可被 WREADY 反压；最后一个 W beat 被接受后，B channel 返回 BRESP。</text>
</svg>
