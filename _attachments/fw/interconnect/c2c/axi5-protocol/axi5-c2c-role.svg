<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="980" viewBox="0 0 1700 980">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
  </marker>
  <style>
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
    .mono { font-family: Consolas, "Microsoft YaHei", monospace; }
  </style>
</defs>
<rect width="1700" height="980" fill="#F8FAFC"/>
<text x="850" y="54" font-size="30" font-weight="700" text-anchor="middle" fill="#0F172A">AXI5 在 C2C 里的位置：片上事务接口，不是线缆上的最终包格式</text>
<text x="850" y="88" font-size="18" font-weight="500" text-anchor="middle" fill="#475569">上层仍发 memory transaction；C2C 出口把片上事务适配成 OISA / C2C packet，再走 MAC / PCS / SerDes</text>
<g>
  <rect x="50" y="180" width="210" height="140" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="3"/>
  <text x="155" y="216.9" font-size="21" font-weight="700" text-anchor="middle">发起方</text>
<text x="74" y="241.68" font-size="16" font-weight="400" text-anchor="start">GPU / SDMA / TMA / CP</text>
<text x="74" y="263.44" font-size="16" font-weight="400" text-anchor="start">load/store 或 DMA</text>
<text x="74" y="285.2" font-size="16" font-weight="400" text-anchor="start">只关心地址和属性</text>
</g>
<g>
  <rect x="315" y="180" width="210" height="140" rx="10" fill="#ECFEFF" stroke="#0891B2" stroke-width="3"/>
  <text x="420" y="216.9" font-size="21" font-weight="700" text-anchor="middle">NoC</text>
<text x="339" y="241.68" font-size="16" font-weight="400" text-anchor="start">片上请求网络</text>
<text x="339" y="263.44" font-size="16" font-weight="400" text-anchor="start">搬运 request/response</text>
<text x="339" y="285.2" font-size="16" font-weight="400" text-anchor="start">处理 backpressure</text>
</g>
<g>
  <rect x="580" y="180" width="260" height="140" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="3"/>
  <text x="710" y="216.9" font-size="21" font-weight="700" text-anchor="middle">AMT / top / router</text>
<text x="604" y="241.68" font-size="16" font-weight="400" text-anchor="start">判断目标地址归属</text>
<text x="604" y="263.44" font-size="16" font-weight="400" text-anchor="start">本地 memory 或远端 GPU</text>
<text x="604" y="285.2" font-size="16" font-weight="400" text-anchor="start">选择 C2C/D2D 出口</text>
</g>
<g>
  <rect x="900" y="180" width="250" height="140" rx="10" fill="#FFF7ED" stroke="#F97316" stroke-width="3"/>
  <text x="1025" y="216.9" font-size="21" font-weight="700" text-anchor="middle">C2C adapter</text>
<text x="924" y="241.68" font-size="16" font-weight="400" text-anchor="start">NoC/AXI 风格边界</text>
<text x="924" y="263.44" font-size="16" font-weight="400" text-anchor="start">S/M monitor 可观测</text>
<text x="924" y="285.2" font-size="16" font-weight="400" text-anchor="start">准备进入 OISA MAC</text>
</g>
<g>
  <rect x="1210" y="180" width="250" height="140" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="3"/>
  <text x="1335" y="216.9" font-size="21" font-weight="700" text-anchor="middle">OISA / LLRMAC</text>
<text x="1234" y="241.68" font-size="16" font-weight="400" text-anchor="start">事务封装与流控</text>
<text x="1234" y="263.44" font-size="16" font-weight="400" text-anchor="start">ordering / error 语义</text>
<text x="1234" y="285.2" font-size="16" font-weight="400" text-anchor="start">必要时套 switch L2</text>
</g>
<g>
  <rect x="1520" y="180" width="140" height="140" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="3"/>
  <text x="1590" y="216.9" font-size="21" font-weight="700" text-anchor="middle">SerDes</text>
<text x="1544" y="241.68" font-size="16" font-weight="400" text-anchor="start">PCS / FEC</text>
<text x="1544" y="263.44" font-size="16" font-weight="400" text-anchor="start">lane 传输</text>
</g>
<line x1="262" y1="250" x2="309" y2="250" stroke="#334155" stroke-width="3"  marker-end="url(#arrow)"/>
<line x1="527" y1="250" x2="574" y2="250" stroke="#334155" stroke-width="3"  marker-end="url(#arrow)"/>
<line x1="842" y1="250" x2="894" y2="250" stroke="#334155" stroke-width="3"  marker-end="url(#arrow)"/>
<line x1="1152" y1="250" x2="1204" y2="250" stroke="#334155" stroke-width="3"  marker-end="url(#arrow)"/>
<line x1="1462" y1="250" x2="1514" y2="250" stroke="#334155" stroke-width="3"  marker-end="url(#arrow)"/>
<text x="615" y="382" font-size="18" font-weight="700" text-anchor="middle" fill="#334155">request path</text>
<polyline points="1560,350 1560,430 260,430 260,350" fill="none" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
<text x="930" y="412" font-size="18" font-weight="700" text-anchor="middle" fill="#64748B">response / read data 回包仍按事务语义返回</text>
<g>
  <rect x="185" y="520" width="610" height="168" rx="10" fill="#E0F2FE" stroke="#0284C7" stroke-width="3"/>
  <text x="490" y="558.7" font-size="23" font-weight="700" text-anchor="middle">AXI 在 C2C 中承担什么</text>
<text x="209" y="585.84" font-size="17" font-weight="400" text-anchor="start">1. 描述片上 memory transaction：地址、burst、ID、属性、数据、响应</text>
<text x="209" y="608.96" font-size="17" font-weight="400" text-anchor="start">2. 作为 adapter / NoC 边界的观测口：latency、req count、address match、perf</text>
<text x="209" y="632.08" font-size="17" font-weight="400" text-anchor="start">3. 让 CP/RGU 等模块能通过 AXI5 atomic 表达原子操作</text>
</g>
<g>
  <rect x="905" y="520" width="610" height="168" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="3"/>
  <text x="1210" y="558.7" font-size="23" font-weight="700" text-anchor="middle">AXI 不承担什么</text>
<text x="929" y="585.84" font-size="17" font-weight="400" text-anchor="start">1. 不等同于 OISA packet 字段表</text>
<text x="929" y="608.96" font-size="17" font-weight="400" text-anchor="start">2. 不等同于 switch 模式下的 C2C L2 外壳</text>
<text x="929" y="632.08" font-size="17" font-weight="400" text-anchor="start">3. 不直接描述 SerDes lane、FEC、link training</text>
</g>
<g>
  <rect x="410" y="755" width="880" height="140" rx="10" fill="#F8FAFC" stroke="#475569" stroke-width="3"/>
  <text x="850" y="792.8" font-size="22" font-weight="700" text-anchor="middle">调试口径</text>
<text x="434" y="818.76" font-size="17" font-weight="400" text-anchor="start">AXI monitor 看到的是进入/离开 C2C adapter 的片上请求；SerDes/RAS 看到的是链路侧状态。</text>
<text x="434" y="841.88" font-size="17" font-weight="400" text-anchor="start">所以定位问题时先分清：请求有没有到 adapter、OISA/MAC 有没有发出、远端 NoC 有没有收到。</text>
</g>
</svg>
