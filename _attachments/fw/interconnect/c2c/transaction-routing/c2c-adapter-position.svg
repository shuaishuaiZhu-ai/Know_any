<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="700" viewBox="0 0 1360 700">
  
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#334155" />
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#16a34a" />
    </marker>
    <marker id="arrow-pink" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#db2777" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="680" y="38" text-anchor="middle" font-size="24" font-weight="800" fill="#111827">C2C adapter 的位置：NoC 与 OISA/MAC/SerDes 的边界</text>
  
  <g>
    
  <g class="card">
    <rect x="50" y="95" width="210" height="130" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2.4"/>
    <text x="68" y="123" text-anchor="start" font-size="18" font-weight="700" fill="#111827">Source GPU</text>
    <text x="68" y="151" text-anchor="start" font-size="15" fill="#475569">GPU / SDMA / TMA</text>
<text x="68" y="173" text-anchor="start" font-size="15" fill="#475569">remote memory access</text>
  </g>
    
  <g class="card">
    <rect x="300" y="95" width="205" height="130" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2.4"/>
    <text x="318" y="123" text-anchor="start" font-size="18" font-weight="700" fill="#111827">NoC</text>
    <text x="318" y="151" text-anchor="start" font-size="15" fill="#475569">片上请求网络</text>
<text x="318" y="173" text-anchor="start" font-size="15" fill="#475569">把请求送到 C2C 出口</text>
  </g>
    
  <g class="card">
    <rect x="545" y="95" width="245" height="130" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.4"/>
    <text x="563" y="123" text-anchor="start" font-size="18" font-weight="700" fill="#111827">AMT / top / mesh_router</text>
    <text x="563" y="151" text-anchor="start" font-size="15" fill="#475569">判断目标地址范围</text>
<text x="563" y="173" text-anchor="start" font-size="15" fill="#475569">选择 D2D / C2C / local</text>
  </g>
    
  <g class="card">
    <rect x="830" y="95" width="250" height="130" rx="8" fill="#fdf2f8" stroke="#db2777" stroke-width="2.4"/>
    <text x="848" y="123" text-anchor="start" font-size="18" font-weight="700" fill="#111827">C2C adapter</text>
    <text x="848" y="151" text-anchor="start" font-size="15" fill="#475569">C2C slave：接收 NoC 请求</text>
<text x="848" y="173" text-anchor="start" font-size="15" fill="#475569">NoC 事务 -&gt; C2C 事务</text>
  </g>
    
  <g class="card">
    <rect x="1120" y="95" width="190" height="130" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2.4"/>
    <text x="1138" y="123" text-anchor="start" font-size="18" font-weight="700" fill="#111827">OISA MAC</text>
    <text x="1138" y="151" text-anchor="start" font-size="15" fill="#475569">packet/header</text>
<text x="1138" y="173" text-anchor="start" font-size="15" fill="#475569">flow/error/order</text>
  </g>
    <line x1="260" y1="160" x2="300" y2="160" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
    <line x1="505" y1="160" x2="545" y2="160" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
    <line x1="790" y1="160" x2="830" y2="160" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
    <line x1="1080" y1="160" x2="1120" y2="160" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />

    
  <g class="card">
    <rect x="170" y="320" width="240" height="118" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="2.4"/>
    <text x="188" y="348" text-anchor="start" font-size="18" font-weight="700" fill="#111827">PCS / SerDes</text>
    <text x="188" y="376" text-anchor="start" font-size="15" fill="#475569">x2 / x4 port</text>
<text x="188" y="398" text-anchor="start" font-size="15" fill="#475569">112G SerDes</text>
  </g>
    
  <g class="card">
    <rect x="510" y="320" width="260" height="118" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2.4"/>
    <text x="528" y="348" text-anchor="start" font-size="18" font-weight="700" fill="#111827">direct link or switch</text>
    <text x="528" y="376" text-anchor="start" font-size="15" fill="#475569">直连：到对端 C2C</text>
<text x="528" y="398" text-anchor="start" font-size="15" fill="#475569">switch：先到 fabric</text>
  </g>
    
  <g class="card">
    <rect x="870" y="320" width="250" height="118" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.4"/>
    <text x="888" y="348" text-anchor="start" font-size="18" font-weight="700" fill="#111827">Target C2C adapter</text>
    <text x="888" y="376" text-anchor="start" font-size="15" fill="#475569">C2C master：向目标 NoC 发请求</text>
<text x="888" y="398" text-anchor="start" font-size="15" fill="#475569">必要时目标 GPU 内部 D2D</text>
  </g>
    <polyline points="1215,225 1215,270 290,270 290,320" fill="none" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow)" />
    <line x1="410" y1="379" x2="510" y2="379" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
    <line x1="770" y1="379" x2="870" y2="379" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />

    
  <g class="card">
    <rect x="95" y="535" width="520" height="128" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2.4"/>
    <text x="113" y="563" text-anchor="start" font-size="18" font-weight="700" fill="#111827">为什么说 adapter 在边界上</text>
    <text x="113" y="591" text-anchor="start" font-size="15" fill="#475569">资料里三组 adapter 都有 S/M monitor。</text>
<text x="113" y="613" text-anchor="start" font-size="15" fill="#475569">S 监控 NoC -&gt; C2C；M 监控 C2C -&gt; NoC。</text>
<text x="113" y="635" text-anchor="start" font-size="15" fill="#475569">所以 adapter 是 NoC 事务和 C2C 链路协议之间的收发适配口。</text>
  </g>
    
  <g class="card">
    <rect x="680" y="535" width="500" height="128" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2.4"/>
    <text x="698" y="563" text-anchor="start" font-size="18" font-weight="700" fill="#111827">出口硬件是什么</text>
    <text x="698" y="591" text-anchor="start" font-size="15" fill="#475569">源侧 C2C egress path：adapter + OISA MAC + L2 封装逻辑。</text>
<text x="698" y="613" text-anchor="start" font-size="15" fill="#475569">再接 PCS/SerDes 发到直连链路或 switch fabric。</text>
<text x="698" y="635" text-anchor="start" font-size="15" fill="#475569">当前材料没有 RTL 细分，不能把职责硬指给某个子模块。</text>
  </g>
  </g>
  <text x="1336" y="682" text-anchor="end" font-size="12" fill="#64748b">source: local C2C wiki/raw + public NVSwitch/Ethernet analogies</text>
</svg>