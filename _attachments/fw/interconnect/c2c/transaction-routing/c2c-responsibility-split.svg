<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="700" viewBox="0 0 1280 700">
  
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#334155" />
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#16a34a" />
    </marker>
    <marker id="arrow-pink" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#db2777" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="640" y="38" text-anchor="middle" font-size="24" font-weight="800" fill="#111827">C2C 发包：配置者与运行时执行者</text>
  
  <g>
    
  <g class="card">
    <rect x="50" y="88" width="330" height="150" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2.4"/>
    <text x="68" y="116" text-anchor="start" font-size="18" font-weight="700" fill="#111827">软件 / KMD</text>
    <text x="68" y="144" text-anchor="start" font-size="15" fill="#475569">管理 VA / PA / peer mapping</text>
<text x="68" y="166" text-anchor="start" font-size="15" fill="#475569">决定哪些拓扑走 direct / switch</text>
<text x="68" y="188" text-anchor="start" font-size="15" fill="#475569">给 FW/IMC 下发基础信息</text>
  </g>
    
  <g class="card">
    <rect x="470" y="88" width="330" height="150" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.4"/>
    <text x="488" y="116" text-anchor="start" font-size="18" font-weight="700" fill="#111827">FW / IMC</text>
    <text x="488" y="144" text-anchor="start" font-size="15" fill="#475569">link training / port-chip relation</text>
<text x="488" y="166" text-anchor="start" font-size="15" fill="#475569">配置 top_cfg / c2c_port_map / d2d_map</text>
<text x="488" y="188" text-anchor="start" font-size="15" fill="#475569">维护错误统计 / loopback / bring-up</text>
  </g>
    
  <g class="card">
    <rect x="890" y="88" width="330" height="150" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2.4"/>
    <text x="908" y="116" text-anchor="start" font-size="18" font-weight="700" fill="#111827">硬件运行时</text>
    <text x="908" y="144" text-anchor="start" font-size="15" fill="#475569">AMT / top / mesh_router 判断目标</text>
<text x="908" y="166" text-anchor="start" font-size="15" fill="#475569">C2C adapter 做事务适配</text>
<text x="908" y="188" text-anchor="start" font-size="15" fill="#475569">OISA/L2/SerDes 发包</text>
  </g>
    <line x1="380" y1="163" x2="470" y2="163" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
    <line x1="800" y1="163" x2="890" y2="163" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />

    <text x="70" y="300" font-size="18" font-weight="800" fill="#334155">同一笔远端访问的责任分解</text>
    
  <g class="card">
    <rect x="70" y="330" width="245" height="128" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2.4"/>
    <text x="88" y="358" text-anchor="start" font-size="18" font-weight="700" fill="#111827">1. 发起访问</text>
    <text x="88" y="386" text-anchor="start" font-size="15" fill="#475569">GPU core / SDMA / TMA</text>
<text x="88" y="408" text-anchor="start" font-size="15" fill="#475569">发 NoC memory read/write</text>
  </g>
    
  <g class="card">
    <rect x="360" y="330" width="245" height="128" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.4"/>
    <text x="378" y="358" text-anchor="start" font-size="18" font-weight="700" fill="#111827">2. 判断目标</text>
    <text x="378" y="386" text-anchor="start" font-size="15" fill="#475569">AMT 地址匹配</text>
<text x="378" y="408" text-anchor="start" font-size="15" fill="#475569">top / mesh_router 解 gpu_id/die_id</text>
  </g>
    
  <g class="card">
    <rect x="650" y="330" width="245" height="128" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2.4"/>
    <text x="668" y="358" text-anchor="start" font-size="18" font-weight="700" fill="#111827">3. 选择出口</text>
    <text x="668" y="386" text-anchor="start" font-size="15" fill="#475569">direct：查目标下一跳 mask</text>
<text x="668" y="408" text-anchor="start" font-size="15" fill="#475569">switch：轮询可用 serdes</text>
  </g>
    
  <g class="card">
    <rect x="940" y="330" width="245" height="128" rx="8" fill="#fdf2f8" stroke="#db2777" stroke-width="2.4"/>
    <text x="958" y="358" text-anchor="start" font-size="18" font-weight="700" fill="#111827">4. 封装发送</text>
    <text x="958" y="386" text-anchor="start" font-size="15" fill="#475569">adapter -&gt; OISA MAC</text>
<text x="958" y="408" text-anchor="start" font-size="15" fill="#475569">switch 模式再加 L2 外壳</text>
  </g>
    <line x1="315" y1="394" x2="360" y2="394" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
    <line x1="605" y1="394" x2="650" y2="394" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
    <line x1="895" y1="394" x2="940" y2="394" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />

    
  <g class="card">
    <rect x="95" y="535" width="1030" height="110" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2.4"/>
    <text x="113" y="563" text-anchor="start" font-size="18" font-weight="700" fill="#111827">不要混淆：配置者不等于每包执行者</text>
    <text x="113" y="591" text-anchor="start" font-size="15" fill="#475569">KMD/FW/IMC 负责把拓扑事实写进寄存器 / 表；业务运行时每笔包由硬件流水线按这些表执行。</text>
<text x="113" y="613" text-anchor="start" font-size="15" fill="#475569">如果没有 RTL/寄存器字段证据，不能断言 L2 header 一定由 adapter 子模块还是 OISA MAC 子模块拼；只能定位在 C2C 出口硬件。</text>
  </g>
  </g>
  <text x="1256" y="682" text-anchor="end" font-size="12" fill="#64748b">source: local C2C wiki/raw + public NVSwitch/Ethernet analogies</text>
</svg>