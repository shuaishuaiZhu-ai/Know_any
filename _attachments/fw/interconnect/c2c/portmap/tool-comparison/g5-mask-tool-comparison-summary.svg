<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1160" viewBox="0 0 1680 1160">
  <rect width="1680" height="1160" fill="#F8FAFC"/>
  <g font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">
    <text x="64" y="78" font-size="38" font-weight="800" fill="#0F172A">G5 第一跳和 8bit mask：图解工具对比</text>
    <text x="64" y="116" font-size="18" fill="#475569">同一主题、同一信息量：G5 源点、四个方向 mask、三个目标例子。Excalidraw / tldraw 已按要求排除。</text>

    <rect x="64" y="154" width="1552" height="94" rx="20" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="96" y="192" font-size="22" font-weight="700" fill="#0F172A">快速结论</text>
    <text x="96" y="222" font-size="18" fill="#334155">本次 G5 例子的最佳两版：lark-whiteboard SVG 和 Graphviz DOT。前者最适合教学首图；后者用源码表达 4x4 拓扑 + mask 分支最清晰。D2/Mermaid/PlantUML 作为特定场景备选。</text>

    
    <rect x="64" y="286" width="484" height="226" rx="18" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
    <rect x="64" y="286" width="10" height="226" rx="5" fill="#2563EB"/>
    <text x="92" y="328" font-size="24" font-weight="700" fill="#0F172A">lark-whiteboard SVG</text>
    <text x="92" y="354" font-size="15" fill="#64748B">本页原始白板图的路线</text>
    <text x="92" y="380" font-size="18" fill="#334155">可手工控制布局、颜色和教学节奏</text>
<text x="92" y="406" font-size="18" fill="#334155">适合把“拓扑 + mask + 例子”放进一张图</text>
<text x="92" y="432" font-size="18" fill="#334155">缺点：批量维护需要脚本化，否则修改成本偏高</text>
  

    
    <rect x="598" y="286" width="484" height="226" rx="18" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2"/>
    <rect x="598" y="286" width="10" height="226" rx="5" fill="#16A34A"/>
    <text x="626" y="328" font-size="24" font-weight="700" fill="#0F172A">D2</text>
    <text x="626" y="354" font-size="15" fill="#64748B">源码化拓扑备选</text>
    <text x="626" y="380" font-size="18" fill="#334155">源码短、自动布局，适合模块关系</text>
<text x="626" y="406" font-size="18" fill="#334155">本次用 @terrastruct/d2 本地渲染 SVG</text>
<text x="626" y="432" font-size="18" fill="#334155">这次 G5 图可读性不如 SVG/DOT</text>
  

    
    <rect x="1132" y="286" width="484" height="226" rx="18" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2"/>
    <rect x="1132" y="286" width="10" height="226" rx="5" fill="#475569"/>
    <text x="1160" y="328" font-size="24" font-weight="700" fill="#0F172A">Graphviz DOT</text>
    <text x="1160" y="354" font-size="15" fill="#64748B">本次 G5 对比同属最佳</text>
    <text x="1160" y="380" font-size="18" fill="#334155">4x4 table + mask 分支表达清晰</text>
<text x="1160" y="406" font-size="18" fill="#334155">本次用 @viz-js/viz 本地渲染 SVG</text>
<text x="1160" y="432" font-size="18" fill="#334155">源码可维护，适合后续生成同类拓扑</text>
  

    
    <rect x="64" y="560" width="484" height="226" rx="18" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
    <rect x="64" y="560" width="10" height="226" rx="5" fill="#EA580C"/>
    <text x="92" y="602" font-size="24" font-weight="700" fill="#0F172A">Mermaid</text>
    <text x="92" y="628" font-size="15" fill="#64748B">Markdown 内快速草图</text>
    <text x="92" y="654" font-size="18" fill="#334155">写法最轻，适合临时流程图和 wiki 快速记录</text>
<text x="92" y="680" font-size="18" fill="#334155">本次用 whiteboard-cli 从 .mmd 渲染 PNG</text>
<text x="92" y="706" font-size="18" fill="#334155">缺点：复杂布局和长中文标签容易失控</text>
  

    
    <rect x="598" y="560" width="484" height="226" rx="18" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
    <rect x="598" y="560" width="10" height="226" rx="5" fill="#7C3AED"/>
    <text x="626" y="602" font-size="24" font-weight="700" fill="#0F172A">PlantUML</text>
    <text x="626" y="628" font-size="15" fill="#64748B">时序/状态/组件更合适</text>
    <text x="626" y="654" font-size="18" fill="#334155">适合 sequence/state/component 等 UML 语义图</text>
<text x="626" y="680" font-size="18" fill="#334155">本机缺 java/plantuml，本次只保留 .puml 源</text>
<text x="626" y="706" font-size="18" fill="#334155">不建议用它承担这张 4x4 portmap 教学图</text>
  

    
    <rect x="1132" y="560" width="484" height="226" rx="18" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2"/>
    <rect x="1132" y="560" width="10" height="226" rx="5" fill="#DB2777"/>
    <text x="1160" y="602" font-size="24" font-weight="700" fill="#0F172A">Kroki</text>
    <text x="1160" y="628" font-size="15" fill="#64748B">统一渲染网关，不是图语言</text>
    <text x="1160" y="654" font-size="18" fill="#334155">可统一渲染 D2、DOT、PlantUML、Mermaid 等</text>
<text x="1160" y="680" font-size="18" fill="#334155">内部资料不建议直接发公网服务</text>
<text x="1160" y="706" font-size="18" fill="#334155">若自建 Kroki，可作为后端而非替代语言</text>
  

    <rect x="64" y="836" width="1552" height="230" rx="20" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="96" y="882" font-size="24" font-weight="700" fill="#0F172A">对这个 G5 例子的推荐排序</text>
    <text x="96" y="922" font-size="18" fill="#334155">1. 最佳教学首图：lark-whiteboard SVG，能把 4x4 拓扑、方向、mask 和例子放在同一视野。</text>
    <text x="96" y="958" font-size="18" fill="#334155">2. 最佳源码化对比图：Graphviz DOT，4x4 table + mask 分支对这张图更清晰。</text>
    <text x="96" y="994" font-size="18" fill="#334155">3. 备选源码化拓扑：D2，适合模块关系和自动布局，但这次 G5 图不如 DOT。</text>
    <text x="96" y="1030" font-size="18" fill="#334155">4. 快速记录：Mermaid 可用，但不适合承载这类“二维拓扑 + bitmask 映射 + 路由策略”复合讲解图。</text>
  </g>
</svg>