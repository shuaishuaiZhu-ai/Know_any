<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760">
  <rect width="1320" height="760" fill="#F8FAFC"/>
  <g font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">
    <text x="56" y="76" font-size="34" font-weight="800" fill="#0F172A">PlantUML：G5 第一跳例子的渲染边界</text>
    <text x="56" y="112" font-size="17" fill="#475569">本机没有 java / plantuml。为避免把内部拓扑发到公网 Kroki/PlantUML Server，本次只保留 .puml 源码，不做外部渲染。</text>

    <rect x="56" y="154" width="548" height="496" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="90" y="200" font-size="24" font-weight="700" fill="#0F172A">PlantUML 更适合的表达</text>
    <text x="90" y="242" font-size="19" fill="#334155">sequenceDiagram 类似的请求/响应链路</text>
<text x="90" y="268" font-size="19" fill="#334155">stateDiagram 类似的状态机</text>
<text x="90" y="294" font-size="19" fill="#334155">component/deployment 类似的软件模块图</text>
<text x="90" y="320" font-size="19" fill="#334155">用它画 4x4 拓扑和 mask 教学图会比较别扭</text>

    <rect x="90" y="394" width="430" height="170" rx="14" fill="#F5F3FF" stroke="#A78BFA" stroke-width="2"/>
    <text x="118" y="436" font-size="22" font-weight="700" fill="#5B21B6">本次产物</text>
    <text x="118" y="474" font-size="20" font-family="Consolas, monospace" fill="#4C1D95">g5-mask-plantuml.puml</text>
    <text x="118" y="514" font-size="17" fill="#334155">用途：后续装好 Java/PlantUML 或自建 Kroki 后可渲染。</text>

    <rect x="662" y="154" width="602" height="496" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="696" y="200" font-size="24" font-weight="700" fill="#0F172A">同一信息在 PlantUML 源里的组织方式</text>
    <rect x="700" y="236" width="520" height="338" rx="14" fill="#111827"/>
    <text x="728" y="278" font-size="20" font-family="Consolas, monospace" fill="#D1D5DB">@startuml</text>
    <text x="728" y="312" font-size="20" font-family="Consolas, monospace" fill="#D1D5DB">rectangle &quot;G5 source&quot; as G5</text>
    <text x="728" y="346" font-size="20" font-family="Consolas, monospace" fill="#93C5FD">G5 --&gt; UP    : 11000000</text>
    <text x="728" y="380" font-size="20" font-family="Consolas, monospace" fill="#FBBF24">G5 --&gt; RIGHT : 00110000</text>
    <text x="728" y="414" font-size="20" font-family="Consolas, monospace" fill="#F9A8D4">G5 --&gt; DOWN  : 00001100</text>
    <text x="728" y="448" font-size="20" font-family="Consolas, monospace" fill="#86EFAC">G5 --&gt; LEFT  : 00000011</text>
    <text x="728" y="482" font-size="20" font-family="Consolas, monospace" fill="#D1D5DB">note right: mask = first-hop port group</text>
    <text x="728" y="516" font-size="20" font-family="Consolas, monospace" fill="#D1D5DB">@enduml</text>
  </g>
</svg>