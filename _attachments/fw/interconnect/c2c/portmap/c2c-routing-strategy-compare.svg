<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <rect x="0" y="0" width="1280" height="760" fill="#F8FAFC"/>
  <g font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">
    <text x="52" y="58" font-size="30" font-weight="700" fill="#0F172A">C2C 直连路由策略对比：数字变化来自“第一跳策略”</text>
    <text x="52" y="92" font-size="16" fill="#475569">同一个拓扑下，软件静态下发不同策略，会让相同目标行得到不同 8bit mask。</text>

    <rect x="52" y="124" width="560" height="516" rx="20" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="84" y="164" font-size="23" font-weight="700" fill="#92400E">策略 A：先沿 x 轴，再沿 y 轴</text>
    <text x="84" y="194" font-size="14" fill="#64748B">斜向目标的第一跳大多被压到 x 方向，图中备注为 x轴 12、y轴 3。</text>

    <g text-anchor="middle" font-size="13" font-weight="700">
      <rect x="106" y="238" width="70" height="48" rx="8" fill="#FEF3C7" stroke="#FBBF24"/>
      <text x="141" y="267" fill="#92400E">G0</text>
      <rect x="188" y="238" width="70" height="48" rx="8" fill="#E2E8F0" stroke="#CBD5E1"/>
      <text x="223" y="267" fill="#475569">G1</text>
      <rect x="270" y="238" width="70" height="48" rx="8" fill="#E2E8F0" stroke="#CBD5E1"/>
      <text x="305" y="267" fill="#475569">G2</text>
      <rect x="352" y="238" width="70" height="48" rx="8" fill="#E2E8F0" stroke="#CBD5E1"/>
      <text x="387" y="267" fill="#475569">G3</text>

      <rect x="106" y="300" width="70" height="48" rx="8" fill="#FEF3C7" stroke="#FBBF24"/>
      <text x="141" y="329" fill="#92400E">G4</text>
      <rect x="188" y="300" width="70" height="48" rx="10" fill="#1D4ED8" stroke="#1E3A8A" stroke-width="3"/>
      <text x="223" y="322" fill="#FFFFFF">G5</text>
      <text x="223" y="338" font-size="10" fill="#DBEAFE">源</text>
      <rect x="270" y="300" width="70" height="48" rx="8" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>
      <text x="305" y="329" fill="#92400E">G6</text>
      <rect x="352" y="300" width="70" height="48" rx="8" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>
      <text x="387" y="329" fill="#92400E">G7</text>

      <rect x="106" y="362" width="70" height="48" rx="8" fill="#FEF3C7" stroke="#FBBF24"/>
      <text x="141" y="391" fill="#92400E">G8</text>
      <rect x="188" y="362" width="70" height="48" rx="8" fill="#E2E8F0" stroke="#CBD5E1"/>
      <text x="223" y="391" fill="#475569">G9</text>
      <rect x="270" y="362" width="70" height="48" rx="8" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>
      <text x="305" y="391" fill="#92400E">G10</text>
      <rect x="352" y="362" width="70" height="48" rx="8" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>
      <text x="387" y="391" fill="#92400E">G11</text>

      <rect x="106" y="424" width="70" height="48" rx="8" fill="#FEF3C7" stroke="#FBBF24"/>
      <text x="141" y="453" fill="#92400E">G12</text>
      <rect x="188" y="424" width="70" height="48" rx="8" fill="#E2E8F0" stroke="#CBD5E1"/>
      <text x="223" y="453" fill="#475569">G13</text>
      <rect x="270" y="424" width="70" height="48" rx="8" fill="#E2E8F0" stroke="#CBD5E1"/>
      <text x="305" y="453" fill="#475569">G14</text>
      <rect x="352" y="424" width="70" height="48" rx="8" fill="#E2E8F0" stroke="#CBD5E1"/>
      <text x="387" y="453" fill="#475569">G15</text>
    </g>

    <line x1="258" y1="324" x2="269" y2="324" stroke="#D97706" stroke-width="4" stroke-linecap="round"/>
    <polygon points="280,324 266,316 266,332" fill="#D97706"/>
    <polyline points="305,348 305,362" fill="none" stroke="#D97706" stroke-width="4" stroke-linecap="round"/>
    <polygon points="305,373 297,359 313,359" fill="#D97706"/>
    <text x="466" y="300" font-size="14" font-weight="700" fill="#92400E">G5 -> G10</text>
    <text x="466" y="326" font-size="13" fill="#78350F">第一跳向右</text>
    <text x="466" y="350" font-size="13" fill="#78350F">mask = 00110000</text>

    <rect x="94" y="516" width="454" height="82" rx="14" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="118" y="548" font-size="15" font-weight="700" fill="#9A3412">负载倾向</text>
    <rect x="210" y="532" width="220" height="16" rx="8" fill="#FED7AA"/>
    <rect x="210" y="532" width="176" height="16" rx="8" fill="#F97316"/>
    <text x="444" y="546" font-size="13" fill="#9A3412">x轴 12</text>
    <rect x="210" y="568" width="220" height="16" rx="8" fill="#E0F2FE"/>
    <rect x="210" y="568" width="44" height="16" rx="8" fill="#0EA5E9"/>
    <text x="444" y="582" font-size="13" fill="#075985">y轴 3</text>

    <rect x="668" y="124" width="560" height="516" rx="20" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="700" y="164" font-size="23" font-weight="700" fill="#166534">策略 B：按象限固定路由</text>
    <text x="700" y="194" font-size="14" fill="#64748B">目标先落入象限，再给每个象限固定首跳方向，图中备注为 x轴 8、y轴 7。</text>

    <g text-anchor="middle" font-size="13" font-weight="700">
      <rect x="722" y="238" width="70" height="48" rx="8" fill="#DCFCE7" stroke="#86EFAC"/>
      <text x="757" y="267" fill="#166534">G0</text>
      <rect x="804" y="238" width="70" height="48" rx="8" fill="#DBEAFE" stroke="#93C5FD"/>
      <text x="839" y="267" fill="#1E40AF">G1</text>
      <rect x="886" y="238" width="70" height="48" rx="8" fill="#DBEAFE" stroke="#93C5FD"/>
      <text x="921" y="267" fill="#1E40AF">G2</text>
      <rect x="968" y="238" width="70" height="48" rx="8" fill="#DBEAFE" stroke="#93C5FD"/>
      <text x="1003" y="267" fill="#1E40AF">G3</text>

      <rect x="722" y="300" width="70" height="48" rx="8" fill="#DCFCE7" stroke="#86EFAC"/>
      <text x="757" y="329" fill="#166534">G4</text>
      <rect x="804" y="300" width="70" height="48" rx="10" fill="#1D4ED8" stroke="#1E3A8A" stroke-width="3"/>
      <text x="839" y="322" fill="#FFFFFF">G5</text>
      <text x="839" y="338" font-size="10" fill="#DBEAFE">源</text>
      <rect x="886" y="300" width="70" height="48" rx="8" fill="#FEF3C7" stroke="#FBBF24"/>
      <text x="921" y="329" fill="#92400E">G6</text>
      <rect x="968" y="300" width="70" height="48" rx="8" fill="#FEF3C7" stroke="#FBBF24"/>
      <text x="1003" y="329" fill="#92400E">G7</text>

      <rect x="722" y="362" width="70" height="48" rx="8" fill="#FCE7F3" stroke="#F9A8D4"/>
      <text x="757" y="391" fill="#9D174D">G8</text>
      <rect x="804" y="362" width="70" height="48" rx="8" fill="#FCE7F3" stroke="#F9A8D4"/>
      <text x="839" y="391" fill="#9D174D">G9</text>
      <rect x="886" y="362" width="70" height="48" rx="8" fill="#FEF3C7" stroke="#FBBF24"/>
      <text x="921" y="391" fill="#92400E">G10</text>
      <rect x="968" y="362" width="70" height="48" rx="8" fill="#FEF3C7" stroke="#FBBF24"/>
      <text x="1003" y="391" fill="#92400E">G11</text>

      <rect x="722" y="424" width="70" height="48" rx="8" fill="#FCE7F3" stroke="#F9A8D4"/>
      <text x="757" y="453" fill="#9D174D">G12</text>
      <rect x="804" y="424" width="70" height="48" rx="8" fill="#FCE7F3" stroke="#F9A8D4"/>
      <text x="839" y="453" fill="#9D174D">G13</text>
      <rect x="886" y="424" width="70" height="48" rx="8" fill="#E2E8F0" stroke="#CBD5E1"/>
      <text x="921" y="453" fill="#475569">G14</text>
      <rect x="968" y="424" width="70" height="48" rx="8" fill="#E2E8F0" stroke="#CBD5E1"/>
      <text x="1003" y="453" fill="#475569">G15</text>
    </g>

    <line x1="839" y1="300" x2="839" y2="287" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
    <polygon points="839,276 831,290 847,290" fill="#2563EB"/>
    <line x1="874" y1="324" x2="885" y2="324" stroke="#D97706" stroke-width="4" stroke-linecap="round"/>
    <polygon points="896,324 882,316 882,332" fill="#D97706"/>
    <line x1="839" y1="348" x2="839" y2="361" stroke="#DB2777" stroke-width="4" stroke-linecap="round"/>
    <polygon points="839,372 831,358 847,358" fill="#DB2777"/>
    <line x1="804" y1="324" x2="793" y2="324" stroke="#16A34A" stroke-width="4" stroke-linecap="round"/>
    <polygon points="782,324 796,316 796,332" fill="#16A34A"/>
    <text x="1080" y="300" font-size="14" font-weight="700" fill="#166534">象限固定</text>
    <text x="1080" y="326" font-size="13" fill="#14532D">不同象限分摊首跳</text>
    <text x="1080" y="350" font-size="13" fill="#14532D">mask 随策略变化</text>

    <rect x="710" y="516" width="454" height="82" rx="14" fill="#F0FDF4" stroke="#BBF7D0"/>
    <text x="734" y="548" font-size="15" font-weight="700" fill="#166534">负载倾向</text>
    <rect x="826" y="532" width="220" height="16" rx="8" fill="#DCFCE7"/>
    <rect x="826" y="532" width="118" height="16" rx="8" fill="#22C55E"/>
    <text x="1060" y="546" font-size="13" fill="#166534">x轴 8</text>
    <rect x="826" y="568" width="220" height="16" rx="8" fill="#E0F2FE"/>
    <rect x="826" y="568" width="103" height="16" rx="8" fill="#0EA5E9"/>
    <text x="1060" y="582" font-size="13" fill="#075985">y轴 7</text>

    <rect x="134" y="674" width="1012" height="46" rx="23" fill="#E2E8F0"/>
    <text x="640" y="703" font-size="16" text-anchor="middle" fill="#334155">结论：拓扑没有变，变的是软件选择“第一跳”的策略，所以 portmap 表里的 8bit 数字会跟着变。</text>
  </g>
</svg>
