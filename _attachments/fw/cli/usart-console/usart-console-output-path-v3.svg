<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="730" y="48" text-anchor="middle" font-size="30" font-weight="800" fill="#0f172a">RT-Thread console 输出路径</text>

<g>
  <rect x="80" y="135" width="230" height="105" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="195" y="171" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">任意代码</text>
  <text x="108" y="196.3" text-anchor="start" font-size="18" font-weight="500" fill="#334155">rt_kprintf(&quot;...&quot;)</text>
<text x="108" y="220.6" text-anchor="start" font-size="18" font-weight="500" fill="#334155">shell 回显也走这里</text>
</g>
<g>
  <rect x="390" y="135" width="260" height="105" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="520" y="171" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">rt_kprintf()</text>
  <text x="418" y="196.3" text-anchor="start" font-size="18" font-weight="500" fill="#334155">格式化到 rt_log_buf</text>
<text x="418" y="220.6" text-anchor="start" font-size="18" font-weight="500" fill="#334155">检查 _console_device</text>
</g>
<g>
  <rect x="760" y="95" width="270" height="129" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="895" y="131" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">_console_device 已设置</text>
  <text x="788" y="156.3" text-anchor="start" font-size="18" font-weight="500" fill="#334155">rt_console_set_device()</text>
<text x="788" y="180.6" text-anchor="start" font-size="18" font-weight="500" fill="#334155">find/open usartN</text>
<text x="788" y="204.9" text-anchor="start" font-size="18" font-weight="500" fill="#334155">把全局 console 指针指向它</text>
</g>
<g>
  <rect x="760" y="315" width="270" height="129" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="895" y="351" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">_console_device 为空</text>
  <text x="788" y="376.3" text-anchor="start" font-size="18" font-weight="500" fill="#334155">走 fallback</text>
<text x="788" y="400.6" text-anchor="start" font-size="18" font-weight="500" fill="#334155">rt_hw_console_output()</text>
<text x="788" y="424.9" text-anchor="start" font-size="18" font-weight="500" fill="#334155">board/lib/console.c</text>
</g>
<g>
  <rect x="1120" y="95" width="260" height="129" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="1250" y="131" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">device write</text>
  <text x="1148" y="156.3" text-anchor="start" font-size="18" font-weight="500" fill="#334155">rt_device_write()</text>
<text x="1148" y="180.6" text-anchor="start" font-size="18" font-weight="500" fill="#334155">dev-&gt;write</text>
<text x="1148" y="204.9" text-anchor="start" font-size="18" font-weight="500" fill="#334155">drv_usart_write()</text>
</g>
<g>
  <rect x="1120" y="315" width="260" height="129" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="1250" y="351" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">裸 console 输出</text>
  <text x="1148" y="376.3" text-anchor="start" font-size="18" font-weight="500" fill="#334155">usart_put_char()</text>
<text x="1148" y="400.6" text-anchor="start" font-size="18" font-weight="500" fill="#334155">直接字符输出</text>
<text x="1148" y="424.9" text-anchor="start" font-size="18" font-weight="500" fill="#334155">只作为兜底路径</text>
</g>
<g>
  <rect x="1120" y="545" width="260" height="129" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="1250" y="581" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">USART TX</text>
  <text x="1148" y="606.3" text-anchor="start" font-size="18" font-weight="500" fill="#334155">drv_usart_send_data()</text>
<text x="1148" y="630.6" text-anchor="start" font-size="18" font-weight="500" fill="#334155">等待 TX FIFO 不满</text>
<text x="1148" y="654.9" text-anchor="start" font-size="18" font-weight="500" fill="#334155">写 txdata</text>
</g>
<g>
  <polyline points="310,185 390,185" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow-334155)" stroke-linecap="round" stroke-linejoin="round"/>
  
</g>
<g>
  <polyline points="650,185 760,154" fill="none" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow-ea580c)" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="705" y="142" text-anchor="middle" font-size="18" font-weight="700" fill="#ea580c">正常路径</text>
</g>
<g>
  <polyline points="650,185 710,185 710,374 760,374" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow-64748b)" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="636" y="286" text-anchor="middle" font-size="18" font-weight="700" fill="#64748b">fallback</text>
</g>
<g>
  <polyline points="1030,154 1120,154" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow-334155)" stroke-linecap="round" stroke-linejoin="round"/>
  
</g>
<g>
  <polyline points="1030,374 1120,374" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow-334155)" stroke-linecap="round" stroke-linejoin="round"/>
  
</g>
<g>
  <polyline points="1380,154 1425,154 1425,482 1250,482 1250,545" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-2563eb)" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1345" y="527" text-anchor="middle" font-size="18" font-weight="700" fill="#2563eb">逐字节写 TX FIFO</text>
</g>
<g>
  <polyline points="1250,433 1250,545" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow-64748b)" stroke-linecap="round" stroke-linejoin="round"/>
  
</g>
<text x="90" y="595" text-anchor="start" font-size="21" font-weight="700" fill="#334155">console 的作用不是“另一个串口驱动”，而是把系统打印统一路由到当前选中的 device。</text>
<text x="90" y="627" text-anchor="start" font-size="21" font-weight="700" fill="#334155">USART device 注册后，输出路径优先走 rt_device_write；fallback 只在 console 未设置时使用。</text>

<text x="1430" y="736" text-anchor="end" font-size="16" fill="#64748b">source: 192.168.80.116:/home/shuaishuai.zhu/fw @ 541207a</text>
</svg>