<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1510" height="860" viewBox="0 0 1510 860">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.12"/>
  </filter>
</defs>
<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="755" y="48" text-anchor="middle" font-size="30" font-weight="800" fill="#0f172a">USART 初始化顺序：从 board 到 shell</text>

<g>
  <rect x="80" y="95" width="210" height="48" rx="24" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="185" y="127" text-anchor="middle" font-size="21" font-weight="700" fill="#075985">board init</text>
</g>
<g>
  <rect x="340" y="95" width="230" height="48" rx="24" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
  <text x="455" y="127" text-anchor="middle" font-size="21" font-weight="700" fill="#075985">drv_usart</text>
</g>
<g>
  <rect x="620" y="95" width="250" height="48" rx="24" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="745" y="127" text-anchor="middle" font-size="21" font-weight="700" fill="#075985">RT device</text>
</g>
<g>
  <rect x="930" y="95" width="210" height="48" rx="24" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="1035" y="127" text-anchor="middle" font-size="21" font-weight="700" fill="#075985">console/HAL</text>
</g>
<g>
  <rect x="1200" y="95" width="240" height="48" rx="24" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="1320" y="127" text-anchor="middle" font-size="21" font-weight="700" fill="#075985">agc_shell</text>
</g>
<g>
  <rect x="70" y="190" width="235" height="92" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="187.5" y="226" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">1. premain</text>
  <text x="98" y="246" text-anchor="start" font-size="18" font-weight="500" fill="#334155">board_system_premain_init()</text>
<text x="98" y="275" text-anchor="start" font-size="18" font-weight="500" fill="#334155">传入 USART 地址宏</text>
</g>
<g>
  <rect x="340" y="190" width="245" height="92" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="462.5" y="226" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">2. driver init</text>
  <text x="368" y="246" text-anchor="start" font-size="18" font-weight="500" fill="#334155">drv_usart_init(reg)</text>
<text x="368" y="275" text-anchor="start" font-size="18" font-weight="500" fill="#334155">保存 reg 并计算 id</text>
</g>
<g>
  <rect x="340" y="330" width="245" height="118" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="462.5" y="366" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">3. 配硬件</text>
  <text x="368" y="386" text-anchor="start" font-size="18" font-weight="500" fill="#334155">drv_usart_hw_init(id)</text>
<text x="368" y="415" text-anchor="start" font-size="18" font-weight="500" fill="#334155">baud / reset / FIFO</text>
<text x="368" y="444" text-anchor="start" font-size="18" font-weight="500" fill="#334155">RX watermark / RXIE</text>
</g>
<g>
  <rect x="620" y="330" width="260" height="118" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="750" y="366" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">4. 注册 device</text>
  <text x="648" y="386" text-anchor="start" font-size="18" font-weight="500" fill="#334155">drv_usart_dev_init()</text>
<text x="648" y="415" text-anchor="start" font-size="18" font-weight="500" fill="#334155">rt_device_register(&quot;usartN&quot;)</text>
<text x="648" y="444" text-anchor="start" font-size="18" font-weight="500" fill="#334155">rt_hw_interrupt_register()</text>
</g>
<g>
  <rect x="70" y="515" width="235" height="96" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="187.5" y="551" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">5. board init</text>
  <text x="98" y="571" text-anchor="start" font-size="18" font-weight="500" fill="#334155">drv_usart_get_id()</text>
<text x="98" y="600" text-anchor="start" font-size="18" font-weight="500" fill="#334155">拼 dev_name = usartN</text>
</g>
<g>
  <rect x="930" y="515" width="230" height="96" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="1045" y="551" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">6. 选择 console</text>
  <text x="958" y="571" text-anchor="start" font-size="18" font-weight="500" fill="#334155">rt_console_set_device()</text>
<text x="958" y="600" text-anchor="start" font-size="18" font-weight="500" fill="#334155">find/open usartN</text>
</g>
<g>
  <rect x="930" y="665" width="230" height="98" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="1045" y="701" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">7. HAL 绑定</text>
  <text x="958" y="721" text-anchor="start" font-size="18" font-weight="500" fill="#334155">hal_usart_init()</text>
<text x="958" y="750" text-anchor="start" font-size="18" font-weight="500" fill="#334155">查找已注册 usartN</text>
</g>
<g>
  <rect x="1200" y="665" width="260" height="98" rx="10" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
  <text x="1330" y="701" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">8. shell init</text>
  <text x="1228" y="721" text-anchor="start" font-size="18" font-weight="500" fill="#334155">agc_shell_init()</text>
<text x="1228" y="750" text-anchor="start" font-size="18" font-weight="500" fill="#334155">线程 / rx_sem / ringbuffer</text>
</g>
<g>
  <rect x="1200" y="515" width="260" height="96" rx="10" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
  <text x="1330" y="551" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">9. shell 绑定设备</text>
  <text x="1228" y="571" text-anchor="start" font-size="18" font-weight="500" fill="#334155">agc_shell_set_device()</text>
<text x="1228" y="600" text-anchor="start" font-size="18" font-weight="500" fill="#334155">注册 agc_shell_rx_ind</text>
</g>
<g>
  <polyline points="305,236 340,236" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  
</g>
<g>
  <polyline points="463,282 463,330" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  
</g>
<g>
  <polyline points="585,389 620,389" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  
</g>
<g>
  <polyline points="305,563 930,563" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="600" y="540" text-anchor="middle" font-size="18" font-weight="700" fill="#16a34a">usartN 必须已注册</text>
</g>
<g>
  <polyline points="1045,611 1045,665" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  
</g>
<g>
  <polyline points="1160,714 1200,714" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  
</g>
<g>
  <polyline points="1330,665 1330,611" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  
</g>
<text x="70" y="785" text-anchor="start" font-size="21" font-weight="700" fill="#7c2d12">CP Master 额外条件：rt_hw_board_pos_init() 还会 hal_usart_unmask_int(USART1_IRQn, INT_CTRL_INTR2CP_DIR)，让 USART1 IRQ 能送到 CP。</text>

