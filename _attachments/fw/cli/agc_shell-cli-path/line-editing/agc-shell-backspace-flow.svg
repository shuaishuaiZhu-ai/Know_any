<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-label="Backspace/Delete 路径：put 事件 byte，编辑 this_line">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L8,4 L0,8 Z" fill="#52647a"/>
  </marker>
</defs>
<rect x="0" y="0" width="1320" height="760" fill="#f6f8fb"/>
<text x="660" y="44" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#111827">Backspace/Delete 路径：put 事件 byte，编辑 this_line</text>
<g>
<rect x="48" y="104" width="236" height="136" rx="8" fill="#fffaf1" stroke="#b87923" stroke-width="2"/>
<text x="66" y="140" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#162033">1. 终端按键</text>
<text x="66" y="170" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">输入 a g c</text>
<text x="66" y="193" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">再按 Backspace</text>
<text x="66" y="216" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">继续输入 d</text>
</g>
<g>
<rect x="352" y="92" width="302" height="164" rx="8" fill="#eff6ff" stroke="#2f65a7" stroke-width="2"/>
<text x="370" y="128" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#162033">2. RX callback</text>
<text x="370" y="158" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">agc_shell_rx_ind()</text>
<text x="370" y="181" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">device_read() 读 raw byte</text>
<text x="370" y="204" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">ringbuffer_put() 写 input_buff</text>
<text x="370" y="227" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">sem_release() 唤醒 shell</text>
</g>
<g>
<rect x="734" y="104" width="266" height="136" rx="8" fill="#f3f7f0" stroke="#557c3e" stroke-width="2"/>
<text x="752" y="140" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#162033">3. shell getchar</text>
<text x="752" y="170" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">ringbuffer 空则 sem_take</text>
<text x="752" y="193" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">非空则 get 1 byte</text>
<text x="752" y="216" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">按 FIFO 顺序消费</text>
</g>
<g>
<rect x="1064" y="104" width="250" height="136" rx="8" fill="#f8f3ff" stroke="#7556a8" stroke-width="2"/>
<text x="1082" y="140" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#162033">4. parse 转换</text>
<text x="1082" y="170" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">0x08 / 0x7f</text>
<text x="1082" y="193" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">映射成</text>
<text x="1082" y="216" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">AGCSH_CTRL_CHAR_BLKSPACE</text>
</g>
<polyline points="284,172 352,172" fill="none" stroke="#52647a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<polyline points="654,172 734,172" fill="none" stroke="#52647a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<polyline points="1000,172 1064,172" fill="none" stroke="#52647a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="196" y="292" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#223047">ringbuffer 里看到的是原始输入流</text>
<g>
<rect x="64" y="320" width="56" height="42" rx="5" fill="#f8fbff" stroke="#8391a5" stroke-width="1.5"/>
<text x="92" y="347" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047">a</text>
<rect x="128" y="320" width="56" height="42" rx="5" fill="#f8fbff" stroke="#8391a5" stroke-width="1.5"/>
<text x="156" y="347" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047">g</text>
<rect x="192" y="320" width="56" height="42" rx="5" fill="#f8fbff" stroke="#8391a5" stroke-width="1.5"/>
<text x="220" y="347" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047">c</text>
<rect x="256" y="320" width="56" height="42" rx="5" fill="#ffe7cc" stroke="#c86b16" stroke-width="1.5"/>
<text x="284" y="347" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047">0x7f</text>
<rect x="320" y="320" width="56" height="42" rx="5" fill="#f8fbff" stroke="#8391a5" stroke-width="1.5"/>
<text x="348" y="347" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047">d</text>
</g>
<text x="540" y="292" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#223047">Backspace 被消费后，handler 修改 this_line</text>
<g>
<rect x="386" y="320" width="268" height="144" rx="8" fill="#fff2f2" stroke="#b45353" stroke-width="2"/>
<text x="404" y="356" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#162033">5. ctrl_blkspace()</text>
<text x="404" y="386" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">line_position--</text>
<text x="404" y="409" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">line_curpos--</text>
<text x="404" y="432" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">尾部：this_line[pos] = NUL</text>
</g>
<g>
<rect x="744" y="320" width="282" height="144" rx="8" fill="#eef6f2" stroke="#3a7c62" stroke-width="2"/>
<text x="762" y="356" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#162033">6. ctrl_default('d')</text>
<text x="762" y="386" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">普通字符追加或插入</text>
<text x="762" y="409" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">写 this_line[curpos]</text>
<text x="762" y="432" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">维护新的 NUL</text>
</g>
<polyline points="374,341 386,374" fill="none" stroke="#b45353" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<polyline points="654,374 744,374" fill="none" stroke="#3a7c62" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="246" y="540" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#223047">当前命令行状态变化</text>
<g><rect x="70" y="572" width="116" height="44" rx="6" fill="#eef6f2" stroke="#3a7c62" stroke-width="1.5"/><text x="128" y="599" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#19372d">a -&gt; &quot;a&quot;</text></g>
<g><rect x="210" y="572" width="126" height="44" rx="6" fill="#eef6f2" stroke="#3a7c62" stroke-width="1.5"/><text x="273" y="599" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#19372d">g -&gt; &quot;ag&quot;</text></g>
<g><rect x="360" y="572" width="142" height="44" rx="6" fill="#eef6f2" stroke="#3a7c62" stroke-width="1.5"/><text x="431" y="599" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#19372d">c -&gt; &quot;agc&quot;</text></g>
<g><rect x="528" y="572" width="156" height="44" rx="6" fill="#fff2f2" stroke="#b45353" stroke-width="1.5"/><text x="606" y="599" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#642222">0x7f -&gt; &quot;ag&quot;</text></g>
<g><rect x="712" y="572" width="142" height="44" rx="6" fill="#eef6f2" stroke="#3a7c62" stroke-width="1.5"/><text x="783" y="599" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#19372d">d -&gt; &quot;agd&quot;</text></g>
<polyline points="186,590 210,590" fill="none" stroke="#52647a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<polyline points="336,590 360,590" fill="none" stroke="#52647a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<polyline points="502,590 528,590" fill="none" stroke="#b45353" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<polyline points="684,590 712,590" fill="none" stroke="#3a7c62" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<g>
<rect x="948" y="522" width="264" height="138" rx="8" fill="#ffffff" stroke="#566173" stroke-width="2"/>
<text x="966" y="558" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#162033">不会发生的事</text>
<text x="966" y="588" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">不会回头删除 ringbuffer 旧 byte</text>
<text x="966" y="611" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">不会把删除后的字符串 put 回去</text>
<text x="966" y="634" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">ringbuffer 只负责传递事件</text>
</g>
</svg>