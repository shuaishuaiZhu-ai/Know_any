<rect x="152" y="648" width="56" height="42" rx="5" fill="#ffe7cc" stroke="#c86b16" stroke-width="1.5"/>
<text x="180" y="675" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047">|</text>
<rect x="216" y="648" width="56" height="42" rx="5" fill="#f8fbff" stroke="#8391a5" stroke-width="1.5"/>
