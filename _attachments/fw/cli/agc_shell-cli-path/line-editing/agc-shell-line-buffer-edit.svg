<text x="112" y="313" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047">a</text>
<rect x="148" y="286" width="56" height="42" rx="5" fill="#f8fbff" stroke="#8391a5" stroke-width="1.5"/>
<text x="176" y="313" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047">g</text>
<rect x="212" y="286" width="56" height="42" rx="5" fill="#ffe7cc" stroke="#c86b16" stroke-width="1.5"/>
<text x="240" y="313" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047">c</text>
<rect x="276" y="286" width="56" height="42" rx="5" fill="#f8fbff" stroke="#8391a5" stroke-width="1.5"/>
<text x="304" y="313" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047">NUL</text>
</g>
<g>
<rect x="448" y="130" width="280" height="136" rx="8" fill="#fff2f2" stroke="#b45353" stroke-width="2"/>
<text x="466" y="166" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#162033">B. Backspace 尾删</text>
<text x="466" y="196" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">先 curpos-- / position--</text>
<text x="466" y="219" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">当前位置改成 NUL</text>
<text x="466" y="242" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">kprintf 退格、空格、退格</text>
</g>
<g>
