<rect x="910" y="286" width="56" height="42" rx="5" fill="#f8fbff" stroke="#8391a5" stroke-width="1.5"/>
<text x="938" y="313" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047">g</text>
<rect x="974" y="286" width="56" height="42" rx="5" fill="#ffe7cc" stroke="#c86b16" stroke-width="1.5"/>
<text x="1002" y="313" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047">d</text>
<rect x="1038" y="286" width="56" height="42" rx="5" fill="#f8fbff" stroke="#8391a5" stroke-width="1.5"/>
<text x="1066" y="313" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047">NUL</text>
</g>
<polyline points="338,192 448,192" fill="none" stroke="#b45353" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<polyline points="728,192 838,192" fill="none" stroke="#3a7c62" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="86" y="452" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#223047">中间编辑：光标不在尾部时，用 memmove 维护连续字符串</text>
<g>
<rect x="68" y="482" width="304" height="132" rx="8" fill="#f8f3ff" stroke="#7556a8" stroke-width="2"/>
<text x="86" y="518" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#162033">插入普通字符</text>
<text x="86" y="548" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">curpos &lt; position</text>
<text x="86" y="571" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">memmove 尾部内容右移一格</text>
<text x="86" y="594" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">当前位置写新字符</text>
</g>
<g>
