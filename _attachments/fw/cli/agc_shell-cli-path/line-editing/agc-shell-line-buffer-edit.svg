<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="820" viewBox="0 0 1320 820" role="img" aria-label="this_line 如何保存、删除和重新组装命令">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L8,4 L0,8 Z" fill="#52647a"/>
  </marker>
</defs>
<rect x="0" y="0" width="1320" height="820" fill="#f6f8fb"/>
<text x="660" y="44" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#111827">this_line 如何保存、删除和重新组装命令</text>
<text x="86" y="104" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#223047">尾部删除：输入 agc，再删 c，继续输入 d</text>
<g>
<rect x="68" y="130" width="270" height="136" rx="8" fill="#eff6ff" stroke="#2f65a7" stroke-width="2"/>
<text x="86" y="166" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#162033">A. 输入 agc 后</text>
<text x="86" y="196" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">this_line[0..3] = a g c NUL</text>
<text x="86" y="219" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">line_position = 3</text>
<text x="86" y="242" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">line_curpos = 3</text>
</g>
<g>
