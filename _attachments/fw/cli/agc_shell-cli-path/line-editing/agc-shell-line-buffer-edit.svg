<text x="548" y="313" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047">g</text>
<rect x="584" y="286" width="56" height="42" rx="5" fill="#ffe7cc" stroke="#c86b16" stroke-width="1.5"/>
<text x="612" y="313" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047">NUL</text>
<rect x="648" y="286" width="56" height="42" rx="5" fill="#f8fbff" stroke="#8391a5" stroke-width="1.5"/>
<text x="676" y="313" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#223047"></text>
</g>
<g>
<rect x="838" y="130" width="284" height="136" rx="8" fill="#eef6f2" stroke="#3a7c62" stroke-width="2"/>
<text x="856" y="166" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#162033">C. 再输入 d</text>
<text x="856" y="196" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">ctrl_default 写 this_line[2]</text>
<text x="856" y="219" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">this_line[3] = NUL</text>
<text x="856" y="242" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">显示结果变成 agd</text>
</g>
<g>
