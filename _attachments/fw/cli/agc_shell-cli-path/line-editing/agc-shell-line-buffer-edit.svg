<text x="490" y="548" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">Backspace 后 curpos--</text>
<text x="490" y="571" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">memmove 让右侧内容左移</text>
<text x="490" y="594" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">尾部补 NUL，再重绘尾串</text>
</g>
<g>
