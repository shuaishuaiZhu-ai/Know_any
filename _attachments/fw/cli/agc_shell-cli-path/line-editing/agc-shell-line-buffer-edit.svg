<text x="932" y="548" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">cmd_strip 去首尾空格</text>
<text x="932" y="571" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">exec 拷贝到 cmd_line_temp</text>
<text x="932" y="594" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="14" fill="#27364c">空格改 NUL，argv 指向各段</text>
</g>
