<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="870" viewBox="0 0 1560 870">
<defs>
  <marker id="arrow-0891b2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9,5 L0,9 Z" fill="#0891b2"/></marker>
  <marker id="arrow-e11d48" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9,5 L0,9 Z" fill="#e11d48"/></marker>
  <marker id="arrow-16a34a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9,5 L0,9 Z" fill="#16a34a"/></marker>
  <marker id="arrow-ca8a04" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9,5 L0,9 Z" fill="#ca8a04"/></marker>
</defs>
<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="780" y="48" text-anchor="middle" font-size="30" font-weight="900" fill="#0f172a">rt_ringbuffer 空满判断：index 相等时靠 mirror 区分</text>

<g>
  <rect x="80" y="120" width="390" height="146" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="275" y="159.4" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a">EMPTY</text>
  <text x="106" y="189.3" text-anchor="start" font-size="21" font-weight="500" fill="#334155">read_index == write_index</text>
<text x="106" y="217.7" text-anchor="start" font-size="21" font-weight="500" fill="#334155">read_mirror == write_mirror</text>
<text x="106" y="246" text-anchor="start" font-size="21" font-weight="500" fill="#334155">data_len = 0</text>
</g>
<g>
  <rect x="560" y="120" width="390" height="146" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="755" y="159.4" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a">HALFFULL</text>
  <text x="586" y="189.3" text-anchor="start" font-size="21" font-weight="500" fill="#334155">write_index != read_index</text>
<text x="586" y="217.7" text-anchor="start" font-size="21" font-weight="500" fill="#334155">或 index 不同侧</text>
<text x="586" y="246" text-anchor="start" font-size="21" font-weight="500" fill="#334155">data_len 按差值或 wrap 计算</text>
</g>
<g>
  <rect x="1040" y="120" width="390" height="146" rx="10" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
  <text x="1235" y="159.4" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a">FULL</text>
  <text x="1066" y="189.3" text-anchor="start" font-size="21" font-weight="500" fill="#334155">read_index == write_index</text>
<text x="1066" y="217.7" text-anchor="start" font-size="21" font-weight="500" fill="#334155">read_mirror != write_mirror</text>
<text x="1066" y="246" text-anchor="start" font-size="21" font-weight="500" fill="#334155">data_len = buffer_size</text>
</g>
<g>
  <polyline points="470,192 560,192" fill="none" stroke="#0891b2" stroke-width="2.5" marker-end="url(#arrow-0891b2)" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="515" y="165" text-anchor="middle" font-size="17" font-weight="800" fill="#0891b2">put data</text>
</g>
<g>
  <polyline points="950,192 1040,192" fill="none" stroke="#e11d48" stroke-width="2.5" marker-end="url(#arrow-e11d48)" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="995" y="165" text-anchor="middle" font-size="17" font-weight="800" fill="#e11d48">write 追上 read</text>
</g>
<g>
  <polyline points="1040,245 950,335 560,335 560,265" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-16a34a)" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="790" y="298" text-anchor="middle" font-size="17" font-weight="800" fill="#16a34a">get data</text>
</g>
<g>
  <polyline points="560,245 470,335 80,335 80,265" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-16a34a)" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="305" y="298" text-anchor="middle" font-size="17" font-weight="800" fill="#16a34a">get all</text>
</g>
<g>
  <rect x="210" y="470" width="530" height="150" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="475" y="508.5" text-anchor="middle" font-size="25" font-weight="800" fill="#0f172a">put/get 跨尾部</text>
  <text x="236" y="537.3" text-anchor="start" font-size="20" font-weight="500" fill="#334155">先复制到 buffer 尾部</text>
<text x="236" y="564.3" text-anchor="start" font-size="20" font-weight="500" fill="#334155">再从 buffer[0] 继续复制剩余部分</text>
<text x="236" y="591.3" text-anchor="start" font-size="20" font-weight="500" fill="#334155">跨尾后翻转 write_mirror 或 read_mirror</text>
</g>
<g>
  <rect x="880" y="470" width="500" height="150" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="1130" y="508.5" text-anchor="middle" font-size="25" font-weight="800" fill="#0f172a">space_len</text>
  <text x="906" y="537.3" text-anchor="start" font-size="20" font-weight="500" fill="#334155">rt_ringbuffer_space_len(rb)</text>
<text x="906" y="564.3" text-anchor="start" font-size="20" font-weight="500" fill="#334155">= buffer_size - data_len(rb)</text>
<text x="906" y="591.3" text-anchor="start" font-size="20" font-weight="500" fill="#334155">IPC 发送侧据此判断是否入 send_wait_list</text>
</g>
<g>
  <polyline points="740,545 880,545" fill="none" stroke="#ca8a04" stroke-width="2.5" marker-end="url(#arrow-ca8a04)" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="810" y="520" text-anchor="middle" font-size="17" font-weight="800" fill="#ca8a04">发送前检查</text>
</g>
<text x="80" y="765" text-anchor="start" font-size="22" font-weight="800" fill="#334155">调试含义：queue create / stream create 怀疑 wrap 时，重点看 read_index/write_index 和 mirror 是否同步翻转。</text>
<text x="80" y="799" text-anchor="start" font-size="22" font-weight="800" fill="#334155">index 相等不代表一定空；还必须看 mirror。</text>

<text x="1532" y="846" text-anchor="end" font-size="16" fill="#64748b">source: 192.168.80.116:/home/shuaishuai.zhu/fw @ 541207a</text>
</svg>