<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="860" viewBox="0 0 1760 860">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="880" y="48" text-anchor="middle" font-size="30" font-weight="900" fill="#0f172a">is_ipc_rb 与 rb_addr_trans：为什么 CP 要加 MEMORY_MAP_IO_BASE</text>

<g>
  <rect x="80" y="110" width="500" height="175" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="330" y="144" text-anchor="middle" font-size="25" font-weight="800" fill="#0f172a">IMC 视角</text>
  <text x="106" y="180" text-anchor="start" font-size="20" font-weight="500" fill="#334155">IPC_SHARE_MEMORY_BASE = IMC_SHM_BASE</text>
<text x="106" y="211" text-anchor="start" font-size="20" font-weight="500" fill="#334155">rt_ringbuffer_init 写入 buffer_ptr</text>
<text x="106" y="242" text-anchor="start" font-size="20" font-weight="500" fill="#334155">buffer_ptr 指向共享 data 低地址</text>
<text x="106" y="273" text-anchor="start" font-size="20" font-weight="500" fill="#334155">rb_addr_trans(addr, flag) = addr</text>
</g>
<g>
  <rect x="1010" y="110" width="590" height="175" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="1305" y="144" text-anchor="middle" font-size="25" font-weight="800" fill="#0f172a">CP 视角</text>
  <text x="1036" y="180" text-anchor="start" font-size="20" font-weight="500" fill="#334155">IPC_SHARE_MEMORY_BASE =</text>
<text x="1036" y="211" text-anchor="start" font-size="20" font-weight="500" fill="#334155">IMC_SHM_BASE + MEMORY_MAP_IO_BASE</text>
<text x="1036" y="242" text-anchor="start" font-size="20" font-weight="500" fill="#334155">共享元数据里的 buffer_ptr 仍是低地址</text>
<text x="1036" y="273" text-anchor="start" font-size="20" font-weight="500" fill="#334155">rb_addr_trans(addr, 1) = addr + base</text>
</g>
<g>
  <rect x="625" y="365" width="450" height="135" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="850" y="399" text-anchor="middle" font-size="25" font-weight="800" fill="#0f172a">共享元数据</text>
  <text x="651" y="435" text-anchor="start" font-size="20" font-weight="500" fill="#334155">struct rt_ringbuffer</text>
<text x="651" y="464" text-anchor="start" font-size="20" font-weight="500" fill="#334155">buffer_ptr / read_index / write_index</text>
<text x="651" y="493" text-anchor="start" font-size="20" font-weight="500" fill="#334155">field.flag.is_ipc_rb = 1</text>
</g>
<g>
  <polyline points="580,200 690,365" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="640" y="315" text-anchor="middle" font-size="17" font-weight="800" fill="#ea580c">IMC 初始化写入</text>
</g>
<g>
  <polyline points="1075,365 1130,285" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1230" y="335" text-anchor="middle" font-size="17" font-weight="800" fill="#2563eb">CP 读取同一份元数据</text>
</g>
<g>
  <rect x="190" y="600" width="520" height="145" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="634" text-anchor="middle" font-size="25" font-weight="800" fill="#0f172a">IPC RB</text>
  <text x="216" y="670" text-anchor="start" font-size="20" font-weight="500" fill="#334155">is_ipc_rb = 1</text>
<text x="216" y="699" text-anchor="start" font-size="20" font-weight="500" fill="#334155">CP 访问 data 时必须加</text>
<text x="216" y="728" text-anchor="start" font-size="20" font-weight="500" fill="#334155">MEMORY_MAP_IO_BASE</text>
</g>
<g>
  <rect x="990" y="600" width="520" height="145" rx="10" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
  <text x="1250" y="634" text-anchor="middle" font-size="25" font-weight="800" fill="#0f172a">CLI RB</text>
  <text x="1016" y="670" text-anchor="start" font-size="20" font-weight="500" fill="#334155">is_ipc_rb = 0</text>
<text x="1016" y="699" text-anchor="start" font-size="20" font-weight="500" fill="#334155">buffer_ptr 指向本地 input_buff_pool</text>
<text x="1016" y="728" text-anchor="start" font-size="20" font-weight="500" fill="#334155">不能加 base</text>
</g>
<g>
  <polyline points="850,500 450,600" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="585" y="565" text-anchor="middle" font-size="17" font-weight="800" fill="#2563eb">共享内存</text>
</g>
<g>
  <polyline points="850,500 1250,600" fill="none" stroke="#db2777" stroke-width="3" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1120" y="565" text-anchor="middle" font-size="17" font-weight="800" fill="#db2777">本地内存不走这条</text>
</g>
<text x="80" y="790" text-anchor="start" font-size="21" font-weight="800" fill="#334155">调试关键：CP IPC 异常而 CLI 正常时，优先检查共享元数据中 is_ipc_rb 是否为 1，以及 CP 的 rb_addr_trans 是否走加 base 分支。</text>

<text x="1732" y="836" text-anchor="end" font-size="16" fill="#64748b">source: 192.168.80.116:/home/shuaishuai.zhu/fw @ 541207a</text>
</svg>