<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="860" viewBox="0 0 1560 860">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="780" y="48" text-anchor="middle" font-size="30" font-weight="900" fill="#0f172a">IPC ringbuffer 初始化：IMC 是元数据 owner</text>

<g>
  <rect x="70" y="105" width="310" height="115" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="225" y="139" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">ipc_msg_init()</text>
  <text x="96" y="175" text-anchor="start" font-size="19" font-weight="500" fill="#334155">入口函数</text>
<text x="96" y="204" text-anchor="start" font-size="19" font-weight="500" fill="#334155">先调用 ipc_msg_ring_buffer_init()</text>
</g>
<g>
  <rect x="505" y="105" width="380" height="125" rx="10" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="695" y="139" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">遍历 EVENT_TYPE_MAX</text>
  <text x="531" y="175" text-anchor="start" font-size="19" font-weight="500" fill="#334155">buffer = IPC_SHARE_MEMORY_BASE</text>
<text x="531" y="204" text-anchor="start" font-size="19" font-weight="500" fill="#334155">+ i * sizeof(ipc_ring_buffer_t)</text>
</g>
<g>
  <rect x="1005" y="105" width="360" height="115" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="1185" y="139" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">绑定 manager</text>
  <text x="1031" y="175" text-anchor="start" font-size="19" font-weight="500" fill="#334155">ipc_manager[i].buffer = buffer</text>
<text x="1031" y="204" text-anchor="start" font-size="19" font-weight="500" fill="#334155">所有目标都要做</text>
</g>
<g>
  <polyline points="380,162 505,162" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  
</g>
<g>
  <polyline points="885,162 1005,162" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  
</g>
<g>
  <rect x="195" y="340" width="470" height="215" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="430" y="374" text-anchor="middle" font-size="25" font-weight="800" fill="#0f172a">FW_IMC 分支</text>
  <text x="221" y="410" text-anchor="start" font-size="20" font-weight="500" fill="#334155">rt_memset(buffer, 0)</text>
<text x="221" y="441" text-anchor="start" font-size="20" font-weight="500" fill="#334155">rt_ringbuffer_init(&amp;buffer-&gt;rb, data, 1024)</text>
<text x="221" y="472" text-anchor="start" font-size="20" font-weight="500" fill="#334155">buffer-&gt;rb.field.flag.is_ipc_rb = 1</text>
<text x="221" y="503" text-anchor="start" font-size="20" font-weight="500" fill="#334155">创建共享 RB 元数据和 data 指针</text>
</g>
<g>
  <rect x="875" y="340" width="470" height="215" rx="10" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
  <text x="1110" y="374" text-anchor="middle" font-size="25" font-weight="800" fill="#0f172a">CP Master / CP User 分支</text>
  <text x="901" y="410" text-anchor="start" font-size="20" font-weight="500" fill="#334155">不 memset</text>
<text x="901" y="441" text-anchor="start" font-size="20" font-weight="500" fill="#334155">不 rt_ringbuffer_init()</text>
<text x="901" y="472" text-anchor="start" font-size="20" font-weight="500" fill="#334155">只绑定同一块共享结构</text>
<text x="901" y="503" text-anchor="start" font-size="20" font-weight="500" fill="#334155">避免清掉其他端未消费的数据</text>
</g>
<g>
  <polyline points="680,220 680,285 430,285 430,340" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="555" y="273" text-anchor="middle" font-size="17" font-weight="800" fill="#ea580c">FW_IMC</text>
</g>
<g>
  <polyline points="1045,220 1045,340" fill="none" stroke="#db2777" stroke-width="3" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1090" y="300" text-anchor="middle" font-size="17" font-weight="800" fill="#db2777">CP</text>
</g>
<g>
  <rect x="390" y="660" width="780" height="105" rx="10" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="780" y="694" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">为什么要 #ifdef FW_IMC</text>
  <text x="416" y="730" text-anchor="start" font-size="20" font-weight="500" fill="#334155">共享 RB 的 read/write/mirror/buffer_ptr 是跨端状态。</text>
<text x="416" y="759" text-anchor="start" font-size="20" font-weight="500" fill="#334155">如果 CP 也初始化，会重置共享元数据，破坏 Host/IMC/CP 之间尚未消费的消息。</text>
</g>

<text x="1532" y="836" text-anchor="end" font-size="16" fill="#64748b">source: 192.168.80.116:/home/shuaishuai.zhu/fw @ 541207a</text>
</svg>